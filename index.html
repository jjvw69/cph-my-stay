<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>My Stay · Caribbean Paradise Homes</title>
<meta name="theme-color" content="#16241E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5EFE5; --panel:#FBF8F1; --card:#FFFFFF; --ink:#1F2A24;
    --accent:#33493B; --accent2:#5B6E5F; --soft:#8B8475; --line:#E6DDCC;
    --gold:#A98C5A; --login:#16241E; --backdrop:#1E2B25;
    --ok-bg:#E2EAE0; --ok-tx:#33493B; --live:#5B9E6F;
    --display:'Cormorant Garamond', Georgia, serif;
    --ui:'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;overflow-x:hidden;max-width:100%}
  body{font-family:var(--ui);background:var(--backdrop);color:var(--ink);-webkit-font-smoothing:antialiased}
  .label{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--soft)}
  .display{font-family:var(--display)}
  button{font-family:var(--ui);cursor:pointer;border:0;background:none}
  a{color:inherit}

  /* App column */
  #app{width:100%;max-width:440px;margin:0 auto;min-height:100dvh;background:var(--bg);position:relative;overflow:hidden;
       box-shadow:0 0 60px rgba(0,0,0,.35)}
  @media(min-width:480px){ body{display:flex;align-items:center;justify-content:center}
    #app{height:920px;max-height:96dvh;min-height:0;border-radius:28px} }
  /* When embedded in an iframe (e.g. the /my-stay/ page), fill the frame instead of
     floating a fixed-height card. The fixed/viewport-height card can paint blank on the
     first load inside a third-party iframe; filling the frame avoids that entirely. */
  html.embedded, html.embedded body{height:100%;min-height:100%}
  html.embedded body{display:block}
  html.embedded #app{max-width:none;height:100%;min-height:100%;max-height:none;border-radius:0;box-shadow:none}
  /* iPad / tablets: even inside the embed, present the app as a centered phone-style
     column with the dark backdrop showing in the margins (keeps the design intact). */
  @media(min-width:768px){
    html.embedded body{display:flex;align-items:stretch;justify-content:center;background:var(--backdrop)}
    html.embedded #app{max-width:480px;width:480px;height:100%;min-height:100%;border-radius:0;box-shadow:0 0 60px rgba(0,0,0,.35)}
  }

  .view{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 22px 120px}
  .enter{animation:slideIn .32s cubic-bezier(.22,.61,.36,1)}
  @keyframes slideIn{from{transform:translateY(14px)}to{transform:translateY(0)}}

  /* Login */
  #login{position:absolute;inset:0;background:var(--login);color:#fff;display:flex;flex-direction:column;justify-content:flex-end;
         background-size:cover;background-position:center}
  #login .grad{position:absolute;inset:0;background:linear-gradient(rgba(20,33,28,.34),rgba(20,33,28,.93))}
  #login .top{position:absolute;top:48px;left:0;right:0;text-align:center;z-index:2}
  #login .seal{width:54px;height:auto;margin:0 auto 10px;display:block}
  #login .wordmark{font-size:11px;letter-spacing:.28em;color:rgba(255,255,255,.85)}
  #login .body{position:relative;z-index:2;padding:0 26px 40px}
  #login h1{font-family:var(--display);font-weight:600;font-size:40px;line-height:1.05;margin:6px 0 8px}
  #login .sub{color:rgba(255,255,255,.78);font-weight:300;font-size:15px;margin-bottom:26px;max-width:300px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:7px}
  .field input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);color:#fff;
       padding:14px 16px;border-radius:12px;font-size:16px;font-family:var(--ui)}
  .field input::placeholder{color:rgba(255,255,255,.45)}
  .btn{width:100%;background:#F3ECDD;color:#1F2A24;padding:16px;border-radius:13px;font-size:15px;font-weight:500;
       letter-spacing:.02em;box-shadow:0 12px 30px -10px rgba(0,0,0,.6)}
  .btn:disabled{opacity:.6}
  #login .helper{margin-top:14px;text-align:center;font-size:12.5px;color:rgba(255,255,255,.6)}
  #login .helper a{color:rgba(255,255,255,.9);text-decoration:underline}
  .err{background:rgba(158,91,67,.92);color:#fff;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}

  /* Headers / cards */
  .appbar{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 8px;position:sticky;top:0;background:linear-gradient(var(--bg),var(--bg) 70%,rgba(245,239,229,0));z-index:5}
  .brand{display:flex;align-items:center;gap:9px}
  .brand img{width:30px;height:auto}
  .brand b{font-family:var(--display);font-weight:600;font-size:15px;line-height:1;color:var(--ink)}
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;letter-spacing:.04em}
  .eyebrow{margin-top:6px}
  h2.villa{font-family:var(--display);font-weight:600;font-size:40px;line-height:1.02;color:var(--ink);margin:4px 0 2px}
  .loc{color:var(--soft);font-size:14px;display:flex;align-items:center;gap:7px;margin-bottom:16px}
  .loc::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block}
  .hero{height:224px;border-radius:22px;background:#cfc6b3 center/cover no-repeat;position:relative;overflow:hidden;
        box-shadow:0 18px 40px -22px rgba(31,42,36,.7)}
  .hero.ph{background:linear-gradient(135deg,#33493B,#1E2B25)}
  .hero .chips{position:absolute;left:12px;bottom:12px;display:flex;gap:7px;flex-wrap:wrap}
  .chip{background:rgba(22,33,28,.62);color:#fff;font-size:11px;letter-spacing:.04em;padding:6px 11px;border-radius:30px;backdrop-filter:blur(4px)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:16px}
  .countdown{display:flex;align-items:center;justify-content:space-between}
  .countdown .big{font-family:var(--display);font-weight:600;font-size:52px;line-height:.9;color:var(--accent)}
  .countdown .days{font-size:14px;color:var(--soft);margin-left:4px}
  .countdown .sub{font-size:12.5px;color:var(--soft);margin-top:6px}
  .ring{width:74px;height:74px;border-radius:50%;border:2px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--accent)}
  .ring b{font-family:var(--display);font-size:22px;line-height:1;margin-bottom:4px}
  .ring span{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);line-height:1.25;text-align:center}
  .greet{font-size:15.5px;line-height:1.5;color:var(--soft);margin:18px 2px 4px}
  .greet b{color:var(--ink);font-weight:500}
  .row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-top:11px;width:100%;text-align:left}
  .row .ic{width:34px;height:34px;border-radius:9px;background:var(--ok-bg);display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}
  .row .tx{flex:1}
  .row .tx b{display:block;font-weight:500;font-size:15px;color:var(--ink)}
  .row .tx span{font-size:12.5px;color:var(--soft)}
  .row .arr{color:var(--soft);font-size:18px}
  .pill-done{font-size:11px;color:var(--ok-tx);background:var(--ok-bg);padding:3px 9px;border-radius:30px}
  .sec-title{font-family:var(--display);font-weight:600;font-size:24px;color:var(--ink);margin:26px 2px 2px}
  .faq details>summary{list-style:none}
  .faq details>summary::-webkit-details-marker{display:none}
  .faq details[open] .faq-x{transform:rotate(45deg)}
  .teasers{display:flex;gap:12px;overflow-x:auto;padding:14px 0 2px;scrollbar-width:none}
  .teasers::-webkit-scrollbar{display:none}
  .teaser{flex:0 0 150px;height:104px;border-radius:14px;background:#cfc6b3 center/cover;position:relative;color:#fff;display:flex;align-items:flex-end;padding:11px;font-size:13px;font-weight:500;text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .teaser.ph{background:linear-gradient(135deg,#5B6E5F,#33493B)}
  /* guest request (add-on / itinerary) capture */
  .reqov{position:absolute;inset:0;background:rgba(20,28,24,.55);display:flex;align-items:flex-end;justify-content:center;z-index:60}
  .reqbox{background:#fff;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;border-radius:20px 20px 0 0;padding:20px 20px 24px;box-shadow:0 -10px 40px rgba(0,0,0,.28);animation:requp .22s ease}
  .reqrates{background:#F6F2E9;border:1px solid #E6DDCC;border-radius:12px;padding:11px 13px;margin:6px 0 2px;font-size:12.5px}
  .reqrates>b{display:block;font-size:11.5px;letter-spacing:.04em;color:var(--accent);margin-bottom:6px}
  .reqrates .rt{display:flex;justify-content:space-between;gap:12px;padding:2px 0}
  .reqrates .rt span:first-child{color:#8A958C}
  .reqrates .rt span:last-child{color:#1F2A24;font-weight:500;white-space:nowrap}
  .reqrates .rth{font-weight:600;color:#1F2A24;margin-top:7px;font-size:12px}
  .reqrates .rtnote{font-size:11.5px;color:#8A958C;margin-top:7px;line-height:1.45}
  .reqmenu{display:inline-block;margin:8px 0 2px;font-size:13px;color:var(--accent);text-decoration:underline}
  @keyframes requp{from{transform:translateY(24px);opacity:.4}to{transform:none;opacity:1}}
  .reqh{font-family:'Cormorant Garamond',Georgia,serif;font-size:23px;color:#1F2A24;margin-bottom:2px;line-height:1.1}
  .reqsub{font-size:12.5px;color:#6E7B71;margin-bottom:8px;line-height:1.45}
  .reqlbl{display:block;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:#8A958C;margin:12px 0 5px}
  .reqbox input,.reqbox textarea,.reqbox select{width:100%;border:1px solid #E2DCCD;border-radius:11px;padding:11px 12px;font-size:15px;font-family:inherit;box-sizing:border-box;background:#fff;color:#1F2A24}
  .reqbox input[type=date],.reqbox input[type=time]{-webkit-appearance:none;appearance:none;min-width:0}
  .reqbox input[type=date]::-webkit-date-and-time-value,.reqbox input[type=time]::-webkit-date-and-time-value{text-align:left}
  .reqbox input[type=date]::-webkit-calendar-picker-indicator,.reqbox input[type=time]::-webkit-calendar-picker-indicator{margin-left:auto}
  .reqrange{display:flex;gap:10px}
  .reqrange>div{flex:1;min-width:0}
  .reqstep{display:flex;align-items:center;gap:18px}
  .reqstep button{width:40px;height:40px;border:1px solid #E2DCCD;border-radius:10px;background:#fff;font-size:20px;color:#33493B;cursor:pointer}
  .reqstep span{font-size:17px;min-width:26px;text-align:center}
  .reqbtns{display:flex;gap:10px;margin-top:18px}
  .reqbtns button{flex:1;border-radius:12px;padding:13px;font-size:14px;border:0;cursor:pointer}
  .rqcancel{background:#EFE9DC;color:#1F2A24}
  .rqok{background:#33493B;color:#fff}
  .reqpill{display:inline-flex;align-items:center;gap:9px;margin-top:7px;background:#EEF3EE;color:#33493B;border-radius:9px;padding:6px 10px;font-size:12px;line-height:1.3}
  .reqpill .x{cursor:pointer;font-size:15px;color:#9E5B43;font-weight:600}
  .reqpill.ok{background:#E2EAE0;color:#33493B;font-weight:600}

  /* Tab bar */
  .tabs{position:absolute;left:0;right:0;bottom:0;display:flex;background:rgba(251,248,241,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:9px 8px calc(9px + max(env(safe-area-inset-bottom), 30px))}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--soft);font-size:10.5px;letter-spacing:.04em;padding:5px 0}
  .tab .ti{font-size:19px;line-height:1}
  .tab.on{color:var(--accent)}
  .backbar{display:flex;align-items:center;gap:14px;padding:18px 22px 6px}
  .backbar button.bk{font-size:22px;color:var(--ink)}
  .backbar .ttl{font-family:var(--display);font-weight:600;font-size:22px}

  /* Generic UI bits */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:12px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .tile b{display:block;font-size:14px;font-weight:500}
  .tile span{font-size:12px;color:var(--soft)}
  .tile.tap{position:relative;cursor:pointer;border-color:#cfe0c8;background:#F4F8F1}
  .tile.tap::after{content:'›';position:absolute;top:10px;right:13px;color:var(--accent);font-size:18px;line-height:1;font-weight:600}
  .tile.tap b{color:var(--accent)}
  .seg{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
  .seg button{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:9px 14px;border-radius:30px;font-size:13px}
  .seg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .stepper{display:flex;align-items:center;gap:14px}
  .stepper button{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);font-size:18px;color:var(--accent);background:var(--card)}
  .cta-bar{position:absolute;left:0;right:0;bottom:0;padding:14px 22px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(rgba(245,239,229,0),var(--bg) 30%)}
  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;padding:11px 18px;border-radius:30px;font-size:13.5px;opacity:0;transition:.25s;pointer-events:none;z-index:30;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .chatwrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:9px;min-width:0}
  .msg{max-width:78%;padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.4}
  .msg.them{background:var(--card);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:5px}
  .msg.me{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
  .msg.me .tick{margin-left:7px;font-size:10.5px;letter-spacing:-1px;color:rgba(255,255,255,.55);white-space:nowrap;vertical-align:baseline}
  .msg.me .tick.read{color:#8fd3ff}
  .composer{display:flex;gap:9px;padding:12px 16px;border-top:1px solid var(--line);background:var(--panel)}
  .composer input{flex:1;min-width:0;border:1px solid var(--line);border-radius:30px;padding:12px 16px;font-size:15px;font-family:var(--ui)}
  .composer button{flex:none}
  .qrow{padding:8px 16px 0;max-width:100%;overflow:hidden}
  .qrow .seg{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .composer button{width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;font-size:18px}
  .check{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:10px}
  .check .box{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--accent2);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
  .check.on .box{background:var(--accent);border-color:var(--accent)}
  .check.on .t{text-decoration:line-through;color:var(--soft)}
  .center-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#fff;gap:14px;padding:30px;text-align:center}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .mode-flag{position:fixed;bottom:8px;left:8px;font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.5);z-index:50}
</style>
</head>
<body>
<div id="app">
  <div id="boot" class="center-msg"><div class="spin"></div><div style="font-size:13px;letter-spacing:.1em">Loading your stay…</div></div>
</div>
<div class="mode-flag" id="modeFlag"></div>

<script>
/* Detect iframe embedding (the live guest entry point is the /my-stay/ page, which
   frames this app). Mark <html> so the CSS fills the frame instead of floating a
   fixed-height card — the card can paint blank on first load inside a 3rd-party iframe. */
try{ if(window.parent && window.parent !== window) document.documentElement.classList.add('embedded'); }catch(e){ document.documentElement.classList.add('embedded'); }

const SEAL = "https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/11/CPH-Seal-Clear.png";
// Installable shell — minimal network-passthrough SW (never caches, so it can't go stale).
if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(function(){}); }catch(e){} }

const state = { stay:null, token:null, tab:'home', stack:[], checklist:{}, checkin:{step:0, adults:2, children:0, airport:'LRM'}, messages:[] };
const $app = document.getElementById('app');
const fmtDate = iso => { const d=new Date(iso+'T00:00:00'); return isNaN(d)?'' : d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); };
const daysUntil = iso => { const d=new Date(iso+'T00:00:00'); return isNaN(d)?null:Math.max(0,Math.ceil((d-new Date(new Date().toDateString()))/86400000)); };
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const jsq = s => String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/[\r\n]+/g,' ');
window.copyTxt=function(t,label){ const done=()=>toast((label||'Copied')+' copied'); if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(done).catch(()=>fallbackCopy(t,done)); } else fallbackCopy(t,done); };
function fallbackCopy(t,done){ try{ const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done&&done(); }catch(e){ toast('Could not copy — please copy it manually'); } }

/* keep the guest signed in across reloads — persist the session token in this
   app's own (iframe-origin) storage. Wrapped in try/catch in case a strict
   browser blocks storage inside a 3rd-party iframe. */
const TKEY='cph_guest_token';
function saveToken(t){ state.token=t||null; try{ if(t) localStorage.setItem(TKEY,t); else localStorage.removeItem(TKEY); }catch(e){} }
function loadToken(){ try{ return localStorage.getItem(TKEY)||null; }catch(e){ return null; } }

async function api(path, opts={}){
  const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(state.token) headers['Authorization'] = 'Bearer '+state.token;
  const r = await fetch(path, Object.assign({credentials:'same-origin'}, opts, {headers}));
  let j={}; try{ j=await r.json(); }catch(e){}
  return {status:r.status, ok:r.ok && j.ok!==false, body:j};
}

/* ---------------- AUTO-UPDATE (never show a stale app) ----------------
   An open tab / home-screen app keeps running the JS it loaded with, so after a
   deploy the guest can be left on old code or old data. We watch the deployed
   build hash and refresh: silently when the guest isn't mid-action, otherwise we
   offer a one-tap Refresh. Runs on the normal poll + whenever the app is reopened. */
let _APPVER=null;
function guestBusy(){
  if(document.querySelector('.reqov')) return true;          // a request/booking modal is open
  const a=document.activeElement; if(a && /^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName)) return true;
  const top=state.stack.length?state.stack[state.stack.length-1]:null;
  if(top==='checkin'||top==='guestlist') return true;        // mid pre check-in form
  const cm=document.getElementById('cmsg'); if(cm && cm.value && cm.value.trim()) return true; // typing a message
  return false;
}
function showUpdateBar(){
  if(document.getElementById('verbar')) return;
  const b=document.createElement('div'); b.id='verbar';
  b.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#16241E;color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:center;gap:14px;font-size:14px;box-shadow:0 -2px 16px rgba(0,0,0,.34)';
  b.innerHTML='✦ A new version of the app is available. <button onclick="location.reload()" style="background:#fff;color:#16241E;border:0;border-radius:9px;padding:8px 16px;font-size:13.5px;font-weight:600;cursor:pointer">Reload now</button>';
  document.body.appendChild(b);
}
async function checkVersion(){
  try{
    const r=await fetch('/api/version',{cache:'no-store',credentials:'same-origin'});
    const j=await r.json(); const v=j&&j.ver; if(!v) return;
    if(_APPVER===null){ _APPVER=v; return; }
    if(v!==_APPVER){ _APPVER=v; showUpdateBar(); }
  }catch(e){}
}
document.addEventListener('visibilitychange',function(){ if(!document.hidden) checkVersion(); });
window.addEventListener('focus',function(){ checkVersion(); });
setInterval(checkVersion, 45000);
checkVersion();

  const btn=document.getElementById('loginBtn'), errEl=document.getElementById('loginErr');

    const reference=document.getElementById('ref').value.trim(), lastName=document.getElementById('last').value.trim();

/* ---------------- APP SHELL ---------------- */
function bootIntoApp(){ state.tab='home'; state.stack=[]; hydrateCheckin(); loadConversation(); startPolling(); render(); }
/* Restore the guest's submitted pre check-in (or sensibly prefill from the booking) so it survives
 * reload/logout — mirrors loadConversation for the chat. Fully rebuilds state.checkin per stay so a
 * previous guest's answers never leak into a new sign-in. */
function hydrateCheckin(){
  const s=state.stay; if(!s) return;
  const gc=s.guestCheckin, b=s.booking||{};
  if(gc){
    state.checkin={ step:0,
      adults:(gc.adults!=null?gc.adults:(b.adults||2)),
      children:(gc.children!=null?gc.children:(b.children||0)),
      airport: gc.airport||b.airport||'LRM',
      flight: gc.flight||'', transferType: gc.transferType||null,
      occasion: gc.occasion||null, dietary: gc.dietary||'',
      transportMode: gc.transportMode||null, transportCompany: gc.transportCompany||'', transportArrival: gc.transportArrival||'', transportDeparture: gc.transportDeparture||'',
      childAges:(gc.childAges||[]).slice(),
      docs:(s.guestList||[]).map(g=>({name:g.name||'',passport:g.passport||''})),
      done:true };
  } else {
    state.checkin={ step:0, adults:(b.adults||2), children:(b.children||0),
      airport: b.airport||'LRM', flight: b.flight||'',
      transferType:null, occasion:null, dietary:'', transportMode:null, transportCompany:'', transportArrival:'', transportDeparture:'', childAges:[], docs:[], done:false };
  }
}
/* Default concierge welcome (used when a stay has no custom message). {villa name} / {concierge name} resolve live. */
const DEFAULT_WELCOME="Welcome to {villa name} — we're so happy to have you. I'm {concierge name}, here to help with transfers, groceries, dinners, or anything else. Tap Pre check-in when you have a moment, and message me anytime.";
function fillTokens(t,s){
  const vn=(s&&s.villa&&s.villa.name)||'your villa';
  const cn=(s&&s.concierge&&s.concierge.name)||'your concierge';
  return String(t||'').replace(/\{\s*villa name\s*\}/gi,vn).replace(/\{\s*concierge name\s*\}/gi,cn);
}
/* rebuild the concierge thread from the server-persisted messages so it survives reload/logout */
function loadConversation(){
  const s=state.stay; if(!s) return;
  const wm=fillTokens((s.welcomeMessage||'').trim()||DEFAULT_WELCOME, s);
  const greet={from:'them',t: wm};
  const stored=(s.messages||[]).map(m=>({from:m.from==='guest'?'me':'them',t:m.text,at:m.at}));
  state.messages=[greet].concat(stored);
}

/* account sheet + sign out */
window.openAcct=function(){
  const s=state.stay||{}; const g=s.guest||{};
  const ov=document.createElement('div'); ov.className='reqov'; ov.onclick=e=>{ if(e.target===ov) closeAcct(); };
  ov.innerHTML=`<div class="reqbox">
    <div class="reqh">${esc((g.family?g.family+' family':g.firstName||'Your stay'))}</div>
    <div class="reqsub">You're signed in to your stay. We'll keep you signed in on this device.</div>
    <div class="reqbtns"><button class="rqcancel" onclick="closeAcct()">Close</button><button class="rqok" onclick="signOut()">Sign out</button></div>
  </div>`;
  $app.appendChild(ov);
};
window.closeAcct=function(){ const o=document.querySelector('.reqov'); if(o)o.remove(); };
window.signOut=function(){ stopPolling(); saveToken(null); state.stay=null; state.messages=[]; state.stack=[]; state.tab='home'; closeAcct(); renderLogin(); };

function tabBar(active,flow){
  const t=(id,ic,lbl)=>`<button class="tab ${active===id?'on':''}" onclick="goTab('${id}')"><span class="ti">${ic}</span>${lbl}</button>`;
  return `<div class="tabs"${flow?' style="position:static;flex:none"':''}>${t('home','⌂','Home')}${t('stay','❖','Your Stay')}${t('explore','✦','Explore')}${t('concierge','✉','Concierge')}</div>`;
}
window.goTab=function(id){ if(id==='concierge'){ waHandoff(); return; } state.tab=id; state.stack=[]; render(); };  /* chat retired 2026-07: concierge = WhatsApp handoff */
window.push=function(v){ state.stack.push(v); render(); };
window.pop=function(){ state.stack.pop(); render(); };

function render(){
  const v = state.stack[state.stack.length-1];
  if(v) return renderPushed(v);
  if(state.tab==='home') return renderHome();
  if(state.tab==='stay') return renderStay();
  if(state.tab==='explore') return renderExplore();
  if(state.tab==='concierge') return renderConcierge();
}

    intro:'Minitas Beach Club is Casa de Campo’s most scenically positioned restaurant — built directly into the beachfront landscape, with an infinity pool beside the sand and panoramic Caribbean Sea views from virtually every table. The architecture is outstanding, locally designed to blend into the tropical surroundings rather than impose on them, and the open-air terraces let the sea breeze and the sound of the waves into the dining space. For many guests it is the most beautiful place to eat at the resort.',
    sections:[
      {h:'The setting', p:'The club is built into the beach itself, ten metres from the water, with open-air terraces and a sea-view bar that becomes the afternoon social centre of the resort from about 2pm onward. Because the beach faces west, dinner arrives with spectacular evening light — candles come out and the sunset provides a backdrop the kitchen earns. It is one of the most romantic dinners available at Casa de Campo.'},
      {h:'On the menu', p:'The lunch menu covers exactly what a beach day needs — light Mediterranean dishes, wood-fired pizza, pasta, fresh seafood, salads and a cocktail list anchored by house-made tropical specials. Dinner is a more produced, candlelit affair with an elevated Mediterranean–Latin menu of ceviche, seafood paella and grilled branzino, plus a dedicated kids’ menu. Guests consistently rank it among the resort’s top tables.'},
      {h:'Dress &amp; hours', p:'Two dress rules catch people out: swimsuits are not allowed inside the restaurant at lunch (a cover-up is fine on the terrace), and men need a collared shirt at dinner. The Beach Club runs 10am to midnight, with the restaurant serving lunch and dinner across the day. It is closed on Mondays, so plan accordingly.'},
      {h:'Good to know', p:'Lunch rarely needs a reservation, but the west-facing sunset tables for dinner book out first, especially in high season and over Christmas and New Year. Reserve two to three days ahead in peak weeks through your concierge, who can secure the best evening table and settle charges to your villa account so there is no need to carry cash to the beach.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'la-casita': {
    eyebrow:'DINING · MARINA', title:'La Casita',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/La-Casita7-800x600-1.webp',
    intro:'La Casita is the Marina’s signature seafood restaurant, set on a raised terrace with an unobstructed, west-facing view over the water — one of Casa de Campo’s most celebrated sunset reservations. The kitchen focuses on Dominican and Spanish food where the quality of the ingredient does most of the work, and the position makes it a destination in its own right rather than simply another table on the Piazza Portofino.',
    sections:[
      {h:'The cooking', p:'The menu is built around fresh catches, ceviche and grilled whole fish in the Dominican and Spanish tradition — simple, ingredient-led cooking that lets the seafood speak. It is the kind of refined-but-unfussy food that suits a long, relaxed evening on the water, and a reliable choice for anyone who wants the Marina’s best seafood without the formality of a fine-dining room.'},
      {h:'The sunset setting', p:'Because the terrace faces west, the golden hour before dark is when La Casita is at its best — yacht masts, water and Caribbean breeze combining into one of the most memorable dinner settings in the country. Book a terrace table for around 7pm and you will understand why guests keep returning. It is, for many, the single most romantic table at the Marina.'},
      {h:'Marina context', p:'La Casita anchors the Marina’s dining cluster alongside SBG, Causa, Limoncello, Shibuya and Peperoni, all ringing the cobblestone Piazza Portofino where the resort’s social life gravitates after dark. Pair dinner with a pre-meal Aperol spritz at one of the piazza bars or an after-dinner cigar from the tobacco shop on the square.'},
      {h:'Good to know', p:'A firm dinner favourite that fills up, particularly on Friday and Saturday nights in high season (December–April). Reserve a terrace table ahead through your concierge, who has the direct line to the host and handles restaurant bookings as a standard part of the villa service — tell them which night you would like and they will confirm it before you arrive.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'causa': {
    eyebrow:'DINING · MARINA', title:'Causa',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/Causa-Restaurant.webp',
    intro:'Causa is the resort’s most distinctive culinary offering — dedicated Peruvian cooking on the Marina, in a part of the world where genuine Peruvian restaurants are rare. For any guest with an interest in food beyond comfort eating, it is something different from the Italian and Mediterranean options that dominate the rest of the resort, and well worth a dedicated evening rather than a casual drop-in.',
    sections:[
      {h:'On the menu', p:'The menu explores three pillars of Peruvian cuisine — traditional Criollo (Creole) cooking, Nikkei (the Japanese-Peruvian fusion behind some of Latin America’s most celebrated dishes), and Chifa (Peruvian-Chinese). The ceviche and tiradito are exceptional and the obvious place to start. The cooking is precise and the range gives a table the chance to graze across genuinely different flavours in one sitting.'},
      {h:'Worth a dedicated evening', p:'Causa rewards guests who treat it as the focus of a night out rather than a quick bite. For food-focused travellers and anyone curious about Peruvian cuisine, it is the most interesting kitchen at Casa de Campo — a stylish, contemporary waterfront room on the Marina paseo with an excellent cocktail list to match the food.'},
      {h:'The setting', p:'Causa sits on the Piazza Portofino with the rest of the Marina’s dining cluster — SBG, La Casita, Limoncello, Shibuya and Peperoni — so it is easy to fold into an evening that begins with a piazza aperitivo and ends with a cigar by the water. The contemporary waterfront room is sleek and sociable without losing its focus on the food.'},
      {h:'Good to know', p:'Smart-casual dress, and reservations are sensible on busy weekend nights in high season when the Marina is at its liveliest. Your concierge can book a table and time it around the rest of your evening — and, because Causa rewards a leisurely pace, it is best planned as the centrepiece of the night rather than squeezed in before something else.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'sbg': {
    eyebrow:'DINING · MARINA', title:'SBG · Blue Grill',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/12/SBG_Marina_084-800x600-1.jpg',
    intro:'SBG (Santo Domingo Blue Grill) is the social anchor of the Marina and the most reliably lively restaurant at Casa de Campo on weekend evenings. The setting is poolside at the Marina, with the water behind and a DJ or live band setting the energy from around 9pm, so the atmosphere sits closer to a stylish urban restaurant than a typical resort dining room. On Saturday nights in peak season, this is where the resort’s social scene concentrates.',
    sections:[
      {h:'On the menu', p:'The menu is Mediterranean-inflected international and seafood-forward — grilled fish, regional ceviches and tiraditos, steaks, pasta and sharing plates, with hot appetisers that lean toward Asian-Caribbean fusion. The kitchen is consistent and precise and the cocktail list is calibrated for a long evening, but the energy is the real draw. The capacity runs to around 200, so it absorbs a crowd without losing its buzz.'},
      {h:'Day to night', p:'SBG typically draws a younger crowd and stays livelier later than its neighbours, which makes it the natural choice if you want to move from dinner to drinks without changing venue. By 9pm on a busy weekend the energy is at its peak, with guests, yacht owners and Dominican locals who have driven out from La Romana all mixing in one place.'},
      {h:'Sunday brunch', p:'Sunday brunch from 11am is a separate, more relaxed affair — a popular local institution that draws a crowd from within and beyond the resort. It is the gentler face of SBG, and an easy plan for a slow Sunday after a busy Marina Saturday — long, leisurely, and with the waterfront setting at its most relaxed in the daytime light.'},
      {h:'Good to know', p:'Hours run roughly 5pm–11pm Monday to Friday, noon–11pm Saturday and 11am–11pm Sunday. Reservations are recommended, especially Friday and Saturday evenings in high season; SBG is also bookable through OpenTable, or your concierge can secure a table as part of the villa service.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'la-piazzetta': {
    eyebrow:'DINING · ALTOS DE CHAVÓN', title:'La Piazzetta',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/12/la-piazzetta-casa-de-campo-min-1-800x600-1.jpg',
    intro:'La Piazzetta is the most formally celebrated restaurant in the stone village of Altos de Chavón — a proper Italian dining room with the atmosphere of one that has stood in the same village for centuries. Dinner here is never just dinner: the 16th-century setting is part of the experience, and the kitchen is good enough to earn the surroundings. It is the right venue for a step up from casual without the full occasion-formality of La Caña.',
    sections:[
      {h:'The cooking', p:'The menu is classic, serious Italian — antipasto, housemade pasta, grilled meats and a wine list that takes itself seriously. The pasta is genuinely good, and the cooking has the confidence of a kitchen that knows its tradition. It works particularly well for families wanting something special, and for couples who appreciate proper Italian food done in an extraordinary place.'},
      {h:'The setting', p:'Stone-walled and candlelit, La Piazzetta spills out onto the cobblestone street where the village atmosphere is most present. The outdoor tables — with the coral-stone architecture and the river valley around you — are the ones to ask for. It is one of the most atmospheric dining rooms in the Caribbean, and the reason a meal here feels like an occasion even on an ordinary night.'},
      {h:'Pairing the evening', p:'Because the village rewards exploration, the best approach is to arrive in Altos de Chavón around 4pm, walk the cobbled lanes and cliff terraces in the late-afternoon light, have drinks at Onno’s or Café Marietta, then sit down to dinner. If there is an amphitheatre event during your stay, build the evening around it.'},
      {h:'Good to know', p:'Open daily for dinner from around 7pm, with lunch added Friday through Sunday. A reservation is essential for dinner, especially on Friday or Saturday nights and over peak season — book before arrival. Comfortable flat shoes are wise: the cobblestones are beautiful but uneven. Your concierge handles the booking as part of the villa service.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'limoncello': {
    eyebrow:'DINING · MARINA', title:'Limoncello',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/Limoncello_1-1024x681-1.webp',
    intro:'Limoncello is the most relaxed of the Marina’s main restaurants — homemade Italian on the waterfront, in an easy, unhurried setting that suits families and quieter evenings. It fills a useful gap on the Piazza Portofino: a no-fuss pizza-and-pasta dinner on the water when SBG has a wait and you want to stay by the harbour without committing to a more produced evening.',
    sections:[
      {h:'On the menu', p:'The kitchen turns out homemade pasta, wood-fired pizza and a wine list that takes the cuisine seriously rather than treating it as an afterthought. The truffle pasta and the pizza bianca with prosciutto are consistently well-regarded and a reliable place to start. It is straightforward, well-made Italian food in generous portions, prepared to order rather than rushed, and the kind of menu where children and adults alike find something they want without negotiation.'},
      {h:'Good for', p:'Limoncello is the natural choice for a laid-back family dinner or a quieter evening after an active day on the water — children are comfortable here, the pace is gentle, and nobody has to dress up. It is also the sensible fallback when the livelier Marina restaurants are full and you simply want to eat well by the harbour.'},
      {h:'The setting', p:'Set on the Marina’s cobblestone waterfront among the cluster of restaurants ringing the piazza, Limoncello shares the same Portofino-inspired surroundings as its neighbours but trades their weekend energy for a calmer atmosphere. The waterfront tables are the ones to ask for, especially around sunset, when the harbour light is at its best and the piazza is just beginning to fill for the evening.'},
      {h:'Good to know', p:'Open daily, roughly noon to midnight, with a capacity of about 100. Weeknight dinners in low season are usually walk-in friendly, but calling ahead for larger groups or busy weekend nights is always sensible. Your concierge can reserve a waterfront table and time it around the rest of your evening.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'shibuya': {
    eyebrow:'DINING · MARINA', title:'Shibuya',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/DJI_0725_HDR.webp',
    intro:'Shibuya brings Asian fusion and sushi to the Piazza Portofino — a sleek, contemporary waterfront spot for sashimi, signature rolls and Pan-Asian plates among the Marina’s evening buzz. It adds welcome variety to a dining scene otherwise weighted toward Italian, Mediterranean and seafood, and is one of the restaurants framing the Marina’s central cobblestone square.',
    sections:[
      {h:'On the menu', p:'The menu runs across sushi and sashimi, signature rolls and Pan-Asian mains, paired with sake and a cocktail list built for the Marina’s social evenings. It is the place to go when the group wants something lighter or more modern than pasta and grilled fish, and the sushi gives Shibuya a clear identity among its waterfront neighbours. The rolls and sashimi are freshly prepared, and the menu has enough range to anchor a full dinner rather than just a light bite.'},
      {h:'The setting', p:'Contemporary and waterfront, Shibuya sits directly on the Piazza Portofino, sharing the cobblestone square and the warm-lit, Portofino-inspired surroundings with La Casita, SBG, Causa, Limoncello and Peperoni. It is well placed for an evening that drifts between piazza bars, dinner and an after-dinner cigar by the water.'},
      {h:'Part of a Marina evening', p:'Because it shares the square with the Marina’s liveliest restaurants, Shibuya works well as one stop in a longer night out — a sushi-led dinner before drinks at SBG, or a lighter counterpoint to a heavier meal earlier in the trip. With Italian, Mediterranean, Peruvian and seafood already on the Marina, Shibuya is the table that completes the range. Sunset, from about 5:30 to 7pm, is the Marina’s prime hour and a good time to arrive.'},
      {h:'Good to know', p:'Reserve ahead on busy weekend nights in high season (December–April), when the Marina restaurants all fill quickly; weeknights in low season are generally easier. Smart-casual dress suits the room. Your concierge can book a table and fold it into the rest of your Marina plans.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'la-cana': {
    eyebrow:'DINING · RESORT CENTRE', title:'La Caña Restaurant',
    hero:'https://www.casadecampo.com.do/wp-content/smush-webp/2025/07/La-Cana-1024x514.jpg.webp',
    intro:'La Caña is the heart of Casa de Campo’s social and dining scene — French-influenced cooking that elevates local Dominican ingredients, named for the sugarcane that has surrounded La Romana since the 1800s. The combination produces food that is refined without being fussy and grounded in the place it comes from. It is the resort’s signature dining experience, and the one most worth reserving a dedicated evening for.',
    sections:[
      {h:'The cooking', p:'The kitchen is French-influenced but built on Dominican produce, and the result is polished without ever feeling stiff. The cooking suits a special occasion — a celebration dinner, a couple’s night, the meal that anchors the week — without requiring the formality of a jacket. Smart-casual to elegant dress fits the room.'},
      {h:'The terrace', p:'The outdoor terrace is the place to be on a clear evening — the air warm, the company well-dressed, and a genuine sense of occasion. It is where guests choose to sit for a milestone dinner, and the setting carries as much of the evening as the plate. Service runs lunch from around noon and dinner from 6pm.'},
      {h:'After dinner', p:'The interior bar and lounge run later than the dining room and are among the best places in the resort for a late evening. Live local music begins around 9pm, hand-rolled cigars are available at the bar, and the Dominican rum selection is extensive and deliberately curated. Even guests who have eaten elsewhere frequently end up here for rum, cigars and the music as the night builds.'},
      {h:'Good to know', p:'A reservation is essential for dinner in peak season, when La Caña books out on busy nights. For families, an evening here is best arranged as adult time using the resort’s babysitting service rather than a meal with very young children — it is special enough to be worth that. Your concierge can secure the table and the childcare together.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'peperoni': {
    eyebrow:'DINING · MARINA', title:'Peperoni',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/12/peperoni.jpg',
    intro:'Peperoni offers the most eclectic menu at the Marina — imported steaks, sushi and Italian pasta on one list — which makes it a versatile favourite for groups with mixed tastes. It sounds broader than it is in practice: the kitchen handles the range well, and the combination works particularly well when everyone at the table wants to share across different preferences rather than agree on a single cuisine.',
    sections:[
      {h:'On the menu', p:'The list spans grilled imported steaks, sushi and Italian pasta — three different appetites covered in one restaurant. It is the natural pick for a group that cannot decide, or a family where one person wants steak, another sushi and a third a plate of pasta. The breadth is the point, and the kitchen keeps the quality consistent across it, which is why it endures as a Marina favourite for larger tables and groups that would otherwise struggle to agree on a single restaurant.'},
      {h:'The setting', p:'Peperoni offers two distinct atmospheres: a formal indoor dining room and a breezy outdoor canopy terrace overlooking the Marina. In the evening the outdoor terrace is almost always the one to ask for — open to the harbour air and the warm light of the Piazza Portofino, with the water as a backdrop.'},
      {h:'Part of the Marina', p:'It sits within the Marina’s waterfront dining cluster alongside SBG, La Casita, Causa, Limoncello and Shibuya, so it folds easily into an evening that begins with a piazza aperitivo and ends with an after-dinner cigar from the tobacco shop on the square. Sunset, roughly 5:30 to 7pm, is the Marina’s prime hour to arrive.'},
      {h:'Good to know', p:'Smart-casual dress, dinner service, and a sensible booking to make ahead on busy weekend nights in high season when the Marina restaurants fill quickly. Your concierge can reserve the outdoor canopy terrace and time it around the rest of your Marina evening.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'onnos': {
    eyebrow:'DINING · ALTOS DE CHAVÓN', title:'Onno’s',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/12/onnosres.jpg',
    intro:'Onno’s is the social hub of Altos de Chavón — positioned directly in front of the amphitheatre, open all day, and stocking over 100 cocktails. The food is reliably enjoyable but secondary to the atmosphere and the drinks: this is the natural gathering point of the stone village, the place to sit and watch the cobbled lanes go by, and the right spot before and after anything happening at the amphitheatre.',
    sections:[
      {h:'On the menu', p:'The kitchen covers the whole day — omelettes in the morning, tapas and hamburgers at lunch, and a full bar into the evening. Everything is dependable, but the draw is the more than 100 cocktails and the easy, all-day atmosphere rather than any single dish. It is the village’s catch-all: coffee, a casual lunch, sundowners, a nightcap. The kitchen runs all day without a break, so there is never a wrong hour to drop in and take a table on the terrace.'},
      {h:'Day to night', p:'Onno’s is the natural gathering point before and after amphitheatre events, with an exceptional atmosphere on concert nights when the village fills with a crowd heading to the show. Outside of events it is just as good for a mid-morning coffee while wandering the galleries, an afternoon drink on the terrace, or a post-performance nightcap.'},
      {h:'The setting', p:'Set directly in front of the amphitheatre entrance in the heart of Altos de Chavón, Onno’s has one of the best vantage points in the village for watching the comings and goings of the cobblestone streets. It pairs naturally with the cliff-terrace views and a wander through the coral-stone lanes.'},
      {h:'Good to know', p:'Casual dress and all-day hours make Onno’s the easiest table in the village to drop into — no reservation needed for drinks or a casual bite. If there is an amphitheatre event during your stay, plan to arrive early and gather here first; your concierge can advise what is scheduled and arrange show tickets and transport.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'la-cantina': {
    eyebrow:'DINING · ALTOS DE CHAVÓN', title:'La Cantina',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/12/lacantina.jpg',
    intro:'La Cantina is a casual, all-day option on the main plaza in Altos de Chavón — Caribbean and Latin cooking with a dinner sushi menu that genuinely surprises guests who weren’t expecting it. It fills the gap between a beach-club lunch and a full restaurant dinner: a mid-register table in the heart of the village where you can eat well while watching the cobblestone square go by.',
    sections:[
      {h:'On the menu', p:'By day, the kitchen serves Caribbean and Latin dishes — reliably good mofongo, Dominican staples and lighter plates. At dinner it adds a sushi menu that is genuinely decent and unexpected for the setting. The range makes La Cantina an easy choice when the group wants something between formal Italian and Mexican street food, and the all-day service means it works equally for a late lunch or an early, unhurried dinner.'},
      {h:'The setting', p:'Positioned on the main plaza, La Cantina shares the same atmospheric advantage as the village’s other restaurants — coral-stone surroundings, cobblestones, and a front-row view of the village activity while you eat. It is one of the more relaxed ways to spend time in Altos de Chavón without committing to a long, produced dinner.'},
      {h:'When to go', p:'It works well for a daytime visit paired with the galleries, the Regional Museum of Archaeology and the cliff terraces, or as a casual early evening before the village quietens. The late-afternoon light on the coral stone, around 4 to 5pm, is when Altos de Chavón is at its most beautiful — a good time to sit on the plaza and watch the village settle into the evening.'},
      {h:'Good to know', p:'Open 11am to 11pm Monday through Saturday, and closed Sundays. Casual dress and generally walk-in friendly, though a reservation is sensible for larger groups in peak season. Comfortable flat shoes help on the uneven cobblestones; your concierge can book ahead if you are bringing a crowd.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'chilango': {
    eyebrow:'DINING · ALTOS DE CHAVÓN', title:'Chilango Taquería',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/12/CHILANGO-ATQUERIA-18-800x600-1.jpg',
    intro:'Chilango is the most reliably recommended restaurant for families at Casa de Campo, and one of the most frequently visited in the resort overall. It is a contemporary taquería above Plaza Chavón, with outdoor tables overlooking the cobblestone square and the church, serving the full Mexican street-food canon in a spectacular village setting. It is the go-to for an evening when nobody wants to make a production of dinner.',
    sections:[
      {h:'On the menu', p:'The menu runs across tacos, guacamole, quesadillas and the rest of the Mexican street-food repertoire, in portions that leave nobody hungry. The duck taco and the shrimp taco are both excellent, and the guacamole is made fresh. Prices are modest relative to the resort’s fine-dining alternatives, which is part of why it earns so much repeat custom, with many families returning more than once in a single week.'},
      {h:'Why families love it', p:'Chilango combines good, unfussy food, fast service and a menu that covers the bases for children who have opinions about what they will and will not eat — all in a setting that makes every meal feel like an occasion even when nobody planned it that way. It is the most consistently family-friendly table at the resort, and a dependable casual group dinner.'},
      {h:'The setting', p:'The terrace sits directly above the village square in Altos de Chavón, overlooking the cobblestones and the Church of St. Stanislaus. Like the rest of the village’s restaurants it benefits enormously from the coral-stone surroundings, and the atmosphere does as much work as the kitchen. Late-afternoon light, around 4 to 5pm, is the village at its best.'},
      {h:'Good to know', p:'Open noon to 11pm daily, with casual dress. Walk-ins are usually possible, but a reservation is recommended for larger groups of six or more, especially in peak season. Comfortable flat shoes help on the cobblestones, and your concierge can book ahead if you are arriving with a crowd.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'cafe-marietta': {
    eyebrow:'DINING · ALTOS DE CHAVÓN', title:'Café Marietta',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/12/cafemarietta.jpg',
    intro:'Café Marietta sits on the steps of Altos de Chavón, with the Chavón River valley and the Dye Fore golf course directly below — one of the finest places to sit in the entire resort. It is not a destination restaurant so much as a welcome discovery: a small, charming café where the view is the main attraction and the setting rewards lingering over a coffee or a light meal while exploring the village on foot.',
    sections:[
      {h:'On the menu', p:'The café serves light meals, coffee and drinks — straightforward fare designed for a pause rather than a feast. It is ideal for a morning coffee while wandering the galleries and museum, a light lunch between sights, or an afternoon drink before dinner elsewhere in the village. It is the kind of place where a single coffee easily becomes an hour, the view doing most of the work.'},
      {h:'The setting', p:'Perched on the village steps with the river valley directly below, Café Marietta has some of the best views at Casa de Campo — the Chavón winding through tropical forest, the Dye Fore course cut into the opposite bank, and the countryside beyond. The views are at their most beautiful in the late-afternoon light, around 4 to 5pm.'},
      {h:'When to go', p:'Mornings are quiet and good for photography and gallery visits; late afternoon is when the light falls most beautifully on the coral stone and the valley. Either way, Café Marietta is the natural place to rest mid-explore, and an easy pairing with the cliff terraces beside the amphitheatre, the galleries and the Regional Museum of Archaeology.'},
      {h:'Good to know', p:'Open-air, casual and walk-in friendly, with no reservation needed — simply find a table on the steps. Comfortable flat shoes are sensible for the uneven cobblestones. It pairs perfectly with a daytime exploration of Altos de Chavón before an evening dinner at La Piazzetta or Chilango.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'lago': {
    eyebrow:'DINING · GOLF CLUBHOUSE', title:'Lago',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/Lago-Restaurant-3-min-800x600-1.webp',
    intro:'Lago is the resort’s best-kept breakfast secret. While guests at La Caña sleep in, it opens at 6:30am beside the Teeth of the Dog pro shop, overlooking the 18th fairway and the Caribbean beyond. The combination — the world’s most famous Caribbean golf course, the morning light, and a proper hot breakfast — is one of the quietly extraordinary ways to start a day at Casa de Campo, and a setting no other dining venue at the resort matches for golfers.',
    sections:[
      {h:'On the menu', p:'The breakfast buffet is generous: fresh pastries, hot dishes, fresh fruit, eggs cooked to order, and a juice selection that reflects the quality of Dominican tropical produce. For lunch and dinner Lago becomes a standard à la carte venue, but the breakfast is what the restaurant is known for and what guests most often return to.'},
      {h:'The setting', p:'The panoramic views of Teeth of the Dog — the course runs directly in front of the restaurant — give Lago a setting golfers prize, especially in the soft early light before a round. It is the natural place to ease into a golf morning, watching the first groups head out across the fairways toward the sea.'},
      {h:'Before a round', p:'Lago opens at 6:30am, which makes it the obvious breakfast for anyone with an early tee time — the calmest, least windy hours on Teeth of the Dog are before 9am, and a proper breakfast here sets up the morning. It pairs naturally with the 19th Hole Bar at the same pro shop for a cold drink after the round.'},
      {h:'Good to know', p:'Open 6:30am to 11pm daily, with golf-attire or smart-casual dress. No reservation is needed for the breakfast buffet — simply arrive — though it is worth knowing the early hours so you can build it into a golf morning. Your concierge can coordinate breakfast with a tee time so the whole morning runs smoothly.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'spa': {
    eyebrow:'WELLNESS · THE SPA', title:'The Spa',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/Reception.webp',
    intro:'A US$25 million rebuild is a statement, not an amenity. When Casa de Campo rebuilt its wellness centre from the ground up, it created the only Forbes Four-Star spa in the Dominican Republic — more than 2,000 square metres of treatment rooms and a hydrothermal circuit in the resort’s Rejuvenate precinct, a short golf-cart ride from most villas. It reopened in early 2023, built to international destination-spa standards rather than as a hotel massage room with scented candles.',
    sections:[
      {h:'Treatments', p:'Twelve treatment rooms offer three collections: longer Wellness Journeys (the Casa de Campo Detox &amp; Restore and the Organic Garden-to-Table Glow run around 1 hour 50 minutes at about US$365), brand-led facials by EviDenS de Beauté, Ayuna and Moringaïa, and the massages that draw the strongest praise of all. The philosophy pairs German wellness technology with luxury skincare houses and local Dominican ingredients — moringa oil, honey, cane sugar and hibiscus.'},
      {h:'The hydrothermal circuit', p:'Your treatment is only half of what you’re paying for — the hydrothermal circuit is the other half. It runs through a sauna, steam bath, vitality and cold-plunge pools, heated thermal loungers, a Kneipp walk and an outdoor recovery pool. Arrive 90 minutes before your treatment to use it properly, and pack a swimsuit. Most first-timers turn up fifteen minutes early, miss the circuit, and pay full price for half the experience.'},
      {h:'In-villa treatments', p:'You don’t have to go to the spa at all — a therapist can come to you. A couples’ massage on your own terrace at sunset, no golf-cart ride and no locker room, is one of the quiet luxuries of renting at Casa de Campo, and the concierge arranges it as readily as a private chef. The full hydrothermal circuit, however, can only be experienced at the spa itself.'},
      {h:'Good to know', p:'The spa opens 9am to 7pm (thermal experience from 8am), and advance booking is strongly recommended, especially in high season and over the holidays. Every price carries 18% tax plus a 10% service charge — roughly 28% on top — so budget accordingly. The hydrothermal circuit and treatment areas are strictly 18-plus. Your concierge can lock in your treatments before you arrive.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-spa/'
  },
  'tennis': {
    eyebrow:'SPORT · RACQUET CENTER', title:'Racquet Center',
    hero:'https://www.casadecampo.com.do/wp-content/uploads/2025/09/639a04b1e1fb9ae75d22be67bf00d0ec00fbad8b.jpg',
    intro:'The Racquet Center is the largest racquet facility in the Caribbean and often called one of the most beautiful in the world — a three-sport campus for tennis, padel and pickleball, terraced around a pro shop, bar and pool that overlook the play. Renovated and rebranded from the old La Terraza Tennis Center, it now sits on the eastern side of the resort, a short hop from the Marina and the main villa neighbourhoods, with courts scattered through landscaped gardens of flowering shrubs and mature trees.',
    sections:[
      {h:'On court', p:'Eleven fast-dry Har-Tru clay courts form the heart of the place, plus a single hard court for a quicker surface, with two fenced show courts used when tournaments bring touring professionals to La Romana. Add four padel courts and dedicated pickleball courts, all floodlit, with play running 7am to 9pm daily. More than 25 tennis professionals and junior pros are on staff for lessons, clinics and hitting partners.'},
      {h:'Three sports for everyone', p:'Padel is the easiest to pick up cold — glass walls keep the ball alive, the court is smaller, and a mixed-ability foursome stays competitive within minutes. Pickleball is gentler still, with a smaller court and underhand serves, which makes it the sport multi-generation families book together. A daytime tennis court is around $39 per hour (about $49 evenings), padel and pickleball courts around $45.'},
      {h:'Lessons &amp; coaching', p:'The pro bench runs deep, led by a Tennis Director who came up through the French Tennis Federation and the ITF circuit. Private tennis lessons run from $75 with a pro to $159 with the Director; a hitting partner is $65, group clinics from $45 per person. The Junior Tennis Academy trains children from age five, and groups of eight or more can have a private tournament bracket set up.'},
      {h:'Good to know', p:'Reserve up to a month ahead in high season, when the show courts and prime morning slots fill first; night play needs at least four hours’ notice, and every player checks in at the pro shop first. Racquet rental ($19 tennis, $10 padel and pickleball) and on-site stringing mean there is no need to fly heavy gear. Your concierge can book courts, lessons and a hitting partner before you arrive.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-tennis/'
  },
  'equestrian': {
    eyebrow:'SPORT · EQUESTRIAN', title:'Equestrian Center',
    hero:'https://www.casadecampo.com.do/wp-content/uploads/2025/09/Equestrian.jpg',
    intro:'Golf made Casa de Campo famous, but the horses were there almost from the start. In 1974, the resort’s founding year, Indian polo legend Maharajah Jabar Singh was invited to La Romana to establish the sport on what was then a Gulf+Western sugar estate. Fifty-two years later the Equestrian Center and Polo Club remain the centre of gravity for the sport in the Dominican Republic — three tournament fields, a working riding school, and genuine countryside riding across a former sugar plantation.',
    sections:[
      {h:'Ride out', p:'Guided trail rides cross open countryside, working cattle ranches, cane fields and lagoons with resident waterfowl and water buffalo — not a pony circuit around a paddock. Rates run US$40 for 30 minutes, US$65 for an hour and US$99 for two hours, with a private guide at US$50 per hour. English and Western lessons (US$100 for 30 minutes, US$150 an hour) welcome all levels, and children ride independently from age six.'},
      {h:'Polo country', p:'With some justification, the resort calls itself the house of polo in the Caribbean. Matches run year-round, three days a week, with the Polo Challenge — the region’s most important event — taking over the three 300-yard fields from January to April. Spectating is free and gloriously informal: guests park golf carts along the boards, and El Polo villas watch chukkas from their gardens. Beginners can take a class from US$150; experienced players can join chukkers.'},
      {h:'Donkey polo &amp; families', p:'Donkey polo replaces thoroughbred ponies with Dominican burros, levelling skill with luck — everyone falls about laughing, and the resort supplies donkeys, staff, sound system and announcer (US$65 per person, minimum eight). For younger children, pony rides cost US$50 for 30 minutes with hard hats provided, and the calm, supervised paddock introductions make this one of the easiest family wins at the resort.'},
      {h:'Good to know', p:'Open daily 8:30–11:30 and 2:00–6:00, with two-hour rides at fixed morning and afternoon departures. Wear long trousers and closed shoes; helmets are provided. Book 24–48 hours ahead through your concierge (donkey polo needs two days and prepayment), who can also arrange the standout Rancho Peligro ranch tour. Villa owners receive a courtesy-card discount on that tour.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-equestrian-center-polo-guide/'
  },
  'shooting': {
    eyebrow:'SPORT · SHOOTING CENTER', title:'Shooting Center',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/Casa_de_Campo_Dominica_Republic39.webp',
    intro:'Most resort shooting ranges are a few skeet traps behind the tennis courts. Casa de Campo runs something else entirely — the largest shooting facility in the Caribbean, spanning 245 acres on the inland side of the resort with more than 200 stations, a 110-foot sporting-clays tower among the tallest in the world, and a 10-station archery course. The scale lets the layout mimic real game rather than a fixed range, and many shooters rate it among the finest facilities anywhere.',
    sections:[
      {h:'On the range', p:'More than 200 stations cover trap, skeet, sporting clays, Five Stand and pigeon rings, with driven pheasant, partridge and duck at the Rancho Peligro reserve for experienced guns. Sporting clays — “golf with a shotgun” — moves you from station to station, each simulating live game, and staff change the flight patterns daily, so even frequent shooters never face the same course twice. Trap and skeet are the best place for a newcomer to start.'},
      {h:'For everyone', p:'A deep bench of professional instructors can take a nervous first-timer to a broken clay inside one lesson — every lesson opens with gun-handling and safety before a single clay flies. Lessons begin from age 12 under close supervision. For younger children, or anyone who prefers no recoil, the 10-station archery course offers the same outdoor setting and sense of progress, which keeps the whole mixed-age group together.'},
      {h:'What it costs', p:'Guns and ear protection are included in every clay round. A trap or skeet round of 25 cartridges is $55; a 50-cartridge sporting clays round is $115, before tax. A skeet lesson is $25 and a sporting clays lesson $50 — the $25 skeet lesson is the best money you’ll spend here. Group “flush” packages start at $125 for two shooters, and villa owners receive a courtesy-card discount.'},
      {h:'Good to know', p:'Book through your concierge, who arranges the session, transport across the resort and instruction — you simply turn up and shoot. Wear closed-toe shoes and clothes you don’t mind getting dusty, and bring a cap, sunglasses, water and sunscreen, as the range is exposed. To bring your own gun, complete a Permit of Entry form at least three weeks before arrival; flag it to your host the moment you book.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-shooting-center/'
  },
  'horseback-tour': {
    eyebrow:'EXCURSION · HORSEBACK', title:'Horseback Riding Tour',
    hero:'https://www.casadecampo.com.do/wp-content/uploads/2025/09/Horse_Tour.jpg',
    intro:'The standout riding experience at Casa de Campo leaves the resort entirely. The Rancho Peligro tour is a two-hour ride across one of the estate’s working cattle ranches, where Dominican cowboys still move cattle and horse herds through cane fields, pastures and lagoons. It is genuine countryside riding on land that was a working sugar plantation before it was a resort — and the equestrian outing guests most often talk about at dinner.',
    sections:[
      {h:'The ride', p:'This is a real trail across a working ranch, not a pony circuit — open countryside, cane fields, pastures and lagoons with resident waterfowl, led by experienced guides. It suits multi-generational groups particularly well, with grandparents riding at the same unhurried pace as teenagers, and the two hours pass through landscape most resort guests never see.'},
      {h:'Why it stands out', p:'Casa de Campo covers 7,000 acres, including two working cattle ranches and the resort’s own horse-breeding operation, and Rancho Peligro takes you out into the heart of it. The standard of horsemanship is high — the same stables care for the privately owned horses of resort villa owners — which is part of why this ride feels a cut above a typical resort outing.'},
      {h:'Pairing the day', p:'Because the tour finishes by 11:30, it leaves the whole afternoon free for Minitas Beach, a round of golf, or the pool back at the villa. An evening polo match in season pairs naturally afterwards, and La Romana sunsets land conveniently between the final chukka and an 8pm dinner reservation at the Marina.'},
      {h:'Good to know', p:'The Rancho Peligro tour runs Thursday, Friday and Saturday mornings, 8:30 to 11:30, with a four-rider minimum, at US$300 per person (villa owners receive a courtesy-card discount). Wear long trousers and closed shoes; helmets are provided. Book 24 to 48 hours ahead through your concierge, who confirms the session and time slot before you arrive, which matters in high season.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-equestrian-center-polo-guide/'
  },
  'pottery': {
    eyebrow:'EXPERIENCE · ALTOS DE CHAVÓN', title:'Pottery at Emilio Robba',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/12/altos-de-chavon-web.jpg',
    intro:'A hands-on ceramics experience in the artisan workshops of Altos de Chavón — the village conceived from the very start, in the 1970s, as a living centre for the arts and craftsmanship rather than a decorative backdrop. Shaping your own piece in the creative heart of the coral-stone village is a relaxed, all-ages activity, and a way to engage with the working studios that give Altos de Chavón its genuine creative life.',
    sections:[
      {h:'The experience', p:'You work with clay in the creative heart of the village, home to working studios in ceramics, painting and print-making and to the Parsons-affiliated School of Design, which has operated here since 1983. It is an easy, unhurried activity suitable for children and adults alike, and a memorable change of pace from the beach and the golf course.'},
      {h:'A village built for the arts', p:'Altos de Chavón was conceived by Charles Bluhdorn as a centre for the arts, built by hand from locally quarried coral stone and terracotta and completed in 1982. Students from across Latin America and the Caribbean still study and work here, and their presence — portfolios in hand, work in the galleries — gives the village a creative energy no purely tourist attraction can replicate.'},
      {h:'The setting', p:'The workshops sit inside the hand-built village on the cliff above the Chavón River, 90 metres up. The galleries, the Regional Museum of Archaeology, the Church of St. Stanislaus and the cliff terraces are all a short walk away, so a pottery session folds naturally into a half-day exploring Altos de Chavón on foot.'},
      {h:'Good to know', p:'A relaxed, all-ages activity best paired with the galleries and a lunch on the cliff terraces — Café Marietta or La Cantina are a few steps away. Comfortable flat shoes help on the uneven cobblestones. Your concierge can arrange the session and time it around the rest of a daytime visit to the village.'},
    ],
    link:'https://caribbeanparadisehomes.com/altos-de-chavon-complete-guide/'
  },
  'kayak': {
    eyebrow:'EXCURSION · CHAVÓN RIVER', title:'Chavón River Kayak',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/cph-kayak.webp',
    intro:'A peaceful paddle on calm, scenic water beneath the cliffs of Altos de Chavón — one of the gentler ways to take in the dramatic Chavón River gorge. The same river that the 16th-century village overlooks from 90 metres above winds through tropical forest at water level, and a kayak is among the easiest, most family-friendly ways to experience it up close.',
    sections:[
      {h:'On the water', p:'Single or double kayaks set out on flat, sheltered water, easy enough for first-timers and a favourite with families and children in the resort’s tween programmes. The Chavón is one of the resort’s most popular guided paddles, calm enough that nobody needs experience to enjoy it. Look up and you’ll see Altos de Chavón on the cliff and Dye Fore’s holes cut into the opposite bank, the gorge towering above the water on both sides.'},
      {h:'How excursions work here', p:'Casa de Campo’s concierge curates outings to match your group — choosing the activity, timing it around the rest of your plans, and handling transport from your villa door. A river kayak is one of the easiest to slot in, often combined with a daytime visit to Altos de Chavón above or a Marina island trip later in the stay.'},
      {h:'Pairing the day', p:'A morning on the river leaves the afternoon free for Minitas Beach or the pool, and pairs naturally with lunch and a wander through the village on the cliff above. For families, it sits comfortably alongside the resort’s kids’ programmes, which include kayaking among their activities for the 8–12 group.'},
      {h:'Good to know', p:'An easy, low-commitment outing suitable for most ages, with equipment and guides arranged for you. For motorised water sports and reef snorkelling on a larger scale, the launch point is the Casa de Campo Marina, 10 to 15 minutes away by cart. Tell your concierge your group size and preferred day and the rest is handled.'},
    ],
  },
  'watersports': {
    eyebrow:'BEACH · WATER SPORTS', title:'Minitas Water Sports',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/Casa_de_Campo_Dominica_Republic34.webp',
    intro:'The sheltered bay at Minitas is the resort’s launchpad for non-motorised water sports. Because the crescent is protected and the water stays flat and clear most of the year, beginners and children can try paddleboarding without fighting waves — closer to a natural pool than open Caribbean sea. It is one of the simplest ways for a family to spend an active hour on the water, straight off the sand.',
    sections:[
      {h:'On offer', p:'Paddleboards and kayaks go out directly off the beach, and you can snorkel the rocky edges of the bay where the fish gather. Equipment is arranged right on the sand by the Beach Club attendants, so there is no need to travel anywhere — the calm, sheltered water means even first-timers and children can get going within minutes.'},
      {h:'Minitas vs the Marina', p:'A useful rule of thumb: if you can carry it, it starts at Minitas; if it needs an engine or a boat, it starts at the Marina, 10 to 15 minutes away by cart. Paddleboards, kayaks and beach snorkelling are the Minitas offer; deep-sea fishing, private charters and reef trips to Catalina launch from the Marina instead.'},
      {h:'Good for families', p:'The protected water makes Minitas ideal for teaching children to paddleboard or take their first snorkel, and water sports here feature in the resort’s kids’ programmes for the 4–12 age groups. A morning on the water sits easily alongside a long family lunch at the Beach Club, with the family pools and playground a few steps away.'},
      {h:'Good to know', p:'Equipment is rented by the hour and arranged on the beach; most of a Minitas day is already covered by the resort access fee, with rentals and food charged separately. Bring water shoes for the rocky snorkelling spots, which are sharper than the central sand, and a dry bag if you want a phone on the board. Your concierge can have it all set up before you arrive.'},
    ],
    link:'https://caribbeanparadisehomes.com/minitas-beach-guide/'
  },
  'zipline': {
    eyebrow:'EXCURSION · ADVENTURE', title:'Cumayasa Zip Line',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/cph-zipline.webp',
    intro:'A thrilling off-resort adventure soaring over the lush flora of the eastern Dominican Republic — one of the day trips your concierge can arrange around your villa stay. For groups who want a shot of adrenaline between beach days and island excursions, the Cumayasa zip line delivers a half-day of treetop flying without straying far from the resort.',
    sections:[
      {h:'The adventure', p:'A series of lines and platforms carries you above the treetops, with certified guides handling the equipment and safety throughout — no previous experience needed. It is the kind of outing that turns into the story of the trip for adventurous teenagers and grown-ups alike, with the Dominican countryside spread out beneath you. The platforms are set among the trees of the eastern interior, and the guides brief and equip every guest before the first line, so even the nervous are flying confidently within minutes.'},
      {h:'How excursions are chosen', p:'Casa de Campo’s concierge curates off-resort adventures to match your group, choosing the activity, timing it around your other plans, and handling transport from your villa door. The zip line is one of several countryside options — alongside off-road buggies and the river kayak — that fold neatly into a villa week without a long commitment.'},
      {h:'Pairing the day', p:'As a half-day out, the zip line leaves part of the day free for the beach, the pool or a Marina dinner, and pairs well with another countryside activity for an adventure-focused day. It suits groups looking for something more active than an island beach day but lighter than a full excursion.'},
      {h:'Good to know', p:'A half-day excursion away from the resort, with minimum age and weight limits that apply — worth confirming for younger or older members of the group. Wear closed shoes and clothes you can move in. Tell your concierge your group size and they will handle the transport, timing and any restrictions before you go.'},
    ],
  },
  'buggies': {
    eyebrow:'EXCURSION · ADVENTURE', title:'Cumayasa Buggies',
    hero:'https://www.casadecampo.com.do/wp-content/uploads/2025/09/Buggies.jpg',
    intro:'Take the wheel of your own off-road buggy through the Dominican countryside — an easy adventure to slot into a villa week alongside the islands and the river. It is one of the off-resort outings the concierge can arrange around your stay, and a favourite for groups who want to get out into the landscape, take the controls themselves, and come back muddy and grinning.',
    sections:[
      {h:'The adventure', p:'Expect dusty trails, river crossings and country roads, led by guides who keep the group together and the route safe. Half the fun is getting messy, so bring clothes you do not mind ruining. It is hands-on in a way a coach tour never is — you drive, rather than ride — which is exactly why it lands so well with active groups. The route winds through villages, farmland and riverbeds, giving a real sense of the countryside beyond the resort gates rather than a manicured circuit.'},
      {h:'How excursions are chosen', p:'The concierge curates countryside outings to suit your group, picking the activity, timing it around your other plans, and arranging transport from your villa door. The buggies pair naturally with the zip line for an adventure-focused day, or stand alone as a half-day break from the beach and golf.'},
