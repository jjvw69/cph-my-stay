      {h:'Pairing the day', p:'As a half-day out into the countryside, it leaves time for a long lunch, the pool or a Marina dinner afterwards — and a shower first. It suits groups of friends and older families looking for something more energetic than an island beach day, with everyone hands-on rather than along for the ride.'},
      {h:'Good to know', p:'Decide your group size first, then tell your concierge the day you’d like — the rest, including transport from your villa door, is handled for you. Wear closed shoes and old clothes, and check any minimum-age requirements for younger drivers and passengers when you book. The concierge confirms timings before you go.'},
    ],
  },
  'catalina': {
    eyebrow:'EXCURSION · ISLAND DAY', title:'Catalina Island',
    hero:'https://www.casadecampo.com.do/wp-content/uploads/2019/08/catalina-island-excusion-2.jpg',
    intro:'Catalina is the easy half-day island trip — six square miles of white sand and shallow turquoise water just 25 to 45 minutes offshore, run by the resort as a scheduled catamaran outing from Minitas Beach. It is the trip you can book at the activities desk and be back from in time for a late lunch at the villa: calm, family-friendly and low-commitment, the right call when you want a gorgeous beach without surrendering the whole day.',
    sections:[
      {h:'The day', p:'The official Catalina Island Beach Day departs daily at 10:00 and returns at 13:45, with a beach area of loungers, shade and a drinks bar on the island (drinks and snacks bought on the day). Pricing is US$48 per adult and US$30 per child twelve and under, taxes included, with a four-person minimum. The island stays calm and uncrowded, especially before 11am.'},
      {h:'Snorkelling The Wall', p:'The reef known as “The Wall” drops off the island’s southern edge and is one of the better snorkelling sites in the region, thick with sea fans and tropical fish. Snorkel gear rents for about US$12 per person, and it is well worth taking — Catalina is the stronger of the two island day trips for reef snorkelling, more so than Saona.'},
      {h:'Who it suits', p:'Calm water and a half-day format make Catalina ideal for young children, snorkellers, or anyone wanting a beach day that does not consume the whole day. For a couple or small family the scheduled boat is the sensible choice; for larger villa groups, a private catamaran from the Marina sets its own schedule and skips the crowds, often working out similar per head.'},
      {h:'Good to know', p:'Both the scheduled trip and a private charter book through your concierge, who can match the right boat to your group size, time it around your other plans, and pack a cooler from your villa kitchen so you are not paying bar prices all day. Villa owners with a courtesy card receive a discount on the resort’s own excursions — just mention it when booking.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-excursions-saona-catalina/'
  },
  'cave': {
    eyebrow:'EXCURSION · LA ROMANA', title:'Las Maravillas Cave',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/12/cueva-de-las-maravillas1-1-768x576.jpg',
    intro:'A guided visit to an ancient cave decorated with Taíno rock art near La Romana — an easy half-day outing your concierge can arrange around your stay. It is a window into the island’s pre-Columbian past, and a natural complement to the Taíno collection at the Regional Museum of Archaeology in Altos de Chavón for anyone curious about the Dominican Republic before 1492.',
    sections:[
      {h:'The visit', p:'Lit walkways lead deep underground past ancient pictographs and petroglyphs left by the Taíno people who inhabited Hispaniola before European contact. It is a genuine archaeological site rather than a manufactured attraction, and an engaging stop for children and adults with any historical curiosity. A guide explains the meaning of the carvings and the daily life of the Taíno who made them, which brings the chambers to life beyond the rock itself.'},
      {h:'How excursions are chosen', p:'The concierge curates off-resort outings to suit your group, picking the activity, timing it around your other plans, and arranging door-to-door transport from your villa. The cave is one of the easier cultural half-days to fold into a stay, pairing well with a wider day exploring beyond the resort’s gates.'},
      {h:'Pairing the day', p:'A short, accessible visit leaves plenty of the day free for the beach, the pool or a Marina dinner, and sits naturally alongside other cultural stops near La Romana such as a cigar or rum tour. The cool, quiet air underground is also a welcome contrast to a hot afternoon outside. For families, it works as a change of pace from beach days and as a tangible link to the history they can also see at the Altos de Chavón museum.'},
      {h:'Good to know', p:'A short and accessible outing suitable for most ages, with lit, maintained walkways underground. Wear comfortable shoes. Tell your concierge the day you’d like and transport is arranged from your villa, with timings confirmed before you go.'},
    ],
  },
  'santo-domingo': {
    eyebrow:'EXCURSION · CAPITAL', title:'Santo Domingo City Tour',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/cph-santo-domingo-fixed.webp',
    intro:'A full-day tour of the oldest city in the New World — the colonial Zona Colonial of Santo Domingo, with its cathedrals, fortresses and cobbled streets — among the off-resort excursions your concierge can set up. For guests who want to step beyond the beaches and golf and into the deeper history of Hispaniola, it is the most rewarding day trip the capital has to offer.',
    sections:[
      {h:'The highlights', p:'The tour takes in the first cathedral of the Americas, the Alcázar de Colón, the historic Calle Las Damas and the colonial heart of the Dominican capital — a UNESCO-listed quarter of genuine historical weight. It is a day of real substance for anyone interested in the colonial story of the New World, walking streets first laid out five centuries ago in the company of a guide who can place each fortress, plaza and church in its history.'},
      {h:'How excursions are chosen', p:'Casa de Campo’s concierge curates off-resort outings to match your group, arranging a knowledgeable guide, timing the day around the rest of your plans, and handling door-to-door transport from your villa rather than a hotel lobby. The city tour is the natural full-day cultural counterpoint to the resort’s beach and sport.'},
      {h:'Pairing the day', p:'As a full day out, Santo Domingo is best planned as a deliberate change of pace mid-stay — a city day between beach days and golf rounds. It suits couples and curious families, and pairs conceptually with the Taíno history on show at Las Maravillas Cave and the Altos de Chavón museum closer to the resort. It is the single best way to understand the country beyond the resort gates.'},
      {h:'Good to know', p:'The drive is about 90 minutes each way, so it is a full-day commitment; comfortable shoes are recommended for the cobbled streets. Your concierge can arrange a guide and door-to-door transport from your villa, and time the departure to make the most of the day.'},
    ],
  },
  'cigar': {
    eyebrow:'EXCURSION · LA ROMANA', title:'Cigar Factory Tour',
    hero:'https://www.casadecampo.com.do/wp-content/smush-webp/2025/09/manos-1024x949.jpg.webp',
    intro:'The Dominican Republic produces more premium hand-rolled cigars than any country on earth, and Casa de Campo sits in the middle of that production. A factory tour brings you face to face with the master rollers who make them — a genuine encounter with one of the country’s great crafts, and an easy half-day your concierge can arrange around your stay.',
    sections:[
      {h:'The experience', p:'Watch master rollers at work and learn how the country’s legendary cigars are made, from leaf to box. The houses a serious collector would expect — Arturo Fuente, Davidoff, Montecristo, La Aurora, La Flor Dominicana and more — all hail from this cigar country, and seeing the process up close — the sorting, the rolling, the careful pressing of each leaf — gives any later evening cigar a richer context.'},
      {h:'Cigar country', p:'For years the resort’s position in the heart of cigar country was an incidental advantage — guests smoked at the bar after dinner and that was about it. The Cigars in Paradise festival each year now puts it centre stage, with more than 25 brands, master-blender seminars and rum tastings on the Marina Riverside, and a factory visit is the year-round way to engage with the same craft.'},
      {h:'Pairing the day', p:'A cigar tour pairs naturally with a Ron Barceló or Casa Brugal rum distillery visit for a relaxed, adults-oriented day out near La Romana, and with an in-villa rum-and-cigar tasting back on your terrace afterwards. It is a half-day that leaves time for the beach, the pool or a Marina dinner.'},
      {h:'Good to know', p:'Located near La Romana and bookable through your concierge, who arranges transport from your villa and times the visit around the rest of your day. For the full festival experience, the spring Cigars in Paradise Cigar &amp; Rum Festival adds blender seminars, tastings and an after-party on the Marina — ask your concierge if your dates align.'},
    ],
    link:'https://caribbeanparadisehomes.com/cigars-in-paradise-casa-de-campo-2026/'
  },
  'rum': {
    eyebrow:'EXCURSION · DISTILLERY', title:'Rum Factory · Ron Barceló',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/cph-rum-fixed.webp',
    intro:'A distillery tour in the heart of Dominican rum country — the perfect pairing for the island’s cigars, and a fixture of the resort’s Cigars in Paradise Cigar &amp; Rum Festival. Following the journey from sugar cane to aged rum is a relaxed, adults-only half-day that your concierge can arrange any time, and a natural companion to a cigar factory visit nearby.',
    sections:[
      {h:'The tour', p:'You follow the journey from sugar cane to aged rum and end with a guided tasting — an easy, unhurried look at one of the Dominican Republic’s signature exports. During the resort’s annual festival, a private tour of the Destilería Casa Brugal in San Pedro de Macorís anchors the non-golfing day, with the same craft on show year-round at distilleries across rum country. The guide walks you through fermentation, distillation and the long ageing in oak that gives Dominican rum its character before the tasting itself.'},
      {h:'Why pair rum with cigars', p:'Dominican rum and Dominican cigars come from the same land, and tasting them together is the point of the resort’s spring festival. A distillery visit and a cigar factory tour make a natural adults’ day out near La Romana, ideally rounded off with a guided rum-and-cigar flight back on your villa terrace in the evening.'},
      {h:'How excursions are chosen', p:'The concierge curates off-resort outings to match your group, arranging the tour, timing it around your other plans, and handling transport from your villa door. The rum distillery is one of the easiest half-days to slot in, and pairs with the cigar tour for a relaxed, themed day.'},
      {h:'Good to know', p:'Adults only, and a relaxed half-day your concierge can arrange around your stay — paired naturally with a cigar tasting back at the villa. If your dates fall near the Cigars in Paradise festival, the Casa Brugal tour and the festival’s rum tastings are worth asking about. Transport from your villa and timings are handled for you.'},
    ],
    link:'https://caribbeanparadisehomes.com/cigars-in-paradise-casa-de-campo-2026/'
  },
  'rumcigar': {
    eyebrow:'IN-VILLA · TASTING', title:'Rum &amp; Cigar Tasting',
    hero:'https://www.casadecampo.com.do/wp-content/smush-webp/2025/09/manos-1024x949.jpg.webp',
    intro:'A curated Dominican rum and hand-rolled cigar tasting, set up on your villa terrace — bringing the spirit of the resort’s Cigars in Paradise festival home. With the Dominican Republic producing more premium cigars than any country on earth and a deep tradition of aged rum, an evening flight in the privacy of your own villa is one of the quiet pleasures of a Casa de Campo stay.',
    sections:[
      {h:'The experience', p:'A guided flight of Dominican rums is paired with premium local cigars from the great houses of this cigar country — Arturo Fuente, Montecristo, La Aurora, Davidoff and more. The pairing mirrors the format the resort celebrates each spring at its Cigars in Paradise festival, distilled to an intimate evening for your own group on the terrace. A guide talks you through each pour and pairing, from lighter rums to deeply aged expressions, so the tasting is as much an education as a pleasure.'},
      {h:'Why in-villa', p:'In the villa, the cigar lounge simply becomes the terrace — no bar, no schedule, no golf-cart ride home. Most Caribbean Paradise Homes villas allow cigar smoking on outdoor terraces, and an evening tasting works particularly well at properties with large outdoor lounges and an infinity pool. It is the relaxed, private counterpart to a night out at the Marina.'},
      {h:'Pairing the stay', p:'A terrace tasting rounds off a day spent at a cigar factory or rum distillery near La Romana perfectly, turning the day’s craft into the evening’s pleasure. For groups travelling for the festival, it is an easy way to extend the theme on the nights between the official events.'},
      {h:'Good to know', p:'Adults only. Your concierge can arrange the rum, the cigars and the setup for any evening of your stay, matched to your group’s tastes — as readily as a private chef or a stocked fridge. Let them know the night you’d like and they handle the rest.'},
    ],
    link:'https://caribbeanparadisehomes.com/cigars-in-paradise-casa-de-campo-2026/'
  },
  'massage': {
    eyebrow:'IN-VILLA · WELLNESS', title:'In-Villa Massage',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/Reception.webp',
    intro:'A certified therapist comes to your villa for a massage on your own terms — on the terrace at sunset, beside the pool, or in the quiet of your room. It is one of the in-villa wellness experiences that make renting at Casa de Campo a calmer kind of luxury: no golf-cart ride, no locker room, no waiting area. Just an unhurried treatment in your own space, timed to suit your day.',
    sections:[
      {h:'The treatment', p:'Choose the style and focus with your therapist — a relaxing Swedish or aromatherapy massage, a firmer deep-tissue session, or a couples’ massage side by side. Single, couples and small-group bookings all work in the villa, and the therapist brings the table, oils and everything needed, so all you do is choose the time and place.'},
      {h:'Why in-villa', p:'In-villa wellness is one of the genuine advantages of a villa over a hotel room. The concierge arranges a massage as readily as a private chef or a yoga session, bringing the practitioner to you. For couples and parents it removes every bit of friction — no travel, no booking desk, no leaving the children behind — and the villa setting is more private and relaxed than any treatment room.'},
      {h:'Pairing the day', p:'A massage at sunset is the natural close to a full day of golf, beach and water sports. Pair it with a morning in-villa yoga session for a complete at-home wellness day, keeping the spa itself for the days you want the hydrothermal circuit. Many guests book a standing treatment mid-stay, returning to the same therapist over a longer visit.'},
      {h:'Good to know', p:'Book the time, location and number of guests through your concierge, who coordinates in-villa wellness as part of the villa service and confirms final pricing. For the full hydrothermal circuit — sauna, steam, vitality and cold-plunge pools — visit the Forbes Four-Star spa itself, which complements the private, in-villa treatments rather than replacing them.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-spa/'
  },
  'yoga': {
    eyebrow:'IN-VILLA · WELLNESS', title:'Private Yoga',
    hero:'https://www.casadecampo.com.do/wp-content/smush-webp/2025/09/Minitas_-Beach-scaled.jpg.webp',
    intro:'A private session on your terrace or the beach, led by a certified instructor — one of the in-villa wellness experiences that make renting at Casa de Campo a quieter kind of luxury. No golf-cart ride, no locker room, no class schedule: just a personalised practice in your own space, set to the sound of the sea. It is the gentlest way to start a day at the resort.',
    sections:[
      {h:'The session', p:'A certified instructor tailors the practice to any level, from gentle stretching to a fuller flow, on your terrace, by your pool, or on the sand. Because it is private, the pace and focus are entirely yours — a calm, restorative counterpoint to the golf, water sports and island days that fill the rest of a stay.'},
      {h:'Why in-villa', p:'In-villa wellness is one of the genuine advantages of a villa over a hotel room. The concierge arranges a yoga session as readily as a spa treatment or a private chef, bringing the practitioner to you at a time you choose. For couples and parents, it removes every bit of friction — no travel, no booking desk, no leaving the children behind.'},
      {h:'Pairing the day', p:'An early session sets up the day before the heat builds and the beach fills, leaving the rest of the morning for Minitas or a tee time. Pair it with an in-villa massage on the terrace at sunset for a full at-home wellness day, with the spa itself reserved for the days you want the hydrothermal circuit. Many guests build a standing morning session into a longer stay, returning to the same practitioner who learns their level over the week.'},
      {h:'Good to know', p:'Book the time and location through your concierge, who coordinates in-villa wellness as part of the villa service. For the full hydrothermal circuit — sauna, steam, vitality and cold-plunge pools — visit the Forbes Four-Star spa itself, which complements the private, in-villa sessions rather than replacing them.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-spa/'
  },
  'entertainment': {
    eyebrow:'IN-VILLA · ENTERTAINMENT', title:'Live Entertainment',
    hero:'https://www.casadecampo.com.do/wp-content/uploads/2019/03/nightlife-cocktail-bar.jpg',
    intro:'Bring a little of the Marina’s evening energy to your villa — musicians and performers to set the mood for a dinner or celebration, coordinated by your concierge. The same kind of music that animates the Piazza Portofino on select evenings can be arranged in the privacy of your own villa terrace, turning a special dinner or milestone occasion into something more memorable.',
    sections:[
      {h:'What we can arrange', p:'Live soloists, small bands and DJs can be tailored to your event, group and setting — a guitarist for an intimate anniversary dinner, a small band for a celebration, music to carry a long evening on the terrace. It is the in-villa counterpart to the live performances that appear at the centre of the Marina’s piazza on select nights, scaled to suit your group and the size of your terrace rather than a public square.'},
      {h:'The setting', p:'A villa terrace, with its pool, garden and outdoor dining space, is a natural stage for an intimate evening of music — far more personal than a restaurant or bar. Paired with a private chef and a rum-and-cigar tasting, live entertainment turns the villa itself into the venue for the night.'},
      {h:'How it works', p:'Your concierge coordinates the timing and setup to suit your villa, your group and your neighbours, matching the performer to the occasion. Tell them whether you want background music for a dinner or a fuller set for a celebration, and the arrangement is shaped to fit. As with every in-villa experience at Casa de Campo, the aim is to remove the logistics so the evening simply happens around you.'},
      {h:'Good to know', p:'Please note that CPH villas do not permit parties, outside guests, or live music and karaoke beyond arranged in-villa entertainment, so any performance is coordinated within those house rules and kept considerate of neighbouring villas. Let your concierge know the occasion and the mood you’re after, and they will arrange the right performers for the evening.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-marina-guide/'
  },
  'family-programs': {
    eyebrow:'FAMILY · KIDS PROGRAMS', title:'Family Programs',
    hero:'https://www.casadecampo.com.do/wp-content/uploads/2024/01/EJ4B91245.jpg',
    intro:'Casa de Campo runs genuinely well-designed, supervised camp programmes for children from age one to seventeen — not afterthoughts with a splash pool and a kids’ menu, but structured camps that parents consistently cite as a trip highlight. Combined with the private-villa model and a fully gated, securely run resort, they mean every age stays happily busy while parents enjoy golf, the spa or a quiet dinner.',
    sections:[
      {h:'By age group', p:'Four programmes cover the full range: Toddlers ‘N’ Casa (ages 1–3) with playground time, crafts and puppet shows; Kidz ‘N’ Casa (4–7), the most action-packed, with beach Olympics, treasure hunts and pony rides; Casa Tweens (8–12), more active and skill-based; and Bonche 4 Teens (13–17), a dedicated zone with billiards, air hockey, music and organised events. Each is built for its age group rather than a one-size-fits-all club.'},
      {h:'What they do', p:'Across the programmes, children swim, play tennis, kayak the Chavón River, paddleboard at Minitas, try ceramics at Altos de Chavón, take pony rides at the equestrian centre, and join treasure hunts and beach Olympics. Older children can take a first shooting lesson or a catamaran trip to Catalina. They come back to the villa exhausted and happy — which is rather the point.'},
      {h:'Why it works for families', p:'The combination is what sets the resort apart: a private villa as a home base, total security inside the gates where older children can move freely, and a breadth of activity that means a six-year-old and a teenager can both have full, independent days without compromise. For multi-generational groups, it lets everyone do exactly what they want and reconvene for dinner.'},
      {h:'Good to know', p:'Reservations are strongly recommended, particularly in peak season (December through April) and over Christmas and New Year, when demand is highest. Your concierge can share the current schedule, book the programmes ahead, and coordinate them with nanny services, a private chef and the rest of your family’s plans before you arrive.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-for-families/'
  },
  'family-nannies': {
    eyebrow:'FAMILY · CHILDCARE', title:'Nannies &amp; Babysitting',
    hero:'https://www.casadecampo.com.do/wp-content/uploads/2025/09/Nanny-Services-2025.jpeg',
    intro:'Professionally trained nannies for daytime support or evening babysitting at the villa — so a special dinner at La Caña, or a couple’s morning on the golf course, is possible even with young children in tow. It is the service that makes the rest of a family trip work, giving parents genuine time of their own while children stay in trusted, capable hands at the villa.',
    sections:[
      {h:'The service', p:'Nannies are bilingual in Spanish and English and professionally trained in First Aid, CPR and childcare. They can provide daytime support while parents are present and nearby, or fully supervised evening care at the villa so adults can dine out. The villa setting means children stay in their own familiar space rather than an unfamiliar club room, with their own beds, toys and bedtime routine kept exactly as they are used to at home.'},
      {h:'When families use it', p:'The classic use is an adults’ evening at La Caña — the resort’s fine-dining flagship — which is best enjoyed without very young children at the table. It is equally useful for a morning round of golf, a spa visit, or simply a quiet adult breakfast on the terrace while the children sleep in. It complements the daytime kids’ programmes rather than duplicating them.'},
      {h:'Part of the family setup', p:'Babysitting sits alongside the resort’s supervised camp programmes and the private-chef service to give families full flexibility — early children’s dinner with a nanny, followed by a later adult dinner out or in. The concierge coordinates all of it together so the days run smoothly without a parent having to juggle the logistics.'},
      {h:'Good to know', p:'Book ahead through your concierge. During Christmas and New Year especially, demand significantly exceeds supply if left until arrival, so this is one of the services worth confirming well before you travel. Tell your concierge your children’s ages and the evenings you’d like covered, and they will arrange the right nanny in advance.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-for-families/'
  },
  'yacht-charter': {
    eyebrow:'MARINA · YACHT CHARTERS', title:'Yacht Charters',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/05/A745160-1024x683.jpg',
    intro:'Private yachts, catamarans and sailing boats with crew, departing straight from Casa de Campo Marina — for half-days, sunset cruises or island escapes that skip the group-boat crowds. The Marina is the operational base for nearly all of the resort’s water-based activity, and a private charter is the most comfortable, flexible way to see Casa de Campo from the sea on your own schedule.',
    sections:[
      {h:'The fleet', p:'The range runs from sleek motor yachts to sailing catamarans, crewed and provisioned to your plans, holding anything from a couple to a large villa group. For groups of eight or more, a private charter often works out similar per head to the scheduled boats while buying you a flexible schedule and your own space — and turns the transit itself into part of the day.'},
      {h:'Where to go', p:'Options include two-hour sunset cruises along the coast (departing around 5pm), snorkelling stops at Catalina, and full days to Saona — the protected nature reserve with its famous waist-deep natural pool offshore. A private Saona catamaran runs roughly US$600 for up to six guests, rising with group size, typically with lunch and an open bar included.'},
      {h:'Deep-sea fishing', p:'The waters off La Romana are among the most productive sport-fishing grounds in the Caribbean. Charters run year-round for blue and white marlin, with wahoo, dorado and snapper commonly encountered; full days depart around 7am and return by 3pm, with half-days available. Marlin is catch-and-release, but snapper and dorado can be kept for your villa chef to prepare.'},
      {h:'Good to know', p:'Charters book up in high season, particularly weekends, so reserve a few days ahead. Your concierge can match a boat to your group size and dates, time it around your other plans, and stock a cooler from your villa kitchen so you’re not paying bar prices all day. Transfers run from your villa door rather than a hotel lobby, and villa owners receive a courtesy-card discount on resort excursions.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-marina-guide/'
  },
  'genesis': {
    eyebrow:'NIGHTLIFE · GENESIS', title:'Genesis Nightclub',
    hero:'https://www.casadecampo.com.do/wp-content/uploads/2019/03/nightlife-cocktail-bar.jpg',
    intro:'Genesis is Casa de Campo’s true late-night destination, tucked into the cobbled, clifftop village of Altos de Chavón — the place the night ends, in the early hours, long after the restaurants have cleared and the village bars have called their last orders.',
    sections:[
      {h:'The village changes after dark', p:'By day, Altos de Chavón is a cultural village of galleries, artisan workshops and Chavón River views. After midnight it becomes the resort’s nightlife hub, and Genesis is where that energy concentrates — a proper dance floor, DJs and a dressed-up crowd that keeps going until dawn. It is the natural last stop on a big night out, when dinner is long finished and you are not ready to head back to the villa.'},
      {h:'The scene', p:'Expect international and Latin sets, bottle service and a lively, see-and-be-seen atmosphere that builds as the night goes on. Weekends and holiday weeks — especially Christmas and New Year — are the busiest, when the club draws both resort guests and visitors from around La Romana. Music tends to run from merengue, bachata and reggaeton to international house, so the floor stays full whatever you came to dance to.'},
      {h:'Make a night of it', p:'The beauty of Altos de Chavón is that everything sits a few minutes apart on foot. Start with dinner at La Piazzetta or Chilango, drift to Onno’s for cocktails as the square fills, then walk over to Genesis — no transfers, no driving, just a short stroll across the floodlit cobblestones, which is half the charm of a night up here.'},
      {h:'Good to know', p:'Opens late and runs into the early morning, and smart-casual dress is expected — trainers and beachwear may be turned away. For a group or a celebration, ask your concierge ahead of time about a reserved table or bottle service, and to arrange a golf cart or car back to your villa for the end of the night.'},
    ],
    link:'https://caribbeanparadisehomes.com/altos-de-chavon-complete-guide/'
  },
  'la-cana-night': {
    eyebrow:'NIGHTLIFE · LA CAÑA', title:'La Caña',
    hero:'https://www.casadecampo.com.do/wp-content/smush-webp/2025/07/La-Cana-1024x514.jpg.webp',
    intro:'By day, La Caña is the relaxed poolside restaurant at the main hotel; after dinner it becomes the social heart of Casa de Campo — the resort’s most dependable place for an evening of live music, rum and cigars without ever leaving the hotel core.',
    sections:[
      {h:'The after-dark scene', p:'Once the kitchen winds down, La Caña settles into bar mode: live bands and soloists, a long, low-lit terrace, and a crowd that lingers over cocktails rather than racing on to a club. It is the most central nightlife on the resort — no cart ride out to the Marina or Altos de Chavón — and the natural choice on a quieter evening when you want atmosphere without a late, loud night.'},
      {h:'Rum &amp; cigars', p:'La Caña is known for its curated Dominican rum selection and hand-rolled cigars, often with a roller on hand during peak weeks. It leans into the resort’s rum-and-cigar tradition, and makes a relaxed way to end a day on the golf course or the water — a slow drink with the music playing softly behind you.'},
      {h:'Who it suits', p:'This is the spot for couples and groups who want a refined, conversational night rather than a dance floor. It works equally well as a nightcap after dinner elsewhere on the resort, or as the whole evening — settle in early, order a flight of rum, and let the band carry the night along at its own unhurried pace.'},
      {h:'Good to know', p:'Resort-casual dress suits the room, and it is generally walk-in for drinks even when the restaurant is booked out for dinner. Live-music nights vary by season, so ask your concierge what’s scheduled during your stay. For a special occasion, we can reserve a prime terrace table, arrange a bottle or a cigar pairing in advance, and have a cart waiting to take you back to your villa.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-restaurants-the-complete-dining-guide/'
  },
  'sbg-night': {
    eyebrow:'NIGHTLIFE · SBG', title:'SBG',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/12/SBG_Marina_084-800x600-1.jpg',
    intro:'SBG — Sea, Beach, Grill — is a Mediterranean grill by day, but after dark it turns into one of the Marina’s liveliest nightspots, trading lunch service for DJ sets, cocktails and a waterfront crowd that settles in for the long evening.',
    sections:[
      {h:'The Marina after dark', p:'As the sun drops over the harbour, SBG’s easy daytime energy shifts up a gear: DJs take over, the bar fills, and the terrace becomes a see-and-be-seen spot among the yachts. It is a stylish, social night rather than a late club — dinner that slides into drinks and music, with the Marina lights reflecting on the water right beside your table.'},
      {h:'Around the harbour', p:'SBG anchors a walkable cluster of Marina venues — Causa, La Casita, Limoncello and Shibuya are all a few steps away — so an evening here can move easily from one terrace to the next without ever getting in a cart. Its Sunday brunch is a SBG signature too, if you want the daytime version of the same waterfront energy.'},
      {h:'Who it suits', p:'Best for guests who want a scene and some energy without committing to a 2am club — couples, groups and anyone who likes the idea of cocktails and a DJ with the harbour as a backdrop. It is the most glamorous of the resort’s waterfront nights, and the easiest to combine with a long Marina dinner.'},
      {h:'Good to know', p:'Smart-casual dress suits the Marina; reservations are sensible for dinner on busy weekend nights in high season, though the bar is generally walk-in for drinks. DJ nights vary by season and weekend, so ask your concierge what’s on during your stay — and we can reserve a waterfront table and time it neatly around the rest of your evening. Larger groups are easiest to seat earlier in the night, before the DJ sets draw the weekend crowd onto the terrace.'},
    ],
    link:'https://caribbeanparadisehomes.com/casa-de-campo-marina-guide/'
  },
  'onnos-night': {
    eyebrow:'NIGHTLIFE · ONNO’S', title:'Onno’s',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/12/onnosres.jpg',
    intro:'Onno’s runs from an all-day tapas spot to one of the liveliest late bars on the resort — the warm-up and the staying-out venue in Altos de Chavón, pouring more than 100 cocktails as the cobbled square fills up before Genesis Nightclub opens.',
    sections:[
      {h:'The late-night village', p:'After dinner, Altos de Chavón’s cultural calm gives way to its nightlife, and Onno’s sits right at the centre of it — music, a buzzing terrace and a crowd that builds steadily through the evening. It is the classic first stop on a big night in the village: cocktails and energy here, then a short walk across the cobblestones to Genesis when you are ready to dance.'},
      {h:'The drinks', p:'The headline is the cocktail list — more than a hundred of them — alongside shareable plates if you want to keep grazing. It is casual, loud in the best way, and built for groups, with the kind of all-night momentum that makes an evening in Altos de Chavón feel like a proper night out rather than just a drink.'},
      {h:'Make a night of it', p:'Everything in the village sits a few minutes apart on foot, so pair Onno’s with dinner at La Piazzetta or Chilango, drinks on the terrace, and Genesis to finish — no transfers, no driving, just a stroll across the floodlit square between each stop. It is the easiest big night to plan on the whole resort.'},
      {h:'Good to know', p:'Casual dress and generally walk-in friendly, though a reservation is sensible for larger groups in peak season. Comfortable flat shoes help on the uneven cobblestones. Ask your concierge what’s on in the village during your stay, and we can book ahead and arrange a cart back to your villa at the end of the night. It is also one of the few spots that genuinely runs late, so there is no need to rush the evening along.'},
    ],
    link:'https://caribbeanparadisehomes.com/altos-de-chavon-complete-guide/'
  },
  'transfer': {
    eyebrow:'TRAVEL · AIRPORT TRANSFER', title:'Private Airport Transfer',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/12/escalade.jpeg',
    intro:'A private meet &amp; greet at the airport and a direct, air-conditioned drive to your villa door — the smoothest possible start to a stay, with no taxi queues and no shared-shuttle stops. Your concierge arranges the vehicle to suit your group and flight, so someone is waiting the moment you land and your luggage is taken care of from the kerb to the villa.',
    sections:[
      {h:'How it works', p:'A driver meets you in the arrivals hall with your name on a board, helps with your bags, and takes you straight to your villa — where your concierge can have the fridge stocked and the air conditioning already running. Both VIP and standard private services are available, the VIP option adding plush seating, refreshments and a little extra attention along the way.'},
      {h:'Which airport', p:'La Romana (LRM) is the closest, roughly 15 minutes from the resort; Punta Cana (PUJ) is about an hour away; and Santo Domingo (SDQ) is around an hour and three-quarters. Your concierge sizes the vehicle to the airport, your group and your luggage — a sedan for a couple, an SUV or van for a family.'},
      {h:'Why private', p:'A private transfer removes the part of the journey most likely to go wrong: no waiting for a shared van to fill, no negotiating a fare after a long flight, no uncertainty about whether a driver will show. For late arrivals or families with young children, it is the single most worthwhile arrangement to confirm before you travel.'},
      {h:'Good to know', p:'Send your flight details to your concierge ahead of time and they will track the arrival, adjust for any delay, and have the driver waiting. Round-trip transfers can be booked together so the return to the airport is handled the same way. Rates depend on the airport and the vehicle, and your concierge confirms them in advance.'},
    ],
    link:'https://caribbeanparadisehomes.com/guest-services/'
  },
  'golfcart': {
    eyebrow:'TRAVEL · GETTING AROUND', title:'Golf Cart',
    hero:'https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2026/06/4-Person-Golf-Cart-Rental-Casa-de-Campo.webp',
    intro:'A golf cart is how everyone gets around Casa de Campo — the resort spreads across some 7,000 acres, and the cart is your everyday transport between the villa, the beach, the Marina, the golf courses and dinner. Most villas come with at least one; an extra or larger cart for a bigger group is one of the easiest things your concierge can arrange before you arrive.',
    sections:[
      {h:'Why you need one', p:'The resort is far too large to walk end to end, and these carts — for the internal resort roads, not the golf courses themselves — are the natural way to move around. From the Minitas-area villas the beach club is a two-to-five-minute ride; the Marina and Altos de Chavón are only a few minutes more. The cart turns the whole resort into an easy, on-demand neighbourhood.'},
      {h:'How many you need', p:'A couple manages easily with one cart; a family or a multi-bedroom villa group often wants a second, or a six-seater, so nobody is stranded while others are out. Tell your concierge your group size and they will make sure the right number of seats is waiting at the villa when you arrive.'},

// Turn a concierge-entered rate block (plain text, one item per line) into rows.
// "Label | Price" (or "Label — Price") → a rate row; "# Heading" → a sub-heading; anything else → a note.
function rateLinesToHtml(txt){
  return String(txt||'').split('\n').map(function(ln){
    ln=ln.trim(); if(!ln) return '';
    if(ln.charAt(0)==='#') return '<div class="rth">'+esc(ln.slice(1).trim())+'</div>';
    var i=ln.indexOf('|'); var sep=1;
    if(i<0){ var d=ln.indexOf(' — '); if(d>=0){ i=d; sep=3; } else { var h=ln.indexOf(' - '); if(h>=0){ i=h; sep=3; } } }
    if(i<0) return '<div class="rtnote">'+esc(ln)+'</div>';
    return '<div class="rt"><span>'+esc(ln.slice(0,i).trim())+'</span><span>'+esc(ln.slice(i+sep).trim())+'</span></div>';
  }).join('');
}

  if(refId==='golfcart'){ const per=(o.cartTypeRaw==='6-seater')?105:80; const q=Math.max(1,Number(o.cartQty)||1); return '$'+(per*q)+'/day'; }

/* WhatsApp handoff: open a wa.me chat with the concierge, prefilled with full stay context +
   a link back to the guest app. All concierge buttons route here — in-app chat is retired
   (messages archived server-side, UI removed). Optional `extra` is appended to the prefill. */
window.waHandoff=function(extra){
  const s=state.stay||{};
  const ph=(((s.concierge&&s.concierge.phone)||'')+'').replace(/[^0-9]/g,'')||'18297638801';
  const cn=(((s.concierge&&s.concierge.name)||'').split(' ')[0])||'there';
  const guest=(s.guest&&(s.guest.family||s.guest.lastName||s.guest.firstName))||'';
  const villa=((s.villa&&s.villa.name)||'')+(s.villaNumber?', Villa '+s.villaNumber:'');
  const ref=(s.booking&&s.booking.reference)||'';
  const fdY=iso=>{ const d=new Date(iso+'T00:00:00'); return isNaN(d)?'' : d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
  const dates=(s.booking&&s.booking.arrive)?(fdY(s.booking.arrive)+((s.booking.depart)?' – '+fdY(s.booking.depart):'')):'';
  const msg='Hi '+cn+', this is '+(guest?'the '+guest+' family':'a guest')+(villa?' at '+villa:'')+(dates?' ('+dates+')':'')+(ref?' — booking '+ref:'')+'.\n\n'+(extra?String(extra)+'\n':'');
  const url='https://wa.me/'+ph+'?text='+encodeURIComponent(msg);
  try{ const a=document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener'; document.body.appendChild(a); a.click(); setTimeout(function(){try{a.remove();}catch(e){}},0); }catch(e){ try{ window.open(url,'_blank'); }catch(_){ location.href=url; } }
};

function updateMsgs(){ const m=document.getElementById('msgs'); if(m){ m.innerHTML=state.messages.map(msgHtml).join(''); m.scrollTop=m.scrollHeight; } }

let _pollTimer=null;
function startPolling(){ if(_pollTimer) return; _pollTimer=setInterval(pollUpdates, 9000); }
function pollUpdates(){ pollRequests(); pollStay(); }  /* pollMessages retired with in-app chat */
/* poll the whole stay so concierge edits to static details (Wi-Fi, villa/registration number,
   dates, times, welcome, transfer) AND guest-owned data the concierge can see (grocery, meals,
   guest list, pre check-in) appear live — requests + messages are handled by their own pollers. */
let _staySig=null;
async function pollStay(){
  if(!state.stay||!state.token) return;
  const r=await api('/api/stay'); if(!r.ok||!r.body||!r.body.stay) return;
  const f=r.body.stay, s=state.stay;
  // Read receipts change often (each time a concierge opens the stay). Update just the chat ticks —
  // NOT via the main signature — so it never forces a full view re-render (which would collapse
  // open accordions / reset scroll on Home/Stay/Plan).
  if(f.staffReadAt!=null && f.staffReadAt!==s.staffReadAt){ s.staffReadAt=f.staffReadAt; const _mel=document.getElementById('msgs'); if(_mel) updateMsgs(); }
  const sig=JSON.stringify([f.booking,f.villa,f.concierge&&f.concierge.id,(f.addOns||[]).map(a=>a.id+':'+(a.rates||a.price||'')+':'+(a.recommended?1:0)).join('|'),f.staffHours,f.wifiName,f.wifiPassword,f.villaNumber,f.registrationNumber,f.welcomeMessage,f.guestList,f.grocery,f.mealPlan,f.guestCheckin,f.invoices,f.sentServices,f.yachtProposal]);
  if(sig===_staySig) return; _staySig=sig;
  // merge static + guest-owned fields (leave requests/messages to their pollers)
  s.booking=f.booking; s.villa=f.villa; s.concierge=f.concierge||s.concierge;
  ['staffHours','wifiName','wifiPassword','villaNumber','registrationNumber','welcomeMessage','wifiHandover'].forEach(k=>{ if(k in f) s[k]=f[k]; });
  s.guestList=f.guestList; s.grocery=f.grocery; s.mealPlan=f.mealPlan; s.guestCheckin=f.guestCheckin;
  // live-sync concierge-pushed items so an already-open guest app shows them (golden rule: console ↔ guest always wired)
  if('invoices' in f) s.invoices=f.invoices;
  if('sentServices' in f) s.sentServices=f.sentServices;
  if('addOns' in f) s.addOns=f.addOns; // rate edits in the console reach an open guest app
  if(document.querySelector('.reqov')) return;          // don't disrupt an open request modal
  const top=state.stack.length?state.stack[state.stack.length-1]:null;
  // only repaint read-only views — never while the guest is mid-form
  if(!top && (state.tab==='home'||state.tab==='stay')) render();
  else if(top==='plan'||top==='arrival'||top==='guide') render();
}
function stopPolling(){ if(_pollTimer){ clearInterval(_pollTimer); _pollTimer=null; } }
async function pollMessages(){
  if(!state.stay||!state.token) return;
  const r=await api('/api/messages'); if(!r.ok||!r.body||!r.body.messages) return;
  const server=r.body.messages; const curCount=state.messages.length-1;
  if(server.length>curCount){
    const greet=state.messages[0]||{from:'them',t:''};
    state.messages=[greet].concat(server.map(mm=>({from:mm.from==='guest'?'me':'them',t:mm.text,at:mm.at})));
    if(state.tab==='concierge'&&!state.stack.length) updateMsgs();
  }
}
/* poll for request status/price changes (concierge confirmations) so they appear live without a reload — mirrors the chat */
async function pollRequests(){
  if(!state.stay||!state.token) return;
  const r=await api('/api/requests'); if(!r.ok||!r.body||!Array.isArray(r.body.requests)) return;
  const server=r.body.requests, prev=state.stay.requests||[];
  const sig=a=>a.map(x=>x.id+':'+x.status+':'+(x.price||'')+':'+(x.updatedAt||'')).sort().join('|'); // updatedAt: staff edits to date/time/flight details must repaint too
  if(sig(server)===sig(prev)) return;            // nothing changed
  const prevMap={}; prev.forEach(x=>{ prevMap[x.id]=x; });
  const justConfirmed=server.find(x=>x.status==='confirmed' && (!prevMap[x.id] || prevMap[x.id].status!=='confirmed'));
  state.stay.requests=server;
  if(justConfirmed) toast('Confirmed by your concierge: '+justConfirmed.title+(justConfirmed.price?' · '+justConfirmed.price:''));
  if(document.querySelector('.reqov')) return;    // don't yank a request modal the guest is filling in
  const top=state.stack.length?state.stack[state.stack.length-1]:null;
  if(top==='plan' || (!top && state.tab==='home')) render();   // refresh the views that show request status
}

var _map=null;
function _mapApply(){
  if(!_map) return; var s=_map, fw=s.iw*s.scale, fh=s.ih*s.scale;
  if(fw<=s.cw){ s.tx=(s.cw-fw)/2; } else { if(s.tx>0)s.tx=0; if(s.tx<s.cw-fw)s.tx=s.cw-fw; }
  if(fh<=s.ch){ s.ty=(s.ch-fh)/2; } else { if(s.ty>0)s.ty=0; if(s.ty<s.ch-fh)s.ty=s.ch-fh; }
  s.img.style.transform='translate('+s.tx+'px,'+s.ty+'px) scale('+s.scale+')';
}
function _mapZoomTo(ns,px,py){
  if(!_map) return; var s=_map; ns=Math.max(s.min,Math.min(s.max,ns)); var f=ns/s.scale;
  s.tx=px-(px-s.tx)*f; s.ty=py-(py-s.ty)*f; s.scale=ns; _mapApply();
}
window.mapZoom=function(f){ if(!_map)return; _mapZoomTo(_map.scale*f,_map.cw/2,_map.ch/2); };
window.mapReset=function(){ if(!_map)return; _map.scale=_map.min; _mapApply(); };
function setupMapZoom(){
  var wrap=document.getElementById('mapWrap'), img=document.getElementById('mapImg');
  if(!wrap||!img) return;
  function size(){ var bar=document.querySelector('.backbar'); var bh=bar?bar.getBoundingClientRect().height:52; wrap.style.height=(window.innerHeight-bh)+'px'; }
  function init(){
    size();
    var iw=img.naturalWidth||1920, ih=img.naturalHeight||1280;
    img.style.width=iw+'px'; img.style.height=ih+'px';
    var cw=wrap.clientWidth, ch=wrap.clientHeight, fit=Math.min(cw/iw,ch/ih);
    _map={img:img,iw:iw,ih:ih,cw:cw,ch:ch,min:fit,max:fit*7,scale:fit,tx:(cw-iw*fit)/2,ty:(ch-ih*fit)/2};
    _mapApply();
  }
  if(img.complete && img.naturalWidth) init(); else img.onload=init;
  var pts={}, last=0;
  wrap.addEventListener('pointerdown',function(e){ try{wrap.setPointerCapture(e.pointerId);}catch(_){} pts[e.pointerId]={x:e.clientX,y:e.clientY};
    var now=Date.now(); if(now-last<300 && Object.keys(pts).length===1 && _map){ var r=wrap.getBoundingClientRect(); var ns=(_map.scale<=_map.min*1.25)?_map.min*2.6:_map.min; _mapZoomTo(ns,e.clientX-r.left,e.clientY-r.top); } last=now;
  });
  wrap.addEventListener('pointermove',function(e){ if(!pts[e.pointerId]||!_map)return; var ids=Object.keys(pts), r=wrap.getBoundingClientRect();
    if(ids.length===1){ var p=pts[e.pointerId]; _map.tx+=e.clientX-p.x; _map.ty+=e.clientY-p.y; p.x=e.clientX; p.y=e.clientY; _mapApply(); }
    else if(ids.length>=2){ var a=pts[ids[0]], b=pts[ids[1]], oldD=Math.hypot(a.x-b.x,a.y-b.y);
      pts[e.pointerId].x=e.clientX; pts[e.pointerId].y=e.clientY;
      var na=pts[ids[0]], nb=pts[ids[1]], newD=Math.hypot(na.x-nb.x,na.y-nb.y);
      if(oldD>0) _mapZoomTo(_map.scale*(newD/oldD),(na.x+nb.x)/2-r.left,(na.y+nb.y)/2-r.top);
    }
  });
  function up(e){ delete pts[e.pointerId]; }
  wrap.addEventListener('pointerup',up); wrap.addEventListener('pointercancel',up); wrap.addEventListener('pointerleave',up);
  wrap.addEventListener('wheel',function(e){ if(!_map)return; e.preventDefault(); var r=wrap.getBoundingClientRect(); _mapZoomTo(_map.scale*(e.deltaY<0?1.12:1/1.12),e.clientX-r.left,e.clientY-r.top); },{passive:false});
  window.addEventListener('resize',function(){ if(document.getElementById('mapWrap')===wrap && _map){ size(); _map.cw=wrap.clientWidth; _map.ch=wrap.clientHeight; _mapApply(); } });
}

function renderGuestList(){
  const s=state.stay;
  if(!state._gl){ const ex=(s.guestList&&s.guestList.length)?s.guestList:[{name:'',passport:''}]; state._gl=ex.map(g=>({name:g.name||'',passport:g.passport||''})); }

function glView(){
  const inp='flex:1;min-width:0;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:15px;font-family:var(--ui);background:#fff;box-sizing:border-box';
  const rows=state._gl.map((g,i)=>`<div style="display:flex;gap:8px;margin-top:9px;align-items:center"><input placeholder="Full name" value="${esc(g.name)}" oninput="glSet(${i},'name',this.value)" style="${inp}"><input placeholder="Passport no." value="${esc(g.passport)}" oninput="glSet(${i},'passport',this.value)" style="${inp}">${state._gl.length>1?`<button onclick="glDel(${i})" style="flex:0 0 auto;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;color:#9E5B43;font-size:18px">×</button>`:''}</div>`).join('');

    <div style="background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-top:4px">

    <button onclick="glAdd()" style="margin-top:11px;background:none;border:1px dashed var(--line);border-radius:11px;padding:11px;width:100%;color:var(--accent);font-size:14px;cursor:pointer">+ Add another guest</button>
    <button class="btn" style="margin-top:16px;background:var(--accent);color:#fff" onclick="glSave()">Submit guest list</button>`;

window.glSet=function(i,k,v){ if(state._gl&&state._gl[i]) state._gl[i][k]=v; };
window.glAdd=function(){ state._gl.push({name:'',passport:''}); glView(); };
window.glDel=function(i){ state._gl.splice(i,1); if(!state._gl.length)state._gl.push({name:'',passport:''}); glView(); };
window.glSave=async function(){ const guests=state._gl.filter(g=>(g.name||'').trim()||(g.passport||'').trim()); const r=await api('/api/guestlist',{method:'POST',body:JSON.stringify({guests})}); if(r.ok&&r.body.guestList){ state.stay.guestList=r.body.guestList; state._gl=null; toast('Guest list sent to your concierge'); pop(); } else toast('Could not send — please try again'); };

/* Zelle pay block — shown under a request once the concierge confirms it WITH a price.
   Zelle has no API, so we display-and-instruct: recipient email, amount, a memo to match the
   payment, and one-tap copy for each. Recipient is fixed to the CPH Zelle account. */
const ZELLE_EMAIL='janjvanwelie@gmail.com';
function zelleAmt(p){ const m=String(p||'').replace(/[^0-9.]/g,''); return m||''; }
function zelleRow(lbl,disp,copyVal,copyLabel){
  return `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:13px;padding:4px 0"><span style="color:#6E7B71;white-space:nowrap">${lbl}</span><span style="display:flex;align-items:center;gap:8px;min-width:0;justify-content:flex-end"><b style="overflow-wrap:anywhere;text-align:right">${esc(disp)}</b><button onclick="copyTxt('${esc(jsq(copyVal))}','${esc(jsq(copyLabel))}')" style="border:0;background:#EDE6F8;color:#6D1ED4;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap">Copy</button></span></div>`;
}
function zelleBox(r){
  if(!r||r.status!=='confirmed'||!r.price) return '';
  const amt=zelleAmt(r.price);
  const ref=(state.stay&&state.stay.booking&&state.stay.booking.reference)||'';
  const memo=[ref,(r.title||'')].filter(Boolean).join(' · ');
  return `<div style="margin-top:10px;border:1px solid #E2DAF0;background:#F7F4FC;border-radius:12px;padding:12px 13px">
    <div style="font-size:11px;font-weight:700;letter-spacing:.04em;color:#6D1ED4;text-transform:uppercase;margin-bottom:6px">Pay securely by Zelle</div>
    ${zelleRow('Send to',ZELLE_EMAIL,ZELLE_EMAIL,'Email')}
    ${zelleRow('Amount',esc(r.price),amt,'Amount')}
    ${memo?zelleRow('Memo',memo,memo,'Memo'):''}
    <div style="font-size:11.5px;color:#8A8597;margin-top:8px;line-height:1.5">Open your bank's app, choose Zelle, and send to the email above. Add the memo so we can match your payment. Your concierge confirms once it's received — no card details are ever entered here.</div>
  </div>`;
}

/* ---------------- MY PLAN (itinerary) ---------------- */
function renderPlan(){
  const s=state.stay,b=s.booking;
  const reqs=(reqList()||[]).slice().filter(r=>r&&r.status!=='cancelled').sort((a,b)=>((a.date||'zzzz')+'').localeCompare((b.date||'zzzz')+''));
  const pill=(r)=>r.status==='confirmed'
    ?`<span style="font-size:11px;background:#E2EAE0;color:#33493B;border-radius:20px;padding:2px 9px;font-weight:600;white-space:nowrap">Confirmed${r.price?' · '+esc(r.price):''}</span>`
    :r.status==='done'
    ?`<span style="font-size:11px;background:#E2EAE0;color:#33493B;border-radius:20px;padding:2px 9px;font-weight:600;white-space:nowrap">✓ Arranged</span>`
    :`<span style="font-size:11px;background:#EEF3EE;color:#6E7B71;border-radius:20px;padding:2px 9px;white-space:nowrap">Pending</span>`;
  const kv=(k,v)=>v?`<div style="display:flex;gap:9px;font-size:12.5px;margin-top:4px;line-height:1.45"><span style="color:var(--soft);flex:0 0 82px">${k}</span><span style="color:var(--ink);flex:1;min-width:0">${esc(v).replace(/\n/g,'<br>')}</span></div>`:'';
  const line=(r)=>{
    // The route/airport and any preferences are captured in the note (as "Route: …"); split them out so nothing is hidden.
    let route='', restNote='';
    (r.note||'').split('\n').forEach(ln=>{ const mm=ln.match(/^\s*Route:\s*(.+)$/i); if(mm){ route=mm[1].trim(); } else if(ln.trim()){ restNote+=(restNote?'\n':'')+ln.trim(); } });
    const dateBit=r.date?(fmtDate(r.date)+(r.endDate?' – '+fmtDate(r.endDate):'')):'';
    const details = kv('Head of family', r.familyName||'')
      + kv('Airline', r.airline||'')
      + kv('Flight #', r.flightNo||'')
      + kv('Flight from', r.flightOrigin||'')
      + kv('Arrival time', r.arrivalTime||'')
      + kv('Airport / route',route)
      + kv('Service', r.serviceLevel||'')
      + kv('Cart', r.cartType||'')
      + kv('When', dateBit)
      + kv('Time', r.time||'')
      + kv('Guests', r.guests?String(r.guests):'')
      + kv('Price', (r.status==='confirmed'&&r.price)?r.price:'')
      + kv('Notes', restNote);
    const body = details || `<div style="font-size:12.5px;color:var(--soft);margin-top:5px">Details to be confirmed with your concierge.</div>`;
    return `<div class="row" style="cursor:default;align-items:flex-start"><span class="ic">✦</span><span class="tx" style="flex:1"><b style="display:block">${esc(r.title||'Request')}</b><div style="margin-top:6px">${pill(r)}</div><div style="margin-top:7px">${body}</div>${zelleBox(r)}<div style="display:flex;gap:9px;margin-top:11px">${r.status==='done'?`<span style="font-size:12.5px;color:var(--soft);align-self:center">Arranged — message your concierge for any change</span>`:`<button onclick="editReq('${esc(r.id)}')" style="border:1px solid var(--line);background:#fff;color:var(--accent);border-radius:11px;padding:9px 16px;font-size:13px;cursor:pointer">Edit</button>`}<button onclick="confirmRemoveReq('${esc(r.id)}')" style="border:1px solid #E3C4B6;background:#fff;color:#9E5B43;border-radius:11px;padding:9px 16px;font-size:13px;cursor:pointer">Cancel</button></div></span></div>`; };
  const inner=`
    <div class="card" style="background:var(--accent);color:#fff;border:0">
      <div class="label" style="color:rgba(255,255,255,.7)">MY PLAN</div>
      <div class="display" style="font-size:24px;margin:4px 0 4px">${esc(s.villa.name)}</div>
      <div style="font-size:13px;color:rgba(255,255,255,.85)">${b.arrive?fmtDate(b.arrive):''} – ${b.depart?fmtDate(b.depart):''}${b.nights?' · '+b.nights+' nights':''}</div>
    </div>
    ${(function(){ const ss=(s.sentServices||[]); if(!ss.length) return '';
      const row=(x)=>{ const meta=[x.option,x.rate].filter(Boolean).map(esc).join(' · ');
        let action;
        if(x.status==='confirmed') action=`<span style="font-size:11px;background:#E2EAE0;color:#33493B;border-radius:20px;padding:3px 10px;font-weight:600">✓ Confirmed</span>`;
        else if(x.status==='declined') action=`<span style="font-size:11px;background:#F6E5DD;color:#9E5B43;border-radius:20px;padding:3px 10px;font-weight:600">Declined</span> <button onclick="respondSent('${esc(x.id)}','confirmed')" style="margin-left:6px;background:none;border:0;color:var(--accent);font-size:12.5px;text-decoration:underline;cursor:pointer">Confirm instead</button>`;
        else action=`<div style="display:flex;gap:9px"><button onclick="respondSent('${esc(x.id)}','confirmed')" style="background:var(--accent);color:#fff;border-radius:11px;padding:9px 16px;font-size:13px">Confirm</button><button onclick="respondSent('${esc(x.id)}','declined')" style="border:1px solid var(--line);background:#fff;color:var(--soft);border-radius:11px;padding:9px 16px;font-size:13px">Decline</button></div>`;
        return `<div class="row" style="cursor:default;align-items:flex-start"><span class="ic">✦</span><span class="tx" style="flex:1"><b>${esc(x.name)}</b>${meta?`<span style="display:block;margin-top:4px;font-size:12.5px;color:var(--accent);font-weight:600">${meta}</span>`:''}${x.note?`<span style="display:block;margin-top:3px">${esc(x.note)}</span>`:''}<div style="margin-top:10px">${action}</div></span></div>`; };
      return `<div class="sec-title">Arranged for you</div><div style="font-size:12.5px;color:var(--soft);margin:0 0 4px;line-height:1.5">Your concierge has set these up for your stay — please confirm or decline.</div>${ss.map(row).join('')}`;
    })()}
    ${(function(){ const yp=s.yachtProposal; if(!yp||!(yp.options||[]).length) return '';
      const chosenId=yp.chosenId||''; const isChosen=yp.status==='chosen'; const locked=!!yp.invoiced; // invoiced = boat choice locked; changes go through the concierge
      const opt=(o)=>{ const picked=isChosen&&o.id===chosenId;
        return `<div class="card" style="padding:14px 15px;${picked?'border:1px solid #BFD3C2;background:#F4F8F3':''}"><div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px"><b style="font-size:14.5px">${esc(o.name)}</b>${o.rate?`<span style="font-size:13px;color:var(--accent);font-weight:600;white-space:nowrap">${esc(o.rate)}</span>`:''}</div>${o.detail?`<div style="font-size:13px;color:var(--soft);line-height:1.5;margin-top:5px">${esc(o.detail)}</div>`:''}<div style="margin-top:11px">${picked?`<span style="font-size:11px;background:#E2EAE0;color:#33493B;border-radius:20px;padding:3px 11px;font-weight:600">✓ Your choice${locked?' · invoiced':''}</span>`:locked?'':isChosen?`<button onclick="chooseYacht('${esc(o.id)}')" style="border:1px solid var(--line);background:#fff;color:var(--accent);border-radius:11px;padding:9px 15px;font-size:13px">Choose this instead</button>`:`<button onclick="chooseYacht('${esc(o.id)}')" style="background:var(--accent);color:#fff;border-radius:11px;padding:9px 16px;font-size:13px">Choose this</button>`}</div></div>`; };

          ${iv.note?`<div style="font-size:12.5px;color:var(--soft);margin-top:8px;line-height:1.5">${esc(iv.note)}</div>`:''}
          ${paid?'':`<div style="margin-top:10px;border:1px solid #E2DAF0;background:#F7F4FC;border-radius:12px;padding:12px 13px"><div style="font-size:11px;font-weight:700;letter-spacing:.04em;color:#6D1ED4;text-transform:uppercase;margin-bottom:6px">Pay by Zelle</div>${zelleRow('Send to',ZELLE_EMAIL,ZELLE_EMAIL,'Email')}${zelleRow('Amount',fmt(iv.total),String(iv.total||''),'Amount')}${memo?zelleRow('Memo',memo,memo,'Memo'):''}<div style="font-size:11.5px;color:#8A8597;margin-top:8px;line-height:1.5">Open your bank's app, choose Zelle, send to the email above and add the memo. Your concierge marks it paid once received.</div></div>`}
          <button onclick="invoicePrint('${esc(iv.id)}')" style="margin-top:10px;width:100%;border:1px solid var(--line);background:#fff;color:var(--accent);border-radius:11px;padding:10px;font-size:13px;cursor:pointer">Print / Save PDF</button></div>`; };
      const due=invs.filter(iv=>iv.status!=='paid'); const outstanding=due.reduce((a,iv)=>a+(Number(iv.total)||0),0);
      const banner=due.length?`<div style="background:#FBECEC;border:1px solid #E8C9C9;border-radius:12px;padding:11px 13px;margin-top:11px;display:flex;justify-content:space-between;align-items:center;gap:10px"><span style="font-size:13px;color:#9A2B2B;font-weight:600">Payment due</span><span style="font-size:14px;color:#9A2B2B;font-weight:700">${fmt(outstanding)} outstanding</span></div>`:'';

    ${(function(){ const g=s.grocery; if(!g||!((g.items&&g.items.length)||g.note)) return '';

      const bookedIds=new Set((reqList()||[]).filter(r=>r&&r.type==='addon'&&r.status!=='cancelled').map(r=>r.refId));

/* Build a clean, branded one-page itinerary and open it as its own page so the phone's
   Print / Save-as-PDF captures it. (Calling print() inside the /my-stay/ iframe prints the
   outer page and produces a blank sheet, so we open a fresh top-level document instead.) */
window.printItinerary=function(){
  const s=state.stay; if(!s) return;
  const b=s.booking, v=s.villa, g=s.guest;
  const reqs=(s.requests||[]).slice().filter(r=>r&&r.status!=='cancelled').sort((a,b)=>((a.date||'zzzz')+'').localeCompare((b.date||'zzzz')+''));
  const fmt=iso=>iso?fmtDate(iso):'—';
  const r2=(k,val)=>`<tr><td style="padding:4px 14px 4px 0;color:#6B756C;white-space:nowrap;vertical-align:top">${k}</td><td style="padding:4px 0">${val}</td></tr>`;
  const reqRow=r=>{ const when=[r.date?fmtDate(r.date)+(r.endDate?' → '+fmtDate(r.endDate):''):'',r.time||'',r.guests?r.guests+' guest'+(r.guests==1?'':'s'):''].filter(Boolean).join(' · ');
    const status=r.status==='confirmed'?('Confirmed'+(r.price?' · '+esc(r.price):'')):r.status==='done'?'Arranged ✓':'Requested';
    let detail='';
    if(r.refId==='transfer'){ const mm=String(r.note||'').match(/Route:\s*([^\n]+)/i); detail=[mm&&mm[1].trim(),r.serviceLevel].filter(Boolean).join(' · '); }
    else if(r.cartType){ detail=[r.cartType,r.serviceLevel].filter(Boolean).join(' · '); }
    else { detail=r.serviceLevel||''; }
    const sub=detail?`<div style="font-size:11.5px;color:#8A938B;margin-top:2px">${esc(detail)}</div>`:'';
    return `<tr><td style="padding:7px 0;border-top:1px solid #E6E9E2">${esc(r.title||'Request')}${sub}</td><td style="padding:7px 0;border-top:1px solid #E6E9E2;color:#54605A">${esc(when||'Date to be confirmed')}</td><td style="padding:7px 0;border-top:1px solid #E6E9E2;text-align:right;white-space:nowrap">${esc(status)}</td></tr>`; };
  const gk=(k,val)=>`<tr><td style="padding:6px 14px 6px 0;color:#6B756C;white-space:nowrap;vertical-align:top;font-weight:600;border-top:1px solid #EEF1EC">${k}</td><td style="padding:6px 0;border-top:1px solid #EEF1EC">${val}</td></tr>`;
  const air=esc(b.airport||'LRM');
  const body=`
    <div style="display:flex;align-items:center;gap:12px;border-bottom:2px solid #16241E;padding-bottom:12px">
      <img src="${SEAL}" alt="" style="width:46px;height:auto">
      <div><div class="hd" style="font-size:22px;font-weight:600;line-height:1">Caribbean Paradise Homes</div><div style="font-size:11px;color:#6B756C;letter-spacing:.18em;margin-top:3px">MY STAY ITINERARY</div></div>
    </div>
    <h1 class="hd" style="font-size:27px;margin:18px 0 2px;font-weight:600">${esc(v.name||'Your villa')}</h1>
    <div style="font-size:13px;color:#6B756C">${esc([v.internalName||v.area,v.view].filter(Boolean).join(' · '))}</div>
    <table style="font-size:13.5px;margin-top:16px;border-collapse:collapse">
      ${r2('Guest',esc(g.family?g.family+' family':g.firstName||'—'))}
      ${r2('Check-in',fmt(b.arrive)+' · '+esc(b.checkInTime||'3:00 PM'))}
      ${r2('Check-out',fmt(b.depart)+' · '+esc(b.checkOutTime||'11:00 AM'))}
      ${b.nights!=null?r2('Nights',String(b.nights)):''}
      ${s.villaNumber?r2('Villa','Villa '+esc(s.villaNumber)+', '+esc(v.area||'Casa de Campo')+', La Romana'):''}
      ${s.wifiName?r2('Wi-Fi',esc(s.wifiName)+(s.wifiPassword?' · '+esc(s.wifiPassword):'')):''}
      ${s.registrationNumber?r2('Registration #',esc(s.registrationNumber)):''}
      ${r2('Concierge',esc((s.concierge&&s.concierge.name)||'')+' · '+esc((s.concierge&&s.concierge.phone)||'+1 (829) 763-8801'))}
    </table>
    <h2 class="hd" style="font-size:18px;margin:24px 0 4px;font-weight:600;border-bottom:1px solid #D9DDD5;padding-bottom:6px;page-break-after:avoid">Getting here</h2>
    <ol style="font-size:13px;line-height:1.55;color:#33403A;padding-left:18px;margin:4px 0 0">
      <li style="margin-bottom:7px"><b>Before you arrive —</b> Fill out the Dominican Republic E‑Ticket at eticket.migracion.gob.do. Your address in the DR: Casa de Campo, La Romana, Province La Romana, Section Central Romana, Dominican Republic.</li>
      <li style="margin-bottom:7px"><b>Pre‑arrival registration —</b> Send each guest’s full name &amp; passport number so we can pre‑register your group; you’ll receive a Registration Number for check‑in.${s.registrationNumber?' Your Registration #: <b>'+esc(s.registrationNumber)+'</b>.':''}</li>
      <li style="margin-bottom:7px"><b>Airport Pick-up —</b> Your driver waits just outside customs with a sign showing your name. We monitor your flight; the driver waits up to 1 hour after you land.</li>
      <li style="margin-bottom:7px"><b>Resort main gate —</b> Stop to complete registration; have each guest’s passport and a credit card ready. The resort fee is settled here.</li>
      <li style="margin-bottom:7px"><b>Resort fee —</b> US$30 per adult/day (12+), US$15 per child/day (4–12), free for children 3 and under.</li>
      <li><b>Arrive at ${esc(v.name||'your villa')} —</b> Your concierge welcomes you and hands over the keys &amp; Wi‑Fi in person. Check‑in from ${esc(b.checkInTime||'3:00 PM')}.</li>
    </ol>

    <h2 class="hd" style="font-size:18px;margin:26px 0 6px;font-weight:600;border-bottom:1px solid #D9DDD5;padding-bottom:6px">Requests &amp; bookings</h2>
    <div style="font-size:12px;color:#6B756C;padding:2px 0 6px;line-height:1.5">To change any information about your bookings, go to your My Plan section in the app.</div>
    ${reqs.length?`<table style="width:100%;font-size:13.5px;border-collapse:collapse">
      <thead><tr style="text-align:left;color:#8A938B;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase"><th style="padding:4px 0;font-weight:600">Item</th><th style="padding:4px 0;font-weight:600">When</th><th style="padding:4px 0;font-weight:600;text-align:right">Status</th></tr></thead>
      <tbody>${reqs.map(reqRow).join('')}</tbody></table>`:`<div style="font-size:13px;color:#6B756C;padding-top:6px">Nothing arranged yet.</div>`}

    ${(function(){ const gc=s.grocery; if(!gc||!((gc.items&&gc.items.length)||gc.note)) return '';
      const by={}; (gc.items||[]).forEach(it=>{(by[it.category]=by[it.category]||[]).push(it);});
      const rows=Object.keys(by).map(cat=>`<tr><td style="padding:6px 14px 6px 0;color:#33403A;font-weight:600;vertical-align:top;border-top:1px solid #EEF1EC;white-space:nowrap">${esc(cat)}</td><td style="padding:6px 0;border-top:1px solid #EEF1EC;color:#54605A">${by[cat].map(it=>esc(it.name)+' ×'+it.qty).join(', ')}</td></tr>`).join('');
      const noteRow=gc.note?`<tr><td style="padding:6px 14px 6px 0;color:#33403A;font-weight:600;vertical-align:top;border-top:1px solid #EEF1EC">Notes / allergies</td><td style="padding:6px 0;border-top:1px solid #EEF1EC;color:#54605A">${esc(gc.note)}</td></tr>`:'';
      return `<h2 class="hd" style="font-size:18px;margin:26px 0 6px;font-weight:600;border-bottom:1px solid #D9DDD5;padding-bottom:6px;page-break-after:avoid">Provisioning</h2><table style="width:100%;font-size:13.5px;border-collapse:collapse">${rows}${noteRow}</table>`;
    })()}
    ${(function(){ const mp=s.mealPlan; if(!mealPlanHasAny(mp)) return '';
      const rowHtml=(lbl,m)=>{ const meta=[m.date?fmtDate(m.date):'',m.time||'',m.guests?m.guests+' guests':''].filter(Boolean).join(' · '); return `<tr><td style="padding:6px 14px 6px 0;font-weight:600;color:#33403A;vertical-align:top;border-top:1px solid #EEF1EC;white-space:nowrap">${esc(lbl)}</td><td style="padding:6px 0;border-top:1px solid #EEF1EC;color:#54605A">${esc([meta,m.desc].filter(Boolean).join(' — '))}</td></tr>`; };
      let rows=''; mealsSorted(mp).forEach(({lbl,m})=>{ rows+=rowHtml(lbl,m); });
      const noteRow='';   // meal notes are staff-only — shown in the console, hidden from the guest plan
      return `<h2 class="hd" style="font-size:18px;margin:26px 0 6px;font-weight:600;border-bottom:1px solid #D9DDD5;padding-bottom:6px;page-break-after:avoid">Arrival meals</h2><table style="width:100%;font-size:13.5px;border-collapse:collapse">${rows}${noteRow}</table>`;
    })()}

    <h2 class="hd" style="font-size:18px;margin:26px 0 6px;font-weight:600;border-bottom:1px solid #D9DDD5;padding-bottom:6px;page-break-after:avoid">Good to know</h2>
    <table style="font-size:13px;border-collapse:collapse;width:100%">
      ${gk('Villa staff','Daily 8 AM–5 PM unless arranged. Beyond hours: US$60 per staff member (cash).')}
      ${gk('Tipping','Suggested US$35–45 per day, per staff member, in cash. ATMs at the Hotel, Minitas Beach and the Marina.')}
      ${(s.wifiName||s.wifiPassword)?gk('Wi‑Fi','Network <b>'+esc(s.wifiName||'—')+'</b> · Password <b>'+esc(s.wifiPassword||'—')+'</b>'):gk('Wi‑Fi','Provided in your villa on arrival.')}
      ${gk('Getting around','Google Maps &amp; Waze work inside the resort — pin your villa. Photograph your golf cart to find it easily.')}
      ${gk('Groceries','Marina: wine &amp; spirits, bakery, El Nacional supermarket. Larger supermarkets in La Romana.')}
      ${gk('Check‑out','By '+esc(b.checkOutTime||'11:00 AM')+' — late check‑out on request.')}
      ${gk('Reservations','Owner’s Club +1 809‑523‑3165 (ext. 3165 / 3166), or message your concierge.')}
      ${gk('Emergencies','General 911 · Fire 5555 · Resort security 5193 / 5194.')}

    <div style="margin-top:28px;font-size:10.5px;color:#9AA49B;border-top:1px solid #D9DDD5;padding-top:10px">Generated ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})} · caribbeanparadisehomes.com · Final prices are confirmed by your concierge.</div>
    <button onclick="window.print()" class="noprint" style="margin:26px auto 0;display:block;background:#16241E;color:#fff;border:0;border-radius:11px;padding:12px 20px;font-size:15px;cursor:pointer">Print / Save as PDF</button>`;
  const html='<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Stay Itinerary</title>'
    +'<style>*{box-sizing:border-box}body{margin:0;color:#1F2A24;background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-print-color-adjust:exact;print-color-adjust:exact}'
    +'.wrap{max-width:720px;margin:0 auto;padding:26px 22px}.hd{font-family:Georgia,"Times New Roman",serif}'
    +'@media print{.noprint{display:none!important}}@page{margin:14mm}</style></head>'
    +'<body><div class="wrap">'+body+'</div></body></html>';
  const win=window.open('','_blank');
  if(!win){ toast('Allow pop-ups, then tap Print again'); return; }
  win.document.open(); win.document.write(html); win.document.close();
  try{ win.focus(); }catch(e){}
  setTimeout(function(){ try{ win.print(); }catch(e){} }, 500);

/* ---------------- ARRIVAL MEALS (PDF-style: breakfast / lunch / dinner) ---------------- */
const MEALS_DEF=[['snacks','Welcome snacks & drinks'],['breakfast','Breakfast / Desayuno'],['lunch','Lunch / Comida'],['dinner','Dinner / Cena']];
const MEAL_SUMMARY_KEYS=[['snacks','Welcome snacks & drinks'],['breakfast','Breakfast'],['lunch','Lunch'],['dinner','Dinner']];
function mealItemHas(m){ return !!(m&&(m.date||m.time||m.guests||m.desc)); }
function mealPlanHasAny(mp){ if(!mp) return false; return MEAL_SUMMARY_KEYS.some(([k])=>mealItemHas(mp[k])) || (mp.extra||[]).some(mealItemHas); }
// Chronological ordering of meals by date + time (parses "7pm", "8am-10am", "12:30pm").
function mealMinutes(t){ t=String(t||'').toLowerCase().trim(); const mm=t.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/); if(!mm) return 0; let h=parseInt(mm[1],10)||0; const min=parseInt(mm[2]||'0',10); if(mm[3]==='pm'&&h<12)h+=12; if(mm[3]==='am'&&h===12)h=0; return h*60+min; }
function mealSortVal(m){ const d=(m&&m.date)?Date.parse(m.date+'T00:00:00'):NaN; const base=isFinite(d)?d:8.64e15; return base + mealMinutes(m&&m.time)*60000; }
function mealsSorted(mp){ const out=[]; MEAL_SUMMARY_KEYS.forEach(([k,lbl])=>{ if(mealItemHas(mp[k])) out.push({lbl,m:mp[k]}); }); (mp.extra||[]).forEach(m=>{ if(mealItemHas(m)) out.push({lbl:m.type||'Additional meal',m}); }); out.sort((a,b)=>mealSortVal(a.m)-mealSortVal(b.m)); return out; }
window.openMeals=function(){
  const mp=(state.stay&&state.stay.mealPlan)||{};
  state._meals={note:mp.note||'', extra:(mp.extra||[]).map(x=>Object.assign({},x))}; MEALS_DEF.forEach(([k])=>{ state._meals[k]=Object.assign({},mp[k]); });
  push('mealplan');
};
window.mealMeal=function(key,field,val){ if(!state._meals[key])state._meals[key]={}; state._meals[key][field]=val; };
window.mealExtra=function(i,field,val){ if(!state._meals.extra)state._meals.extra=[]; if(!state._meals.extra[i])state._meals.extra[i]={}; state._meals.extra[i][field]=val; };

function mealsText(){
  const M=state._meals||{}; const s=state.stay; const L=[];
  L.push('ARRIVAL MEALS'); L.push((s.villa.name||'')+(s.guest.family?(' — '+s.guest.family+' family'):'')); L.push('');
  const meal=(lbl,m)=>{ if(m.date||m.time||m.guests||m.desc){ L.push(String(lbl).toUpperCase());
    const meta=[m.date?('Date: '+m.date):'',m.time?('Time: '+m.time):'',m.guests?('Guests: '+m.guests):''].filter(Boolean).join(' · '); if(meta)L.push(meta);
    if(m.desc)L.push('Dishes: '+m.desc); L.push(''); } };
  MEALS_DEF.forEach(([k,lbl])=>meal(lbl,M[k]||{}));
  (M.extra||[]).forEach(m=>meal(m.type||'Additional meal',m));
  if(M.note) L.push('NOTES: '+M.note);
  return L.join('\n');
}

      ${pick('Family dinner, no fuss','Chilango Taquería','Altos de Chavón')}
      ${pick('Fine Italian in a village','La Piazzetta','Altos de Chavón')}
      ${pick('Something genuinely different','Causa · Peruvian','Marina')}
      ${pick('Early breakfast, golf views','Lago','Teeth of the Dog')}
      ${pick('Post-golf lunch & drinks','19th Hole Bar','Teeth of the Dog')}
      ${pick('Casual pizza, any evening','Limoncello / Massa','Marina / resort')}
      ${pick('Pre-concert drinks','Onno’s','Altos de Chavón')}

/* ---------------- GOLF GUIDE ---------------- */

    <div style="background:#F1F4EF;border:1px solid #cfe0c8;border-radius:14px;padding:14px 15px;margin-top:11px">
      <b style="font-size:14.5px">Booking your tee times</b>
      <div style="font-size:13.5px;color:var(--ink);line-height:1.55;margin-top:5px">In peak season (Dec&ndash;April), Teeth of the Dog books up <b>2&ndash;4 weeks ahead</b> &mdash; reserve early through the pro shop or online.</div>
      <a href="https://www.casadecampoteetimes.com/book.php?t=17825874558980c33587c662969cb3b50dfe47ff521726892188e08d20a5126428b7e6324810cdc4084f" target="_blank" rel="noopener" style="display:inline-block;margin-top:10px;background:var(--accent);color:#fff;border-radius:11px;padding:9px 14px;font-size:13px;text-decoration:none">Book your tee time</a>
    </div>

    <div class="sec-title">The three courses</div>
    ${courseCard('Teeth of the Dog','Bucket-list',[['Setting','7 oceanfront holes'],['Difficulty','Very challenging'],['Green fee 2026','$750 / person'],['Book','2&ndash;4 weeks ahead']],`Widely ranked the <b>greatest course in the Caribbean</b> and a perennial world Top 100. Seven holes play right along the Caribbean Sea over jagged coral &mdash; hole 7, over the ocean, is one of the most photographed par 3s in golf. Reopened Dec 2025 after a $15M restoration, playing better than ever. Caddie mandatory.`)}
    ${courseCard('Dye Fore','Views &amp; drama',[['Setting','Cliff-top · 27 holes'],['Difficulty','Challenging'],['Views','Chav&oacute;n River valley'],['Book','5&ndash;7 days ahead']],`Carved into the cliffs above the Chav&oacute;n River, 90m below &mdash; among the most spectacular settings in the hemisphere. A 27-hole layout (Chav&oacute;n, Marina, Lakes) played as different combinations. Easy to pair with lunch up at Altos de Chav&oacute;n.`)}
    ${courseCard('The Links','Strategy &amp; rhythm',[['Setting','Rolling inland'],['Difficulty','Most accessible'],['Best for','Repeat &amp; group play'],['Book','Often same week']],`Inspired by British &amp; Scottish links &mdash; no ocean or cliff drama, but a clever strategic course that rewards repeat play. The most forgiving of the three, the best round for mixed-ability groups, and ideal for warming up.`)}

    <div class="sec-title">The order we&rsquo;d play them</div>
    <div style="background:var(--card);border:1px solid var(--line);border-radius:14px;padding:2px 15px 14px;margin-top:2px">
      ${pick('Day 1 &mdash; fresh, before you&rsquo;ve acclimatised','The Links')}
      ${pick('Day 2 &mdash; full energy for the elevation','Dye Fore')}
      ${pick('Day 3 &mdash; the marquee round, fully settled','Teeth of the Dog')}

    ${card('Shorter trips','Only one round? <b>Teeth of the Dog</b> is non-negotiable. Two days? Teeth of the Dog, then Dye Fore. Golf as one activity among many on a family trip? <b>The Links</b> plays fastest and is the least exhausting.')}

    <div class="sec-title">Which course is right for you?</div>

      ${pick('Most spectacular single hole','Teeth of the Dog · 7')}
      ${pick('Dramatic views, no ocean holes','Dye Fore')}
      ${pick('Combine golf with Altos de Chav&oacute;n','Dye Fore')}
      ${pick('First time / want to warm up','The Links')}
      ${pick('Higher-index, enjoyable round','The Links')}
      ${pick('Group with mixed abilities','The Links')}
    </div>
    ${card('Good to know','Green fees include a cart (Teeth of the Dog also includes range balls). The resort access fee does <b>not</b> cover green fees. Caddies are mandatory on Teeth of the Dog, recommended on Dye Fore, optional on The Links. Rental sets (Titleist, Callaway) are available at every pro shop.')}

    </div>`;
  shell('Golf guide', inner);

/* ---------------- RESORT EXPERIENCES GUIDE ---------------- */
