    ${card('Wellness &amp; creativity','The reborn Forbes Four-Star Spa — a US$25M rebuild — is the resort’s calm centre, with a hydrothermal circuit and in-villa treatments your concierge can arrange. For something hands-on, a pottery session in Altos de Chavón’s artisan tradition is a lovely afternoon, especially with children.')}

      <button onclick="goTab('concierge')" style="margin-top:10px;background:var(--accent);color:#fff;border-radius:11px;padding:9px 14px;font-size:13px">Ask concierge to arrange</button>
    </div>
    <div class="sec-title">Best experience, by interest</div>
    <div style="background:var(--card);border:1px solid var(--line);border-radius:14px;padding:2px 15px 14px;margin-top:2px">
      ${pick('A day on the Caribbean','Yacht / catamaran charter','Marina')}
      ${pick('The trip everyone remembers','Catalina Island','Marina')}
      ${pick('Relax &amp; reset','The Spa','Rejuvenate')}
      ${pick('Beach &amp; water sports','Minitas Water Sports','Minitas Beach')}
      ${pick('Ride through the countryside','Horseback Riding Tour','Equestrian Center')}
      ${pick('Lessons &amp; polo','Equestrian Center','Polo fields')}
      ${pick('Clays, trap &amp; skeet','Shooting Center','Shooting grounds')}
      ${pick('Tennis on clay','Racquet Center','La Terraza')}
      ${pick('A scenic paddle','Chavón River Kayak','Chavón River')}
      ${pick('Hands-on afternoon','Pottery','Altos de Chavón')}

    </div>
    <div style="font-size:14px;color:var(--soft);line-height:1.6;margin-top:14px">Beyond your villa, the resort’s amenities cluster into a handful of distinct places, each a short golf-cart ride away. Knowing what each is best for — and when to go — is the difference between a good week and a seamless one.</div>
    ${card('Minitas Beach','The resort’s only beach — a sheltered, west-facing crescent of soft sand and calm, swimmable water, raked and serviced daily. It’s the heart of resort daytime life: sun loungers and umbrellas, the Minitas Beach Club for Mediterranean-Caribbean lunches, and water sports off the sand (paddleboards, kayaks, Hobie Cats, snorkelling). Because it faces west, it’s also the best sunset on the property — worth timing a drink or dinner around.')}
    ${card('Casa de Campo Marina','Designed by Gianfranco Fini to feel like an Italian Riviera village, the Marina is the resort’s social waterfront — superyachts on one side, the Plaza Portofino’s restaurants, boutiques and cafés on the other. It’s where evenings come alive: a long sunset dinner among the boats, a gelato along the Paseo del Mar, or the departure point for yacht charters and the Catalina Island trip.')}

    ${card('The Recreational Park','A 65-acre green corridor between Los Altos and the Dye Fore Lakes, designed for walking, running and cycling away from resort traffic. Two smooth loops (2.5km and 1.5km) plus gravel trails wind through preserved Dominican woodland, with open meadows for picnics and a children’s playground. A pedestrian walkway connects it straight to Altos de Chavón — best enjoyed in the cool of the morning or late afternoon.')}

      <div style="font-size:13.5px;color:var(--ink);line-height:1.55;margin-top:5px">Every area is a short golf-cart ride from the villas — your cart is the easiest way around the 7,000-acre resort. Tell your concierge where you’d like to go and we’ll help with directions, reservations and timing.</div>

    </div>
    <div class="sec-title">Where to go, by mood</div>
    <div style="background:var(--card);border:1px solid var(--line);border-radius:14px;padding:2px 15px 14px;margin-top:2px">
      ${pick('Beach &amp; sunset','Minitas Beach','Minitas')}
      ${pick('Dinner among the yachts','The Marina','Marina')}
      ${pick('Culture &amp; a clifftop view','Altos de Chavón','Chavón River')}
      ${pick('A concert under the stars','The Amphitheatre','Altos de Chavón')}
      ${pick('Morning walk, run or ride','Recreational Park','Los Altos')}
      ${pick('Somewhere for the kids','Kids Park','Recreational Park')}
      ${pick('Shopping &amp; gelato','Paseo del Mar','Marina')}

function renderStory(){
  const paras=[
    `In 1960, Mr. Alvaro Carta fled Communist Cuba to live in Miami. In the late 1960's he was off to the Dominican Republic to operate the financially troubled South Puerto Rico Sugar Company. With the financial backing of the huge Gulf&nbsp;+&nbsp;Western empire, headed by Charles Bluhdorn, Carta formed a new division known as Gulf&nbsp;+&nbsp;Western Americas. The Sugar Mill in the town of La Romana quickly became the single largest producing mill in the world, and Carta began to consider investment options for the millions of dollars flowing into Gulf&nbsp;+&nbsp;Western each year. He wanted to take the money cultivated in this country and create a new industry, developing impoverished areas and improving the economic conditions of its people. He targeted the tourism industry and began looking for land to build a lavish resort with a golf course. Carta brought in famed golf course designer Pete Dye to assist him in locating the perfect spot. After drawing up plans for an area just outside of Santo Domingo, Dye asked if there were any alternate locations. Carta reluctantly suggested there was an area near the La Romana Sugar Mill that was too dry to grow sugarcane and too sparsely vegetated for cattle. Carta and Dye ventured out to take a look.`,
    `Dye started out building an Executive Course in the area to be played by the employees of the Sugar Mill. But in scouting the coastline, Dye discovered that something truly extraordinary could be created here. Over the next year, more than 300 Dominicans melded a sea-side course. The course was created by the use of manpower instead of horsepower, because the cost to import special machinery was prohibitive. The land — covered with thick underbrush, stubbly tropical trees, big boulders and cactus — was cleared by labourers who gripped their machetes and cleared the land. The crew used sledgehammers, pickaxes and chisels to crack the coral rock. The soil was carted from a mile inland by sugarcane carts pulled by oxen and transported to the course site. The topsoil was created with cachaza, a by-product of sugarcane. The course was originally named Cajuiles, referring to the beautiful cashew trees that grew in the mountains. The name was changed to the "Teeth of the Dog" when Dye heard natives refer to the sharp coral rock as "diente del perro" (teeth of the dog in Spanish), after the canine-teeth appearance of the sharp rock edges. In the fall of 1971, the 18-hole course Teeth of the Dog, with seven holes on the Caribbean Sea, was ready for play. An international airport was built at Casa de Campo® to accommodate the many corporate CEOs arriving via private jet to vacation here. In 1974, Casa de Campo resort opened as an executive retreat for Gulf&nbsp;+&nbsp;Western, and its "Teeth of the Dog" hosted the World Amateur Team Championships. About the same time, the late Indian Prince Maharajah Jabar Singh — one of the best polo players in the world, having won Spain's Kings Cup six times and France's Deauville Gold Cup three times — was invited to introduce polo at this new resort. Singh organized polo and started breeding and training polo ponies for Gulf&nbsp;+&nbsp;Western. Tennis was added as a further perk for vacationing guests. In 1976 the "Links" golf course opened for play, and construction began on a village high atop a hill dedicated to being a cultural mecca to showcase the art of the Dominican Republic. In 1979, the heart of Altos de Chavón was completed. Genesis Discotheque opened Dec.&nbsp;31, 1980, and two years later, on August&nbsp;20, 1982, Frank Sinatra inaugurated the village's 5,000-seat Grecian-style amphitheater with an HBO televised special. The Altos de Chavón School of Design opened in 1983 in affiliation with New York's famed Parsons School of Design.`,
    `As the global economy began to fall in the mid-1980's, Casa de Campo®, the Sugar Mill and its surrounding property were sold to a group of private investors of the Central Romana Corporation. The "tourism" dream of Alvaro Carta was about to take on a different dimension — this time with a global impact, becoming the force driving tourism development in the Dominican Republic. Native Dominican designer Oscar de la Renta, who built a home here, was asked to provide his fashion talents to design the overall original "ambiance" of Casa de Campo®. American Eagle, a division of American Airlines, began daily commuter service to Casa de Campo®'s private airstrip from San Juan, Puerto Rico. Casita hotel rooms were built to supplement the private villa homes and to give guests a choice in accommodations. In 1986, the new owners brought in famed British marksman Michael Rose to create a world-class Sporting Clays facility to complement the golf, tennis, beach water sports, river and ocean fishing, horseback riding &amp; polo already in play at this Caribbean resort. With world-class sports and instruction, Casa de Campo® had a firm hold on the high-end and upper-middle markets — endorsed by our guests interested in golf, tennis, polo, shooting and more. In 1986, the coveted Sports Illustrated Swimsuit Edition was shot at Casa de Campo®. When it hit the stands in winter 1987, the resort — with these amazing shots — was on the map!`,
    `In 1990, the private La Romana Country Club &amp; Golf Course was added. Casa de Campo became an international port of call in July 1992 with the inaugural arrival of Costa Cruise Lines' Classica. Then, on June&nbsp;15, 1995, American Airlines flew its inaugural jet service from Miami to Casa de Campo®. In the summer of June 1998, computer giant Microsoft introduced its long-awaited Microsoft Golf '98 game featuring Casa de Campo®'s famed "Teeth of the Dog" and "Links" courses. Just a month later, in August 1998, the World Amateur Golf Championships returned to Casa de Campo®, with nightly updates provided to golf enthusiasts around the world on The Golf Channel's popular "Golf Central" telecast. Just before high season, on December&nbsp;19, 2000, American Airlines landed a jet in an inaugural flight into the new Casa de Campo®/La Romana International Airport, just minutes from check-in at the resort. And one year later, in December 2001, the Casa de Campo® Preparatory Institute by Johnson &amp; Wales University opened in the morning, and the new Casa de Campo Marina &amp; Yacht Club opened later that same day. It was April 2003 when Pete Dye himself cut the ribbon to his newest creation at Casa de Campo — rumored to rival the famed Teeth of the Dog, the new Dye Fore course, located near the Altos de Chavón village, was born. After decades of family vacationing at Casa de Campo®, famed restaurateur Sirio Maccioni joined forces with the owners and management of Casa de Campo® in winter 2007. Maccioni sent a chef direct from Le Cirque in New York, and the new Beach Club by Le Cirque opened with Le Cirque signature cuisine and service at the resort's private Minitas Beach.`,
    `Throughout its colorful, exciting history, Casa de Campo® has received countless industry accolades for its quality facilities, staff and service. The resort continues to amaze villa owners and guests alike with its constant evolution, while maintaining a strong dedication to high-quality facilities and services.`,
  ];
  const inner=`
    <div class="card" style="background:var(--accent);color:#fff;border:0">
      <div class="label" style="color:rgba(255,255,255,.7)">DISCOVER · THE FULL STORY</div>
      <div class="display" style="font-size:24px;margin:4px 0 6px">How it all began</div>
      <div style="font-size:13px;color:rgba(255,255,255,.85)">The story of Casa de Campo, from a dry stretch of coastline to a Caribbean landmark.</div>
    </div>
    <div class="card" style="padding:16px 16px 4px;margin-top:12px">${paras.map(p=>`<p style="font-size:13.5px;color:var(--ink);line-height:1.65;margin:0 0 15px">${p}</p>`).join('')}</div>`;
  shell('The story', inner);
}

    ${card('Teeth of the Dog, built by hand', `With machinery too costly to import, more than <b>300 Dominicans built the course by hand</b> &mdash; clearing brush with machetes, cracking coral rock with sledgehammers and chisels, and hauling soil inland by ox-drawn sugarcane carts. When Dye heard locals call the jagged coral <i>&ldquo;diente del perro,&rdquo;</i> the course had its name. Teeth of the Dog opened in 1971 with seven holes on the Caribbean Sea, and is still ranked the <b>#1 course in the Caribbean</b>.`)}

/* tiny cross-origin diagnostic: lets the embedding page see how far boot got
   (the app runs inside a 3rd-party iframe on /my-stay/, where we otherwise
   can't read into it). Harmless when not embedded. */
function bootPing(s){ try{ if(window.parent && window.parent!==window) window.parent.postMessage('cph:'+s,'*'); }catch(e){} }
bootPing('js-start');
(async function(){
  try{
    state.token = loadToken();              // restore a previous session if present
    bootPing('fetching');
    let r;
    try{ r = await api('/api/stay'); }
    catch(netErr){ bootPing('fetch-failed'); r = {ok:false, body:{}}; }
    if(r.ok && r.body.stay){
      state.stay=r.body.stay;
      if(r.body.token) saveToken(r.body.token);   // sliding window: refresh on each visit
      const flag=document.getElementById('modeFlag');
      if(flag && state.stay.source==='mock') flag.textContent='DEMO DATA';
      bootPing('app');
      bootIntoApp();
    } else {
      saveToken(null);                       // stale/expired token — clear it
      bootPing('login');
      renderLogin();
    }
  }catch(err){
    /* never leave the guest on a blank screen — fall back to the sign-in view */
    bootPing('error');
    try{ renderLogin(); }catch(e2){ try{ document.getElementById('app').innerHTML='<div style="padding:40px;color:#fff;font:15px system-ui">Unable to load right now. Please reload.</div>'; }catch(e3){} }
  }
})();

/* Note: when embedded in the /my-stay/ page, that page nudges this frame once on load so
   the browser paints it (an iframe first-paint quirk that can't be forced from inside the
   frame). The fill-the-frame layout above (html.embedded rules) keeps this app filling the
   frame cleanly. */
</script>
