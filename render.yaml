# Render blueprint. NOTE: the persistent disk requires a paid instance (Starter $7/mo+).
# After upgrading to Starter, add the disk + env vars below (via dashboard or by syncing this blueprint).
services:
  - type: web
    name: cph-my-stay
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_HOURS
        value: "12"
      - key: STAFF_SESSION_HOURS
        value: "8"
      - key: DATA_DIR
        value: /data
      # Staff accounts seeded on first boot. Format: "Name|email|password|role" entries joined by ';'
      # Set this in the Render dashboard (secret). Example: Jan|jan@caribbeanparadisehomes.com|<password>|admin
      - key: STAFF_ACCOUNTS
        sync: false
