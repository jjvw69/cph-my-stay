<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Concierge Console · Caribbean Paradise Homes</title>
<meta name="theme-color" content="#16241E">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CPH Console">
<link rel="apple-touch-icon" href="https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/11/cropped-CPH-Logo-Only-FB-270x270.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* Wimbledon "Centre Court" palette: dark stand grey · green scoreboard · light seating greys · white court · purple status · soft-yellow live accent. */
  :root{--bg:#E6E9E7;--panel:#EDEFED;--card:#FFF;--ink:#14231A;--accent:#12794D;--accent2:#0C4A2F;--soft:#6B746F;--line:#D5D9D6;--gold:#A37E2C;--login:#0C3226;
    --purple:#5A3A88;--yellow:#DEE86B;--hedge:#0C4A2F;--stand:#333C39;
    --okbg:#DCEBE1;--oktx:#12794D;--drbg:#E7EAE6;--drtx:#5C665E;--nibg:#F2E3DC;--nitx:#9E5B43;
    --display:'Montserrat',-apple-system,'Segoe UI',sans-serif;--ui:'Montserrat',-apple-system,'Segoe UI',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{overflow-x:hidden;max-width:100%}
  body{font-family:var(--ui);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:var(--ui);cursor:pointer;border:0;background:none}
  input,select,textarea{font-family:var(--ui);font-size:16px;color:var(--ink)}
  .label{font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft);font-weight:600}
  /* Gate */
  #gate{position:fixed;inset:0;background:linear-gradient(160deg,#1B2B23,#16241E);display:flex;align-items:center;justify-content:center;z-index:50}
  .gatecard{width:382px;max-width:92vw;background:var(--bg);border-radius:22px;padding:34px 30px;text-align:center;box-shadow:0 30px 70px -30px rgba(0,0,0,.6)}
  .gatecard img{width:48px;margin:0 auto 10px;display:block}
  .gatecard .wm{font-size:11.5px;letter-spacing:.24em;color:var(--soft)}
  .gatecard h1{font-family:var(--display);font-weight:600;font-size:26px;margin:8px 0 2px}
  .gatecard .sub{font-size:13px;color:var(--soft);margin-bottom:20px}
  .gatecard label{display:block;text-align:left;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);margin:12px 0 5px}
  .gatecard input{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:#fff}
  .btn{width:100%;background:var(--accent);color:#fff;border-radius:12px;padding:13px;font-size:16px;font-weight:500;margin-top:18px}
  .btn.alt{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .gerr{display:none;background:var(--nibg);color:var(--nitx);font-size:14px;padding:8px 12px;border-radius:9px;margin-top:12px}
  .gatecard .foot{font-size:12.5px;color:var(--soft);margin-top:16px}
  .gatecard .ssoNote{font-size:12.5px;color:var(--soft);margin-top:10px}
  /* Console */
  #app{display:none;height:100dvh;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;background:var(--stand);border-bottom:1px solid #2A322F}
  .topbar .brand{display:flex;align-items:center;gap:9px}
  .topbar .brand img{width:26px}
  .topbar .brand b{font-family:var(--display);font-weight:700;font-size:16px;line-height:1.1;color:#F3F5F3}
  /* Right cluster is a deliberate light-grey "scorebug" panel on the dark stand; dark-grey text for legibility. */
  .topbar .right{display:flex;align-items:center;gap:14px;font-size:13.5px;color:var(--soft);background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:7px 12px}
  .sync{display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:#5B9E6F;display:inline-block}
  .who{color:var(--ink)}
  .cols{flex:1;display:grid;grid-template-columns:372px 1fr 372px;overflow:hidden}
  .cols.board-mode{grid-template-columns:1fr}
  .cols.board-mode .col.left,.cols.board-mode .col.right{display:none}
  /* Jan payables ledger runs full-width so every column (incl. profit + mark-paid) is visible. */
  .cols.pay-mode{grid-template-columns:1fr}
  .cols.pay-mode .col.left,.cols.pay-mode .col.right{display:none}
  /* Guest directory — full-width A–Z address book. */
  .cols.dir-mode{grid-template-columns:1fr}
  .cols.dir-mode .col.left,.cols.dir-mode .col.right{display:none}
  .dir-head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:6px}
  .dir-add-btn{font-family:var(--ui);font-size:13px;font-weight:600;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:11px;padding:8px 14px;cursor:pointer;flex-shrink:0}
  .dir-add-btn:hover{filter:brightness(1.06)}
  #dirBody{column-count:4;column-gap:24px;margin-top:10px}
  .dir-letter{break-inside:avoid;font-family:var(--display,serif);font-size:22px;font-weight:700;color:var(--accent);border-bottom:2px solid var(--line);padding:4px 0 3px;margin:16px 0 10px}
  .dir-card{break-inside:avoid;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:0 0 12px;cursor:pointer}
  .dir-card.collapsed .dir-more{display:none}
  .dir-caret{flex-shrink:0;color:var(--soft);font-size:11px;line-height:1;transition:transform .15s;transform:rotate(90deg)}
  .dir-card.collapsed .dir-caret{transform:rotate(0deg)}
  .dir-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .dir-name{font-size:15px;font-weight:700;color:var(--ink)}
  .dir-badge{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;background:#EAF3EE;color:#12794D;border-radius:5px;padding:1px 6px;margin-left:5px;vertical-align:middle}
  .dir-actions{display:flex;gap:6px;flex-shrink:0}
  .dir-btn{font-size:11.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--soft);border-radius:8px;padding:3px 9px;cursor:pointer}
  .dir-btn:hover{border-color:var(--accent);color:var(--accent)}
  .dir-btn.danger:hover{border-color:#9A2B2B;color:#9A2B2B}
  .dir-contact{display:flex;flex-wrap:wrap;gap:5px 16px;margin-top:6px;font-size:13px}
  .dir-link{color:var(--accent);text-decoration:none}
  .dir-link:hover{text-decoration:underline}
  .dir-meta{font-size:12px;color:var(--soft);margin-top:4px}
  .dir-dim{color:#9AA49B}
  .dir-note{font-size:12.5px;color:var(--ink);background:#FBF8F1;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:6px 10px;margin-top:8px}
  .dir-headbtns{display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
  .dir-add-btn.ghost{background:#fff;color:var(--accent)}
  .dir-add-btn.ghost:hover{background:#F3F8F5}
  .dir-guide{margin:12px 0 2px;background:#F3F8F5;border:1px solid #DCEBE2;border-radius:12px;padding:2px 14px}
  .dir-guide>summary{cursor:pointer;font-family:var(--ui);font-size:13.5px;font-weight:700;color:var(--accent);padding:10px 0;list-style:none;user-select:none}
  .dir-guide>summary::-webkit-details-marker{display:none}
  .dir-guide>summary::before{content:'▸';margin-right:8px;font-size:11px}
  .dir-guide[open]>summary::before{content:'▾'}
  .dir-guide-body{font-size:13px;color:var(--ink);line-height:1.55;padding:2px 2px 12px}
  .dir-guide-body p{margin:0 0 8px}
  .dir-guide-body ul{margin:0;padding-left:18px}
  .dir-guide-body li{margin:5px 0}
  .dir-guide-body code{background:#E4EFE9;border-radius:4px;padding:1px 5px;font-size:12px;color:#12794D}
  .dir-totop{text-align:center;padding:20px 0 10px}
  .dir-totop button{font-family:var(--ui);font-size:13px;font-weight:600;color:var(--accent);background:#fff;border:1px solid var(--line);border-radius:20px;padding:8px 18px;cursor:pointer}
  .dir-totop button:hover{border-color:var(--accent);background:#F3F8F5}
  .dir-stats{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 2px}
  .dir-stat{font-family:var(--ui);font-size:12px;font-weight:600;color:var(--soft);background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 13px;cursor:pointer;display:flex;gap:7px;align-items:center}
  .dir-stat:hover{border-color:var(--accent)}
  .dir-stat.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .dir-stat b{font-weight:800}
  .dir-stat.on b{color:#fff}
  .dir-srcsel{display:inline-block;appearance:auto;-webkit-appearance:menulist;padding:6px 10px}
  .dir-srcsel option{color:#2b2b2b}
  .dir-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0 2px}
  .dir-search{flex:1;min-width:200px;padding:9px 13px;border:1px solid var(--line);border-radius:10px;font-size:13px;font-family:var(--ui)}
  .dir-search:focus{outline:none;border-color:var(--accent)}
  .dir-sel{padding:9px 10px;border:1px solid var(--line);border-radius:10px;font-size:12.5px;font-family:var(--ui);color:var(--soft);background:#fff;cursor:pointer}
  .dir-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .dir-tag{font-size:10.5px;font-weight:600;background:#EDEFF6;color:#4A4E63;border-radius:6px;padding:2px 8px}
  .dir-badge.warn{background:#FBF0DD;color:#9A6A16}
  .dir-badge.mute{background:#EEE;color:#888}
  .dir-badge.rep{background:#EAF3EE;color:#12794D}
  .dir-prefs{font-size:12px;color:var(--soft);margin-top:6px}
  .dir-prefs b{color:var(--ink);font-weight:600}
  .dir-last{font-size:11px;color:#9AA49B;margin-top:6px}
  .dir-acts2{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;border-top:1px dashed var(--line);padding-top:9px}
  .dir-compose{max-width:760px;margin-top:12px}
  .dc-field{margin-bottom:14px}
  .dc-label{display:block;font-size:12px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.03em;margin-bottom:5px}
  .dc-input,.dc-area,.dc-sel{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:var(--ui);box-sizing:border-box}
  .dc-area{min-height:220px;resize:vertical;line-height:1.5;font-size:14px}
  .dc-input:focus,.dc-area:focus,.dc-sel:focus{outline:none;border-color:var(--accent)}
  .dc-hint{font-size:11.5px;color:#9AA49B;margin-top:5px}
  .dc-modes{display:flex;gap:8px;margin-bottom:14px}
  .dc-mode{font-family:var(--ui);font-size:13px;font-weight:600;color:var(--soft);background:#fff;border:1px solid var(--line);border-radius:20px;padding:7px 15px;cursor:pointer}
  .dc-mode.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .dc-aud{background:#F3F8F5;border:1px solid #DCEBE2;border-radius:10px;padding:11px 14px;font-size:13px;color:var(--ink);margin-bottom:14px}
  .dc-aud b{color:var(--accent)}
  .dc-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .dc-send{font-family:var(--ui);font-size:14px;font-weight:700;border:none;background:var(--accent);color:#fff;border-radius:11px;padding:11px 20px;cursor:pointer}
  .dc-send:hover{filter:brightness(1.06)}
  .dc-send:disabled{opacity:.5;cursor:not-allowed}
  .dc-cancel{font-family:var(--ui);font-size:14px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--soft);border-radius:11px;padding:11px 18px;cursor:pointer}
  @media(max-width:1500px){ #dirBody{column-count:3} }
  @media(max-width:1150px){ #dirBody{column-count:2} }
  @media(max-width:800px){ #dirBody{column-count:1} }
  /* Revenue (Upsell) view runs full-width like the Jan ledger: the section title + month chart span
     the top, then everything else sits in an even 50/50 two-column grid below. */
  .cols.rev-mode{grid-template-columns:1fr}
  .cols.rev-mode .col.left,.cols.rev-mode .col.right{display:none}
  .rev-grid{display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:start;margin-top:32px}
  .rev-grid.rev-grid-3{grid-template-columns:1fr 1fr 1fr;gap:42px}
  .rev-col{min-width:0;display:flex;flex-direction:column}
  /* Sections placed directly as grid items (e.g. the 3-across earnings grid): let the grid gap own spacing. */
  .rev-grid > .rev-sec{margin-top:0;min-width:0}
  @media(max-width:1200px){ .rev-grid.rev-grid-3{grid-template-columns:1fr 1fr} }
  @media(max-width:900px){ .rev-grid,.rev-grid.rev-grid-3{grid-template-columns:1fr} }
  /* Divider style A (Upsell only): flat columns — no card boxes — separated by a single hairline,
     matching the console's main .left/.right column dividers. */
  .cols.rev-mode .rev-sec{background:transparent;border:none;border-radius:0;padding:0}
  .cols.rev-mode .rev-grid{column-gap:0;row-gap:26px}
  .cols.rev-mode .rev-grid:not(.rev-grid-3) > *{padding:0 28px}
  .cols.rev-mode .rev-grid:not(.rev-grid-3) > *:first-child{padding-left:0}
  .cols.rev-mode .rev-grid:not(.rev-grid-3) > *:last-child{padding-right:0;border-left:1px solid var(--line)}
  .cols.rev-mode .rev-grid.rev-grid-3 > *{padding:0 28px}
  .cols.rev-mode .rev-grid.rev-grid-3 > *:nth-child(3n+1){padding-left:0;border-left:none}
  .cols.rev-mode .rev-grid.rev-grid-3 > *:nth-child(3n){padding-right:0}
  .cols.rev-mode .rev-grid.rev-grid-3 > *:not(:nth-child(3n+1)){border-left:1px solid var(--line)}
  /* Stacked sections within one column (e.g. month chart above CPH earnings) get a hairline too. */
  .cols.rev-mode .rev-col > .rev-sec + .rev-sec{border-top:1px solid var(--line);margin-top:24px;padding-top:24px}
  /* Slim effectiveness strip under the Upsell title: how BROADLY and how DEEPLY guests upsell. */
  .rev-headstats{display:flex;flex-wrap:wrap;gap:5px 24px;margin:9px 0 2px;font-size:13.5px;color:var(--soft)}
  .rev-headstats b{color:var(--ink);font-weight:700}
  .rev-headstats .dim{color:#9AA49B}
  /* Total row at the foot of a rev list (e.g. Unpaid invoices) — a summed footer, not a tappable row. */
  .rev-od-total{border-top:1px solid var(--line);margin-top:5px;padding-top:9px;font-weight:700;cursor:default}
  .rev-od-total:hover{background:none}
  .rev-kpi-left{display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .rev-kpi-left .stat{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:0 1px 2px rgba(20,33,28,.04)}
  .rev-kpi-left .stat .num{font-size:30px}
  .rev-kpi-left .stat .num.money{font-size:clamp(20px,2.4vw,28px);letter-spacing:-.9px;white-space:nowrap}
  .rev-kpi-left .stat .lbl{font-size:12.5px;font-weight:600;margin-top:6px}
  /* Invoices + attach-rate share one row (they're the two non-money stats). */
  .rev-kpi-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .rev-kpi-pair .stat{min-width:0}
  .rev-kpi-pair .stat .num{font-size:26px}
  /* Cash flow, in the left column under the cards. */
  .rev-left-cash{margin-top:14px}
  .rev-left-cash .rev-sec{margin-top:0;padding:12px 13px}
  .rev-left-cash .rev-sec h3{flex-direction:column;align-items:flex-start;gap:2px}
  /* Revenue view keeps the right rail — but it carries MONEY, not arrivals: who to chase, who
     collected what, where the revenue comes from. */
  .rev-rail h3{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);font-weight:700;margin:0 0 8px}
  .rev-rail .rev-sec{margin-top:0;margin-bottom:14px}
  .rev-sec{margin-top:20px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px}
  .rev-sec h3{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);font-weight:700;margin:0 0 10px;display:flex;align-items:baseline;gap:9px}
  .rev-sub{font-size:11px;font-weight:600;letter-spacing:0;text-transform:none;color:#9AA49B}
  .rev-empty{font-size:13px;color:var(--soft);padding:6px 0}
  .rev-scroll{overflow-x:auto}
  .rev-key{display:flex;gap:16px;font-size:11.5px;color:var(--soft);margin-top:6px}
  .rev-key i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px}
  .rev-bar{margin-bottom:11px}
  .cf-bar{cursor:pointer;border-radius:9px;padding:6px 8px;margin:0 -8px 6px}
  .cf-bar:hover{background:#FBF8F1}
  .cf-bar.open{background:#FBF8F1}
  .rev-bar-top{display:flex;justify-content:space-between;gap:10px;font-size:13px;font-weight:600;color:var(--ink)}
  .rev-bar-v{white-space:nowrap;font-weight:700}
  .rev-due{color:#9A2B2B;font-weight:700}
  .rev-track{position:relative;height:9px;background:#F0F3F1;border-radius:20px;margin:5px 0 3px;overflow:hidden}
  .rev-fill{position:absolute;left:0;top:0;height:100%;background:#E7C3C0;border-radius:20px}
  .rev-fill.paid{background:#12794D}
  .rev-bar-sub{font-size:11px;color:var(--soft)}
  .rev-od-row{display:flex;justify-content:space-between;gap:10px;padding:7px 8px;margin:0 -8px;border-radius:8px;cursor:pointer;font-size:13px}
  .rev-od-row:hover{background:#FBF0EF}
  .rev-od-g{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rev-od-v{color:var(--soft);font-weight:400}
  .rev-od-m{white-space:nowrap;color:var(--soft)}
  .rev-od-d{display:inline-block;font-size:10px;font-weight:800;background:#F3DADA;color:#9A2B2B;border-radius:20px;padding:1px 7px;margin-left:4px}
  .rev-od-due{display:inline-block;font-size:10px;font-weight:700;background:#F0F3F1;color:#7B857E;border-radius:20px;padding:1px 7px;margin-left:4px}
  /* Jan view — supplier payables LEDGER. One sortable table, all bookings. Colour legend:
     amber = pay the supplier · green = CPH profit · purple = CPH agent · grey = awaiting guest. */
  .pay-filter{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 12px}
  .pay-fchip{font-size:12px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--soft);border-radius:20px;padding:4px 12px;cursor:pointer}
  .pay-fchip:hover{border-color:#5A3A88;color:#5A3A88}
  .pay-fchip.on{background:#5A3A88;border-color:#5A3A88;color:#fff}
  .pay-fchip .fc-n{opacity:.7;font-weight:500;margin-left:4px}
  .pay-ledger-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:#fff}
  .pay-ledger{width:100%;border-collapse:collapse;font-size:12.5px;min-width:900px}
  .pay-ledger thead th{position:sticky;top:0;background:#F4F6F5;font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#6B746F;text-align:left;padding:9px 11px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
  .pay-ledger thead th.num{text-align:right}
  .pay-ledger thead th:hover{color:#5A3A88}
  .pay-ledger thead th.srt{color:#5A3A88}
  .pay-ledger tbody td{padding:8px 11px;border-bottom:1px solid #EEF1EF;vertical-align:middle;white-space:nowrap}
  .pay-ledger tbody tr:hover{background:#FBFBFA}
  .pd-date{color:var(--ink);font-variant-numeric:tabular-nums;font-weight:600}
  .pd-date .pd-dep{color:var(--soft);font-weight:500}
  .pd-g{cursor:pointer;border-left:3px solid transparent}
  .pd-g b{display:block;color:var(--ink);font-weight:700}
  .pd-g span{display:block;font-size:11px;color:var(--soft)}
  .pd-g .pd-int{color:#5A3A88;font-weight:600}
  .pd-tag{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;border-radius:5px;padding:1px 6px;margin-right:5px;color:#fff}
  .pd-tag.cat-cart{background:#12794D}
  .pd-tag.cat-xfer{background:#5A3A88}
  .pd-tag.cat-yacht{background:#1F6F8B}
  .pd-tag.cat-cake{background:#B5556F}
  .pd-tag.cat-mixed{background:#A37E2C}
  .pd-no{color:#9AA49B;margin-left:5px}
  .pd-sup{font-weight:600;color:var(--ink)}
  .pd-agent{color:#5A3A88;font-weight:700}
  .pd-dim{color:#B8BEB9}
  .pd-src b2{font-weight:600}
  .pd-via{display:block;font-size:10.5px;color:#9AA49B}

  .pv-hero{height:120px;background:linear-gradient(135deg,var(--accent),#1E2B25) center/cover}
  .pv-body{padding:14px}
  .pv-eyebrow{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft)}
  .pv-villa{font-family:var(--display);font-weight:700;font-size:22px;margin:2px 0}
  .pv-loc{font-size:13.5px;color:var(--soft);margin-bottom:10px}
  .pv-count{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px;display:flex;justify-content:space-between;align-items:center}
  .pv-count .big{font-family:var(--display);font-size:30px;color:var(--accent);line-height:1}
  .pv-count .s{font-size:12.5px;color:var(--soft)}
  .pv-greet{font-size:14px;color:var(--soft);margin-top:10px}
  .pv-greet b{color:var(--ink)}
  .pv-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 11px;margin-top:8px;font-size:14px}
  /* ---- live Guest Activity panel ---- */
  .apv-head{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:14px}
  .apv-villa{font-family:var(--display);font-weight:700;font-size:19px;color:var(--ink);line-height:1.15}
  .apv-rev{font-size:12.5px;color:#3F6B4E;font-weight:600;margin-top:6px}
  /* Upsell panel wears the same clothes as the Today dashboard: a grid of stat cards, colour-coded
     — green = money in, amber/red = money still owed — then a white card for the service breakdown. */
  .ups-card{background:transparent;border:0;padding:0;margin:4px 0 18px}
  .ups-h{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);font-weight:700;margin-bottom:9px}
  .ups-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:11px}
  .ups-stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 14px}
  .ups-stat .ups-num{font-family:var(--display);font-size:26px;line-height:1;color:var(--accent);white-space:nowrap;letter-spacing:-.5px}
  .ups-stat .ups-lbl{font-size:12px;color:var(--soft);margin-top:5px}
  .ups-stat.paid{background:#F2F8F4;border-color:#CBE3D5}
  .ups-stat.paid .ups-num{color:#12794D}
  .ups-stat.due{background:#FBF0EF;border-color:#E7C3C0}
  .ups-stat.due .ups-num{color:#9A2B2B}
  .ups-stat.warn{background:#FCF7EC;border-color:#E4C58C}
  .ups-stat.warn .ups-num{color:#9E5B43}
  .ups-svc{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-top:11px}
  .ups-svc-h{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin-bottom:6px}
  .ups-svc-row{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:3px 0}
  .ups-svc-row.clk{cursor:pointer;border-radius:7px;padding:4px 6px;margin:0 -6px}
  .ups-svc-row.clk:hover{background:#F3F6F3}
  .ups-car{display:inline-block;width:12px;color:var(--soft);transition:transform .12s;transform:rotate(0)}
  .ups-car.open{transform:rotate(90deg)}
  /* Collapsible per-service breakdown — the individual invoices behind the number. */
  .ups-det{margin:2px 0 8px 18px;border-left:2px solid var(--line);padding-left:10px}
  .ups-det-sum{font-size:11.5px;font-weight:700;color:#12794D;padding:3px 0 5px}
  .ups-det-row{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:3px 0;cursor:pointer;border-radius:6px}
  .ups-det-row:hover{background:#F3F6F3}
  .ups-det-g{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ups-det-m{white-space:nowrap;color:var(--soft)}
  .ups-pill{display:inline-block;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:20px;margin-left:3px;text-transform:uppercase;letter-spacing:.04em}
  .ups-pill.ok{background:#DCEDE2;color:#12794D}
  .ups-pill.due{background:#F3DADA;color:#9A2B2B}
  .ups-pill.part{background:#FBF1D8;color:#9A7B36}
  /* Fold header for the earnings detail lists. */
  .rev-fold{display:flex;align-items:center;gap:7px;width:100%;background:none;border:0;padding:4px 0 7px;cursor:pointer;text-align:left}
  .rev-fold:hover .rev-fold-x{color:var(--accent)}
  .rev-fold .rev-sub{flex:1}
  .rev-fold-x{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--soft)}
  .ups-svc-name{color:var(--ink)}
  .ups-svc-meta{color:var(--soft);white-space:nowrap}
  .apv-sub{font-size:12.5px;color:var(--soft);margin-top:3px}
  .pulse{font-weight:600}
  .pulse.on{color:#3F6B4E}
  .pulse.off{color:#9A7B36}
  .act-sec{margin-bottom:16px}
  .act-h{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);font-weight:600;margin-bottom:8px}
  .act-n{background:var(--gold);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;letter-spacing:0;font-weight:700}
  .act-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px}
  .act-card.warn{border-color:#E4C58C;background:#FCF7EC}
  .act-title{font-size:14px;font-weight:600;color:var(--ink)}
  .act-meta{font-size:12.5px;color:var(--soft);margin-top:3px}
  .act-msg{font-size:13.5px;color:var(--ink);line-height:1.45}
  .act-row{display:flex;gap:7px;margin-top:9px}
  .act-row input{flex:1;min-width:0;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;font-family:var(--ui);background:#fff}
  .act-row .b-fill{padding:8px 13px;white-space:nowrap}
  .act-jump{margin-top:9px;padding:8px 13px;font-size:13px}
  .act-empty{font-size:13px;color:var(--soft);background:#fff;border:1px dashed var(--line);border-radius:12px;padding:12px;text-align:center}
  .rd-row{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink);padding:5px 0}
  .rd-ic{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex:0 0 auto}
  .rd-ic.ok{background:#E2EFE0;color:#3F6B4E}
  .rd-ic.no{background:#F0EBDF;color:#B6A98C}
  .dirtytag{display:none;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:#9A7B36;background:#FBF1D8;border:1px solid #ECD9A6;border-radius:9px;padding:5px 10px}
  .b-fill.hot{box-shadow:0 0 0 3px rgba(169,140,90,.25)}
  .glink{margin-top:14px}
  .glink .box{display:flex;gap:8px;margin-top:5px}
  .glink input{flex:1;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:11.5px;background:#fff}
  .glink button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:0 12px;font-size:13.5px;color:var(--accent)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;padding:11px 20px;border-radius:24px;font-size:13.5px;opacity:0;transition:.25s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty{color:var(--soft);font-size:16px;padding:40px 10px;text-align:center}
  /* Landscape iPad: keep all three columns (incl. the guest preview) but slim the sides to fit. */
  @media(min-width:1024px) and (max-width:1180px){ .cols{grid-template-columns:300px 1fr 300px} .cols.board-mode{grid-template-columns:1fr} .center{padding:18px 18px} .right{padding:16px 12px} }
  /* Portrait iPad & narrower: two columns, hide the preview. */
  @media(max-width:1023px){ .cols{grid-template-columns:280px 1fr} .right{display:none} }
  .backlist{display:none}
  .botnav{display:none}
  @media(max-width:760px){
    #app,.topbar,.cols,.col,.center,.ehd,.ebtns,.sec,.grid{min-width:0;max-width:100%}
    .cols{display:block;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:66px}
    /* Phone: collapse the section-nav into ONE swipeable strip (it otherwise fills the whole screen). */
    .secbar{flex-direction:row;flex-wrap:nowrap;overflow-x:auto;gap:8px;padding:8px 12px;-webkit-overflow-scrolling:touch;box-shadow:0 4px 10px rgba(0,0,0,.16);position:relative;z-index:5}
    .secbar::-webkit-scrollbar{display:none}
    .secbar-row,.secbar .secnav-g{display:contents}
    .secbar-admin{border-top:0;padding-top:0}
    .secbar .secnav-gl{display:none}
    .secbar .secnav-chip{flex:0 0 auto;padding:9px 15px;font-size:13.5px}
    .botnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:300;background:#fff;border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
    .botnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;border:0;background:none;color:var(--soft);font-size:10.5px;font-family:var(--ui);cursor:pointer;padding:4px 0}
    .botnav button .ic{font-size:19px;line-height:1.05}
    .botnav button.on{color:var(--accent);font-weight:600}
    /* Keep Today·Stays·Arrivals visible while a stay is open; the save bar floats just above the nav. */
    #app.editing .cols{padding-bottom:calc(118px + env(safe-area-inset-bottom))}
    .col{height:auto;overflow:visible;border:0}
    .col.left{display:block}
    .col.center,.col.right{display:none}
    #app.view-detail .col.left{display:none}
    #app.view-detail .col.center{display:block}
    #app.view-detail .col.right{display:block;border-top:1px solid var(--line);margin-top:10px}
    /* Mobile Today overview (view-detail but NOT the booking editor): hide the Upcoming-arrivals
       right column — it's redundant with the Arrivals tab. The editor's Action Panel still shows. */
    #app.view-detail:not(.editing) .col.right{display:none}
    .backlist{display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 13px;font-size:14px;color:var(--accent)}
    .topbar{flex-direction:column;align-items:flex-start;gap:8px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px}
    .topbar .brand{align-items:center;gap:11px}
    .topbar .brand img{width:38px}
    .topbar .brand b{font-size:17px}
    .topbar .right{width:100%;flex-wrap:wrap;gap:6px 12px;font-size:12.5px;padding:7px 11px}
    .topbar .who{overflow-wrap:anywhere;min-width:0;font-size:12.5px}
    .center{padding:16px 14px}
    .center .ehd{flex-direction:column;align-items:stretch;gap:10px}
    .center h2{font-size:24px}
    .ebtns{flex-wrap:wrap}
    .ebtns button{flex:1 1 auto}
    .grid{grid-template-columns:1fr}
    .f.full{grid-column:auto}
    .left{padding:14px 12px}
    /* sticky save bar on the mobile stay detail */
    #app.view-detail .msave{display:flex;position:fixed;left:0;right:0;bottom:calc(54px + env(safe-area-inset-bottom));gap:9px;padding:10px 14px;background:rgba(255,255,255,.97);border-top:1px solid var(--line);box-shadow:0 -4px 12px rgba(20,35,26,.06);z-index:40;backdrop-filter:blur(6px)}
    #app.view-detail .msave button{flex:1;min-height:46px;border-radius:11px;font-size:15px}
    #app.view-detail:not(.editing) .col.center{padding-bottom:78px}
  }
  /* Touch devices (iPad): larger tap targets and comfortable spacing. */
  @media(pointer:coarse){
    .seg button,.chip{padding:10px 15px;font-size:15px}
    .step button{width:36px;height:36px;font-size:18px}
    .ebtns button{padding:12px 16px;min-height:44px}
    .b-out,.b-fill{min-height:44px}
    .reqx{padding:9px 14px;font-size:13.5px}
    .reqconfirm button{padding:11px 16px}
    .reqconfirm input{padding:10px 12px}
    .f input,.f select,.f textarea,.search{padding:11px 12px}
    .staycard{padding:14px}
    .newbtn{font-size:15px}
    .fuitem{padding:11px 12px}
    #signout{padding:9px 14px}
  }
</style>
</head>
<body>
<datalist id="suptransfer"><option value="Luxury"></option><option value="Direct"></option></datalist>
<datalist id="supcart"><option value="Julio"></option><option value="Direct"></option></datalist>
<!-- Booking channels for the per-service "Booked via" field. Filled at boot from store.js (BOOT.serviceBookedVia) — single source, shared with the stay-level Booking source select. -->
<datalist id="bookchan"></datalist>
<div id="gate">
  <div class="gatecard">
    <img id="seal" alt=""><div class="wm">CARIBBEAN PARADISE HOMES</div>
    <h1>Concierge Console</h1><div class="sub">Staff sign-in</div>
    <div style="text-align:left">
      <label>Work email</label><input id="gEmail" type="email" autocomplete="username" placeholder="you@caribbeanparadisehomes.com">
      <label>Password</label><input id="gPass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn" id="gBtn">Sign in</button>
    <div class="gerr" id="gErr"></div>
    <div class="foot">Authorized staff only · every change is logged.</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="brand"><img id="seal2" alt=""><b>Caribbean Paradise Homes<br><span style="font-weight:400;color:#A9B3AE;font-size:12.5px">Concierge Console</span></b></div>
    <div class="right">
      <button class="topPending" id="topPending" onclick="showToday()" title="Open Today’s overview"></button>
      <span class="sync" id="syncTag" title="Auto-syncs with the guest app"><span class="dot" id="syncDot"></span> <span id="syncTxt">Console live</span></span>
      <span class="who" id="who"></span>
      <button class="b-out" style="padding:6px 12px;border:1px solid var(--line);border-radius:9px;font-size:13.5px" id="signout">Sign out</button>
    </div>
  </div>
  <div class="secbar" id="secbar"></div>
  <div class="cols">
    <div class="col left">
      <div class="hd"><span class="label">Concierge desk</span><span style="display:flex;gap:13px"><button class="newbtn" id="revBtn" onclick="showRevenue()" style="display:none" title="Owner view — invoiced add-ons, paid and still to collect">◐ Upsell</button><button class="newbtn" id="ivBtn" onclick="showIvonna()" style="display:none" title="Ivonna &amp; Jan only — Ivonna's own bookings and the money on them">◑ Ivonna</button><button class="newbtn" id="payBtn" onclick="showJan()" style="display:none" title="Jan only — what CPH still owes suppliers (golf carts &amp; transfers), settle each once paid">◒ Jan</button></span></div>
      <div class="homebtns"><button class="todaybtn" id="todayBtn" onclick="showToday()">▦ Today</button><button class="todaybtn" id="arrBtn" onclick="showArrivals()">▤ Arrivals</button></div>
      <input class="search" id="search" placeholder="Search guest or villa…">
      <div class="lfilter">
        <button class="lchip newchip" id="newStay" title="Create a new booking">＋ New</button>
        <button class="lchip on" data-f="current" onclick="setFilter('current')">Current</button>
        <button class="lchip" data-f="archive" onclick="setFilter('archive')">Archive</button>
        <button class="lchip" id="dirChip" onclick="showDirectory()" title="Guest contact directory">Directory</button>
        <span class="yrnav" id="yearNav"></span>
      </div>
      <div id="stayList"></div>
    </div>
    <div class="col center" id="editor"><div class="empty">Select a stay on the left, or create a new one.</div></div>
    <div class="col right" id="preview"><div class="empty">No stay selected.</div></div>
  </div>
  <nav class="botnav">
    <button data-view="today" onclick="showToday()"><span class="ic">▦</span>Today</button>
    <button data-view="stays" onclick="backToList()"><span class="ic">≣</span>Stays</button>
    <button data-view="arrivals" onclick="showArrivals()"><span class="ic">▤</span>Arrivals</button>
  </nav>
</div>
<div class="toast" id="toast"></div>

/* Print CSS — forces the whole invoice onto ONE US-Letter page (tight margins, no orphan page breaks). */
const INV_PRINT_CSS=`<style>@page{size:Letter;margin:0.5in}body{-webkit-print-color-adjust:exact;print-color-adjust:exact}table,tr,td{break-inside:avoid}.inv-disc{margin-top:22px}@media print{html,body{margin:0!important}.inv-disc{position:fixed;bottom:0;left:0;right:0;margin:0!important;background:#fff}}</style>`;
/* Long date for invoices, e.g. "July 23, 2026". Handles ISO (yyyy-mm-dd), free text ("jul 23rd"),
   and month/day with no year (falls back to yr). Returns the raw string if it can't be parsed. */
const _INV_MO=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
function _invDateParts(v, yr){ v=String(v||'').trim(); if(!v) return null; if(/^\d{4}-\d{2}-\d{2}$/.test(v)){ const p=v.split('-').map(Number); return {y:p[0],m:p[1]-1,d:p[2]}; } const s=v.toLowerCase().replace(/(\d+)(st|nd|rd|th)/gi,'$1'); const mo=_INV_MO.findIndex(x=>s.indexOf(x)>=0); const dm=s.match(/\b(\d{1,2})\b/); const ym=s.match(/\b(\d{4})\b/); if(mo>=0&&dm){ return {y:ym?Number(ym[1]):(yr||new Date().getFullYear()),m:mo,d:Number(dm[1])}; } return null; }
function fmtLongDate(v, yr){ const p=_invDateParts(v,yr); if(!p) return String(v||'').trim(); return new Date(p.y,p.m,p.d).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}); }
/* Normalise a due-by value to ISO yyyy-mm-dd for the date picker (keeps legacy free text usable). */
function invDueISO(v, yr){ const p=_invDateParts(v,yr); if(!p) return ''; const z=n=>String(n).padStart(2,'0'); return p.y+'-'+z(p.m+1)+'-'+z(p.d); }
/* Shared invoice info grid (Date/Agency/Arrival/Villa Address · Guest/Agent/Departure/Villa Name).
   Used on BOTH the service and grocery invoice PDFs so they carry identical booking info. */

let _sessionDead=false;

  if(_sessionDead)return; _sessionDead=true;

async function api(path,opts={}){
  const r=await fetch(path,Object.assign({headers:{'Content-Type':'application/json'},credentials:'same-origin'},opts));
  let j={}; try{j=await r.json();}catch(e){}
  if(r.status===401&&path.indexOf('/api/staff/')===0&&path.indexOf('/login')<0&&path.indexOf('/me')<0) sessionExpired();
  return {status:r.status,ok:r.ok&&j.ok!==false,body:j};
}

async function refreshCurrent(){
  if(!cur) return;
  let r; try{ r=await api('/api/staff/stays/'+cur.id); }catch(e){ return false; }
  if(!r.ok||!r.body.stay) return false;
  const fresh=r.body.stay;
  const guestMsgCount=m=>(m||[]).filter(x=>x.from==='guest').length;
  const newReqs=(fresh.requests||[]).length-((cur.requests||[]).length);
  const newMsgs=guestMsgCount(fresh.messages)-guestMsgCount(cur.messages);
  // Merge: never clobber the editable form while the staffer has unsaved edits.
  // The SHARED sections (guestList / grocery / mealPlan) are editable on BOTH sides: always pull the
  // guest's newer copy UNLESS the staffer is actively editing that same section here.
  let sharedChanged=false;
  if(dirty){
    ['requests','messages','guestCheckin','guestLastSeen','sentServices','invoices','yachtProposal'].forEach(k=>{ cur[k]=fresh[k]; });
    SHARED_FIELDS.forEach(k=>{ if(dirtyFields.has(k))return;   // staffer edited this one — keep theirs until they Save
      if(JSON.stringify(cur[k]||null)!==JSON.stringify(fresh[k]||null)){ cur[k]=fresh[k]; sharedChanged=true; } });
  }
  else { const id=cur.id; cur=fresh; if(cur.id!==id) return; }
  // Re-render, preserving any in-progress typing/scroll.
  // Don't re-render the editor while a native <select> dropdown is open (it would slam shut before a pick).
  const _ed=document.getElementById('editor'); const _act=document.activeElement; const _selOpen=!!(_act&&_act.tagName==='SELECT'&&_ed&&_ed.contains(_act));
  if((!dirty||sharedChanged) && !_selOpen){ const eS=snapshotInputs('editor'); renderEditor(); restoreInputs('editor',eS); }
  if(sharedChanged) toast('Guest just updated their details — this booking has been refreshed.');
  const pS=snapshotInputs('preview'); renderPreview(); restoreInputs('preview',pS);
  markViewed(cur); renderList();
  if(newReqs>0){ toast('New request from '+(cur.leadName||'guest')); chime(); }
  else if(newMsgs>0){ toast('New message from '+(cur.leadName||'guest')); chime(); }
}
function snapshotInputs(rootId){
  const root=document.getElementById(rootId); if(!root) return null;
  const vals={}; root.querySelectorAll('input,textarea,select').forEach(el=>{ if(el.id) vals[el.id]=el.value; });
  const open={}; root.querySelectorAll('details[id]').forEach(d=>{ open[d.id]=d.open; });
  // Inline edit panels (e.g. the request "Edit" form, id=edit_<rid>) are shown via style.display —
  // remember which are open so a live-sync re-render doesn't slam them shut mid-typing.
  const panels=[]; root.querySelectorAll('div[id^="edit_"]').forEach(p=>{ if(p.style.display&&p.style.display!=='none') panels.push(p.id); });
  const a=document.activeElement; const focus=(a&&root.contains(a)&&a.id)?{id:a.id,s:a.selectionStart,e:a.selectionEnd}:null;
  return {vals,open,panels,focus,scroll:root.scrollTop};
}
function restoreInputs(rootId,snap){
  if(!snap) return; const root=document.getElementById(rootId); if(!root) return;
  if(snap.panels) snap.panels.forEach(id=>{ const p=document.getElementById(id); if(p) p.style.display='block'; });
  Object.keys(snap.vals).forEach(id=>{ const el=document.getElementById(id); if(el&&'value' in el) el.value=snap.vals[id]; });
  if(snap.open) Object.keys(snap.open).forEach(id=>{ const d=document.getElementById(id); if(d) d.open=snap.open[id]; });
  if(snap.scroll!=null) root.scrollTop=snap.scroll;
  if(snap.focus){ const el=document.getElementById(snap.focus.id); if(el){ try{ el.focus(); if(snap.focus.s!=null&&el.setSelectionRange) el.setSelectionRange(snap.focus.s,snap.focus.e); }catch(e){} } }
}

/* Always a continuous 12-month run — empty months are drawn as gaps, not skipped, otherwise the

function fill12(rows){
  const now=new Date(); const cur=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const keys=rows.map(r=>r.key).filter(Boolean).sort();
  const start=(keys[0]&&keys[0]<cur)?keys[0]:cur;
  const last=keys[keys.length-1]||cur;
  const out=[]; const by={}; rows.forEach(r=>by[r.key]=r);
  let [y,mo]=start.split('-').map(Number);

    out.push(by[k]||{key:k,revenue:0,paid:0,due:0,booked:0});

}

function earnList(key,summaryHtml,rowsHtml){
  const open=!!earnOpen[key];
  return `<div class="rev-od" style="margin-top:10px">
    <button class="rev-fold" onclick="toggleEarn('${key}')"><span class="ups-car ${open?'open':''}">›</span><span class="rev-sub">${summaryHtml}</span><span class="rev-fold-x">${open?'hide':'show'}</span></button>
    <div style="display:${open?'block':'none'}">${rowsHtml}</div>
  </div>`;
}
async function renderRevenue(){
  const el=document.getElementById('editor'); if(!el) return;
  if(!METRICS) await refreshMetrics();
  const m=METRICS;
  if(!m){ el.innerHTML='<div class="today-clear">Revenue is restricted to Jan and Ivonna.</div>'; return; }
  const od=(m.overdue||[]).filter(o=>o.daysOverdue>0);
  const sec=(t,body,sub,id)=>`<div class="rev-sec"${id?` id="${id}"`:''}><h3>${t}${sub?`<span class="rev-sub">${sub}</span>`:''}</h3>${body}</div>`;
  /* LEFT column carries the headline KPI cards, stacked. The booking list / search / folders are
     hidden in revenue view (see .cols.rev-mode CSS); nav stays on the Today/Arrivals buttons at
     the top of the left column. */
  const kpiHtml=`<div class="rev-kpi-left" id="revKpi">
      <div class="stat"><div class="num money">${money0(m.totalRevenue)}</div><div class="lbl">Invoiced add-ons</div></div>
      <div class="stat paid"><div class="num money">${money0(m.paidRevenue)}</div><div class="lbl">Paid</div></div>
      <div class="stat owed clk" onclick="revShowDue()" title="Tap to see every unpaid invoice · ${(m.overdue||[]).filter(o=>o.daysOverdue>0).length} past their due date"><div class="num money">${money0(m.dueRevenue)}</div><div class="lbl">Still to collect${m.overdueTotal?` · ${money0(m.overdueTotal)} overdue`:''} <span style="opacity:.6">›</span></div></div>
      <div class="rev-kpi-pair">
        <div class="stat"><div class="num">${m.booked||0}</div><div class="lbl">Invoices</div></div>
        <div class="stat" title="Share of published bookings that bought at least one add-on — ${m.staysWithBooking||0} of ${m.published||0} stays"><div class="num">${m.attachRate||0}%</div><div class="lbl">Bookings with add-ons</div></div>
      </div>
    </div>`;

  /* Sections are built as named blocks, then placed in the order Jan wants:
     Revenue by arrival month → CPH earnings → Golf carts → Airport transfers.
     Cash flow lives in the LEFT column, under the KPI cards. */
  const secRevMonth = sec('Revenue by arrival month', revMonthChart(m.byMonth||[]), 'when the money is earned', 'rsec-month');

  const secCph = (function(){
      const t=m.totalEarnings; if(!t||!t.margin) return '';
      const D=(t.parts||[]).map(p=>({key:p.key,margin:p.margin,charged:p.charged,bookings:0}));
      const max=Math.max(...D.map(p=>p.margin),1), tot=t.margin;
      const C=['#12794D','#5A3A88','#C8A038','#9E5B43'];
      return sec('CPH earnings · all services',`
        <div class="today-stats" style="margin-bottom:12px">
          <div class="stat paid"><div class="num money">${money0(t.margin)}</div><div class="lbl">What CPH earns</div></div>
          <div class="stat"><div class="num money">${money0(t.charged)}</div><div class="lbl">Charged to guests</div></div>
          <div class="stat"><div class="num money" style="color:#9E5B43">${money0(t.charged-t.margin)}</div><div class="lbl">Paid to suppliers</div></div>
          <div class="stat"><div class="num">${Math.round(t.margin/(t.charged||1)*100)}%</div><div class="lbl">Margin</div></div>
        </div>
        ${D.map((p,i)=>`<div class="rev-bar">
          <div class="rev-bar-top"><span>${esc(p.key)}</span><span class="rev-bar-v" style="color:${C[i%C.length]}">${money0(p.margin)} <b style="color:var(--soft);font-size:11px">${Math.round(p.margin/tot*100)}%</b></span></div>
          <div class="rev-track"><div class="rev-fill" style="width:${Math.max(2,(p.margin/max)*100)}%;background:${C[i%C.length]}"></div></div>
          <div class="rev-bar-sub">${money0(p.charged)} charged to guests</div>
        </div>`).join('')}
        ${t.upcomingMargin?`<div class="rev-sub" style="margin-top:8px">Still to come from upcoming stays: <b style="color:#12794D">${money0(t.upcomingMargin)}</b></div>`:''}`,
        'the margin — not the invoice total', 'rsec-cph');
    })();

    /* WHEN the outstanding money actually lands, from the due dates on the unpaid invoices. */
    const secCash = (function(){
      const cf=m.cashFlow||[];
      const nodate=cf.find(c=>c.key==='nodate');
      const dated=cf.filter(c=>c.key!=='nodate');
      const byKey={}; dated.forEach(c=>byKey[c.key]=c);
      // Continuous 12-month run from the current month (or earlier if there are overdue months),
      // filling empty months with zero so cash flow always reads as a full year, like the trend chart.
      const now=new Date(); const curKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
      const keys=dated.map(c=>c.key).sort();
      const start=(keys[0]&&keys[0]<curKey)?keys[0]:curKey;
      const [sy,sm]=start.split('-').map(Number);
      const months=[];
      for(let i=0;i<12;i++){ const d=new Date(sy,sm-1+i,1); const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); months.push(byKey[k]||{key:k,total:0,count:0,overdue:0,items:[]}); }
      keys.forEach(k=>{ if(!months.some(mo=>mo.key===k)) months.push(byKey[k]); }); // never hide real money beyond the 12-window
      const list = nodate?months.concat([nodate]):months;
      if(!list.length) return '';
      const max=Math.max(...list.map(c=>c.total),1);
      return sec('Cash flow · what’s still to collect',`
        ${list.map(c=>{
          const lbl=c.key==='nodate'?'No due date':monthLblY(c.key);
          const has=c.count>0;
          const late=c.overdue>0, open=has&&cfOpen.has(c.key);
          return `<div class="rev-bar cf-bar ${open?'open':''}" ${has?`onclick="toggleCf('${c.key}')" title="Tap to see the invoices" style="cursor:pointer"`:`style="opacity:.5"`}>
            <div class="rev-bar-top"><span>${has?`<span class="ups-car ${open?'open':''}">›</span>`:''}${lbl}${late?' <span class="rev-od-d">overdue</span>':''}</span><span class="rev-bar-v" style="color:${late?'#9A2B2B':(has?'var(--ink)':'var(--soft)')}">${money0(c.total)}</span></div>
            <div class="rev-track"><div class="rev-fill" style="width:${Math.max(2,(c.total/max)*100)}%;background:${late?'#9A2B2B':'#C8A038'}"></div></div>
            <div class="rev-bar-sub">${c.count} invoice${c.count===1?'':'s'}</div>
            ${open?`<div class="rev-od" style="margin-top:6px">${(c.items||[]).map(o=>`
              <div class="rev-od-row" onclick="event.stopPropagation();selectStay('${o.stayId}')">
                <span class="rev-od-g">${esc(o.guest)}<span class="rev-od-v"> · ${esc(o.villa||'—')}${o.no?' · #'+esc(o.no):''}${o.title?' · '+esc(o.title):''}</span></span>
                <span class="rev-od-m">${money0(o.total)} ${o.daysOverdue>0?`<span class="rev-od-d">${o.daysOverdue}d late</span>`:(o.dueBy?`<span class="rev-od-due">due ${esc(fmtDayY(o.dueBy))}</span>`:'')}</span>
              </div>`).join('')}</div>`:''}
          </div>`;}).join('')}`,
        'by the due date on each unpaid invoice · rolling 12 months · tap a month to see them');
    })();

    const secCart = (function(){
      const ce=m.cartEarnings; if(!ce||!ce.all.cartNights) return '';
      const up=(ce.rows||[]).filter(r=>r.upcoming);
      return sec('Golf cart earnings · Julio',`
        <div class="today-stats" style="margin-bottom:12px">
          <div class="stat paid"><div class="num money">${money0(ce.all.margin)}</div><div class="lbl">CPH earnings</div></div>
          <div class="stat"><div class="num money">${money0(ce.all.charged)}</div><div class="lbl">Charged to guest</div></div>
          <div class="stat"><div class="num money">${money0(ce.all.paid)}</div><div class="lbl">Paid by guest</div></div>
          <div class="stat owed"><div class="num money">${money0(ce.all.unpaid)}</div><div class="lbl">Unpaid</div></div>
          <div class="stat"><div class="num money" style="color:#9E5B43">${money0(ce.all.cost)}</div><div class="lbl">Paid to Julio</div></div>
          <div class="stat"><div class="num">${ce.all.cartNights}</div><div class="lbl">Cart-days</div></div>
        </div>
        ${earnBySource(ce.bySource,{key:'cartNights',label:'cart-days'})}
        ${up.length?earnList('cart',`Upcoming — projected: <b style="color:#12794D">${money0(ce.upcoming.margin)}</b> on ${ce.upcoming.cartNights} cart-days`,
          up.map(r=>`<div class="rev-od-row" onclick="selectStay('${r.stayId}')">
            <span class="rev-od-g">${esc(r.guest)}<span class="rev-od-v"> · ${esc(r.villa||'—')} · ${esc(fmtDay(r.checkin))} · ${esc(r.source)}</span></span>
            <span class="rev-od-m">${r.carts}× cart · ${r.nights}n · ${money0(r.charged)} ${payPill(r)} <span class="rev-cm">+${money0(r.margin)}</span></span>
          </div>`).join('')):''}`,
        `US$ ${ce.perNight} per cart per day · rate tier changes with the season, the spread doesn't`, 'rsec-cart');
    })();

    const secXfer = (function(){
      const te=m.transferEarnings; if(!te||!te.all.charged) return '';
      const up=(te.rows||[]).filter(r=>r.upcoming);
      return sec('Airport transfer earnings',`
        <div class="today-stats" style="margin-bottom:12px">
          <div class="stat paid"><div class="num money">${money0(te.all.margin)}</div><div class="lbl">CPH earnings</div></div>
          <div class="stat"><div class="num money">${money0(te.all.charged)}</div><div class="lbl">Charged to guest</div></div>
          <div class="stat"><div class="num money">${money0(te.all.paid)}</div><div class="lbl">Paid by guest</div></div>
          <div class="stat owed"><div class="num money">${money0(te.all.unpaid)}</div><div class="lbl">Unpaid</div></div>
          <div class="stat"><div class="num money" style="color:#9E5B43">${money0(te.all.cost)}</div><div class="lbl">Paid to supplier</div></div>
          <div class="stat"><div class="num">${te.all.trips}</div><div class="lbl">Transfers</div></div>
        </div>
        ${earnBySource(te.bySource,{key:'trips',label:'legs'})}
        ${up.length?earnList('xfer',`Upcoming — projected: <b style="color:#12794D">${money0(te.upcoming.margin)}</b> on ${te.upcoming.trips} transfer${te.upcoming.trips===1?'':'s'}`,
          up.map(r=>`<div class="rev-od-row" onclick="selectStay('${r.stayId}')">
            <span class="rev-od-g">${esc(r.guest)}<span class="rev-od-v"> · ${esc(r.villa||'—')} · ${esc(fmtDay(r.checkin))} · ${esc(r.source)}${r.supplier?' · '+esc(r.supplier):''}</span></span>
            <span class="rev-od-m">${r.trips} leg${r.trips===1?'':'s'} · ${money0(r.charged)} ${payPill(r)} <span class="rev-cm">+${money0(r.margin)}</span></span>
          </div>`).join('')):''}`,
        `${te.pct}% of what the guest is charged · the supplier keeps the rest`, 'rsec-xfer');
    })();

    const secYacht = (function(){
      const ye=m.yachtEarnings; if(!ye||!ye.all.charged) return '';
      const up=(ye.rows||[]).filter(r=>r.upcoming);
      return sec('Yacht charter earnings',`
        <div class="today-stats" style="margin-bottom:12px">
          <div class="stat paid"><div class="num money">${money0(ye.all.margin)}</div><div class="lbl">CPH earnings</div></div>
          <div class="stat"><div class="num money">${money0(ye.all.charged)}</div><div class="lbl">Charged to guest</div></div>
          <div class="stat"><div class="num money">${money0(ye.all.paid)}</div><div class="lbl">Paid by guest</div></div>
          <div class="stat owed"><div class="num money">${money0(ye.all.unpaid)}</div><div class="lbl">Unpaid</div></div>
          <div class="stat"><div class="num money" style="color:#9E5B43">${money0(ye.all.cost)}</div><div class="lbl">Boat's price</div></div>
          <div class="stat"><div class="num">${ye.all.count}</div><div class="lbl">Charters</div></div>
        </div>
        ${earnBySource(ye.bySource,{key:'count',label:'charters'})}
        ${up.length?earnList('yacht',`Upcoming — projected: <b style="color:#12794D">${money0(ye.upcoming.margin)}</b> on ${ye.upcoming.count} charter${ye.upcoming.count===1?'':'s'}`,
          up.map(r=>`<div class="rev-od-row" onclick="selectStay('${r.stayId}')">
            <span class="rev-od-g">${esc(r.guest)}<span class="rev-od-v"> · ${esc(r.villa||'—')} · ${esc(fmtDay(r.checkin))} · ${esc(r.source)}${r.supplier?' · '+esc(r.supplier):''}</span></span>
            <span class="rev-od-m">${money0(r.charged)} ${payPill(r)} <span class="rev-cm">+${money0(r.margin)}</span></span>
          </div>`).join('')):''}`,
        `${ye.pct}% markup added on top of the boat's price`, 'rsec-yacht');
    })();

    const secCar = (function(){
      const ce=m.carEarnings; if(!ce) return '';
      const has=ce.all.charged>0;
      const up=(ce.rows||[]).filter(r=>r.upcoming);
      return sec('Car rental earnings',`
        <div class="today-stats" style="margin-bottom:12px">
          <div class="stat paid"><div class="num money">${money0(ce.all.margin)}</div><div class="lbl">CPH earnings</div></div>
          <div class="stat"><div class="num money">${money0(ce.all.charged)}</div><div class="lbl">Charged to guest</div></div>
          <div class="stat"><div class="num money">${money0(ce.all.paid)}</div><div class="lbl">Paid by guest</div></div>
          <div class="stat owed"><div class="num money">${money0(ce.all.unpaid)}</div><div class="lbl">Unpaid</div></div>
          <div class="stat"><div class="num money" style="color:#9E5B43">${money0(ce.all.cost)}</div><div class="lbl">Paid to supplier</div></div>
          <div class="stat"><div class="num">${ce.all.count}</div><div class="lbl">Rentals</div></div>
        </div>
        ${has?earnBySource(ce.bySource,{key:'count',label:'rentals'}):'<div class="rev-empty">No car rentals invoiced yet — this section fills in automatically when one is added.</div>'}
        ${up.length?earnList('car',`Upcoming — projected: <b style="color:#12794D">${money0(ce.upcoming.margin)}</b> on ${ce.upcoming.count} rental${ce.upcoming.count===1?'':'s'}`,
          up.map(r=>`<div class="rev-od-row" onclick="selectStay('${r.stayId}')">
            <span class="rev-od-g">${esc(r.guest)}<span class="rev-od-v"> · ${esc(r.villa||'—')} · ${esc(fmtDay(r.checkin))} · ${esc(r.source)}${r.supplier?' · '+esc(r.supplier):''}</span></span>
            <span class="rev-od-m">${money0(r.charged)} ${payPill(r)} <span class="rev-cm">+${money0(r.margin)}</span></span>
          </div>`).join('')):''}`,
        `${ce.pct}% of what the guest is charged · the supplier keeps the rest`, 'rsec-car');
    })();

    /* Chef · massage · nannies · staff · entertainment — grouped. Margin % is TBD, so while it's
       pending we show what's charged and mark the profit "to be set" instead of a fake US$0. */
    const secInvilla = (function(){
      const ie=m.invillaEarnings; if(!ie) return '';
      const has=ie.all.charged>0;
      const up=(ie.rows||[]).filter(r=>r.upcoming);
      const pend=ie.pending;
      return sec('In-villa services earnings',`
        <div class="today-stats" style="margin-bottom:12px">
          ${pend
            ? `<div class="stat"><div class="num" style="color:#9E5B43;font-size:20px">TBD</div><div class="lbl">CPH profit — to be set</div></div>`
            : `<div class="stat paid"><div class="num money">${money0(ie.all.margin)}</div><div class="lbl">CPH earnings</div></div>`}
          <div class="stat"><div class="num money">${money0(ie.all.charged)}</div><div class="lbl">Charged to guest</div></div>
          <div class="stat"><div class="num money">${money0(ie.all.paid)}</div><div class="lbl">Paid by guest</div></div>
          <div class="stat owed"><div class="num money">${money0(ie.all.unpaid)}</div><div class="lbl">Unpaid</div></div>
          ${pend?'':`<div class="stat"><div class="num money" style="color:#9E5B43">${money0(ie.all.cost)}</div><div class="lbl">Paid to supplier</div></div>`}
          <div class="stat"><div class="num">${ie.all.count}</div><div class="lbl">Bookings</div></div>
        </div>
        ${!has?'<div class="rev-empty">No chef / massage / nannies / staff / entertainment invoiced yet — fills in automatically when one is added.</div>':(pend?'':earnBySource(ie.bySource,{key:'count',label:'bookings'}))}
        ${up.length?earnList('invilla',`Upcoming: ${money0(ie.upcoming.charged)} charged on ${ie.upcoming.count} booking${ie.upcoming.count===1?'':'s'}${pend?'':` · projected <b style="color:#12794D">${money0(ie.upcoming.margin)}</b>`}`,
          up.map(r=>`<div class="rev-od-row" onclick="selectStay('${r.stayId}')">
            <span class="rev-od-g">${esc(r.guest)}<span class="rev-od-v"> · ${esc(r.villa||'—')} · ${esc(fmtDay(r.checkin))} · ${esc(r.source)}${r.supplier?' · '+esc(r.supplier):''}</span></span>
            <span class="rev-od-m">${money0(r.charged)} ${payPill(r)}${pend?'':` <span class="rev-cm">+${money0(r.margin)}</span>`}</span>
          </div>`).join('')):''}`,
        pend?'chef · massage · nannies · staff · cake · bike rentals · entertainment — profit margin to be determined':'chef · massage · nannies · staff · cake · bike rentals · entertainment', 'rsec-invilla');
    })();

    /* Groceries — the supermarket bill and service fee are a pass-through, but CPH keeps the
       PICK-UP & DELIVERY fee on each grocery invoice. That fee is the earning; shown here in the
       same format as the other services. */
    const secGrocEarn = (function(){
      const ge=m.groceryEarnings; if(!ge) return '';
      const has=ge.all.charged>0;
      const up=(ge.rows||[]).filter(r=>r.upcoming);
      return sec('Grocery earnings · pick-up &amp; delivery',`
        <div class="today-stats" style="margin-bottom:12px">
          <div class="stat paid"><div class="num money">${money0(ge.all.margin)}</div><div class="lbl">CPH earnings</div></div>
          <div class="stat"><div class="num money">${money0(ge.all.charged)}</div><div class="lbl">Charged to guest</div></div>
          <div class="stat"><div class="num money">${money0(ge.all.paid)}</div><div class="lbl">Paid by guest</div></div>
          <div class="stat owed"><div class="num money">${money0(ge.all.unpaid)}</div><div class="lbl">Unpaid</div></div>
          <div class="stat"><div class="num money" style="color:#9E5B43">${money0(ge.all.cost)}</div><div class="lbl">Grocery bill</div></div>
          <div class="stat"><div class="num">${ge.all.count}</div><div class="lbl">Invoices</div></div>
        </div>
        ${has?earnBySource(ge.bySource,{key:'count',label:'invoices'}):'<div class="rev-empty">No grocery invoices yet — this section fills in automatically when one is added.</div>'}
        ${up.length?earnList('grocearn',`Upcoming — projected: <b style="color:#12794D">${money0(ge.upcoming.margin)}</b> on ${ge.upcoming.count} invoice${ge.upcoming.count===1?'':'s'}`,
          up.map(r=>`<div class="rev-od-row" onclick="selectStay('${r.stayId}')">
            <span class="rev-od-g">${esc(r.guest)}<span class="rev-od-v"> · ${esc(r.villa||'—')} · ${esc(fmtDay(r.checkin))} · ${esc(r.source)}</span></span>
            <span class="rev-od-m">${money0(r.charged)} ${payPill(r)} <span class="rev-cm">+${money0(r.margin)}</span></span>
          </div>`).join('')):''}`,
        'CPH keeps the pick-up &amp; delivery fee · the grocery bill is a pass-through', 'rsec-groc');
    })();

    /* Money-to-chase blocks (formerly the right rail) now live in the right grid column. */
    const allUnpaid=(m.overdue||[]); const owing=allUnpaid.slice(0,12); // worst first
    const unpaidTotal=allUnpaid.reduce((s,o)=>s+(o.total||0),0);
    const unpaidSec = owing.length?sec('Unpaid invoices',`<div class="rev-od">${owing.map(o=>`
      <div class="rev-od-row" onclick="selectStay('${o.stayId}')">
        <span class="rev-od-g">${esc(o.guest)}<span class="rev-od-v"> · ${esc(o.villa||'—')}</span></span>
        <span class="rev-od-m">${money0(o.total)}${o.daysOverdue>0?` <span class="rev-od-d">${o.daysOverdue}d late</span>`:(o.dueBy?` <span class="rev-od-due">due ${esc(fmtDayY(o.dueBy))}</span>`:'')}</span>
      </div>`).join('')}<div class="rev-od-row rev-od-total"><span class="rev-od-g">Total · ${allUnpaid.length} invoice${allUnpaid.length===1?'':'s'}</span><span class="rev-od-m">${money0(unpaidTotal)}</span></div></div>`,'soonest due first · tap to open'):'';
    const topVillasSec = sec('Top villas earnings', revVillaBars(m.byVilla||[],m.totalRevenue,10), 'invoiced add-ons per villa · tap a villa to see its invoices');

    /* Full-width: nav + title + the revenue-by-month trend. Everything else sits in an even 50/50 grid. */
    el.innerHTML=`
    <div class="pay-topnav">
      <button class="nav-back" onclick="backToList()" title="Back to the stay list">← All stays</button>
      <button onclick="showToday()">▦ Today</button>
      <button onclick="showArrivals()">▤ Arrivals</button>
      ${CAN_PAY?`<button class="nav-owner" onclick="showJan()" title="Jan — supplier payables">◒ Jan</button>`:''}
    </div>
    <div class="today-head"><span style="font-weight:400">Revenue &amp;</span> <b style="font-weight:800">upsell</b></div>
    <div class="today-date">Every issued invoice across all bookings · Jan &amp; Ivonna only</div>
    ${/* Top: two columns — month trend + CPH earnings (left) · cash flow (right). */''}
    <div class="rev-grid">
      <div class="rev-col">${secRevMonth}${secCph}</div>
      <div class="rev-col">${secCash?`<div id="revCash">${secCash}</div>`:''}</div>
    </div>
    ${/* Per-service earnings: three across, two rows — cart · airport · car, then yacht · in-villa · groceries. */''}
    <div class="rev-grid rev-grid-3">
      ${secCart}
      ${secXfer}
      ${secCar}
      ${secYacht}
      ${secInvilla}
      ${secGrocEarn}
    </div>
    ${/* Bottom: Top villas earnings beside Unpaid invoices — two columns. */''}
    <div class="rev-grid">
      <div class="rev-col">${topVillasSec}</div>
      <div class="rev-col">${unpaidSec}</div>
    </div>`;

  buildRevSecNav();  // top section-nav chips, same style as the stay editor's secbar

/* Shared painter. C = {who, scope, sort, filter, sortFn, filterFn, settleFn}. */

  const tInv=rows.reduce((s,r)=>s+r.charged,0), tPay=rows.reduce((s,r)=>s+r.cost,0), tProf=rows.reduce((s,r)=>s+r.margin,0);

  const row=r=>{
    const state=r.settled?'st-settled':(r.guestPaid?'st-topay':'st-await');

    <div class="pay-sumcard"><h4>Awaiting guest payment</h4><div class="sub">becomes payable once the guest pays</div>
      ${waiting.length?waiting.map(g=>supRow(g,' wait')).join(''):'<div class="sub">Nothing awaiting guest payment.</div>'}</div>
    <div class="pay-sumcard"><h4>Profit to account</h4><div class="sub">CPH margin on paid bookings</div>
      <div class="pay-rail-profit">${money0(p.profit)}<span>realised${p.profitPending?` · ${money0(p.profitPending)} pending`:''}</span></div></div>

    <div class="today-date">Full ledger · golf carts &amp; transfers · click a column to sort, chips above to filter · ${esc(C.scope)}</div>

  buildPaySecNav(p,C.filter,C.filterFn);

  const upcomingPub=L.filter(s=>{const d=daysUntil(s.checkin);return s.status==='published'&&s.checkin&&s.checkin>=today&&d!=null&&!hasDeparted(s);});

function stayAlerts(s){
  const gc=s.guestCheckin||{};
  const occ=String(gc.occasion||'').trim();
  // Gather dietary/allergy notes from all three places, then de-duplicate (guests often repeat
  // the same note across pre check-in, grocery and meals — show it once).
  const dietRaw=[gc.dietary,(s.grocery&&s.grocery.note),(s.mealPlan&&s.mealPlan.note)].map(x=>String(x||'').trim()).filter(Boolean);
  const _seen=new Set(); const diet=dietRaw.filter(x=>{ const k=x.toLowerCase().replace(/\s+/g,' '); if(_seen.has(k))return false; _seen.add(k); return true; });
  const adults=Number(s.adults)||0, children=Number(s.children)||0, party=adults+children;
  const cap=Number(s.villaSleeps||((BOOT.villas.find(v=>v.id===s.villaId)||{}).sleeps))||null;
  const ages=(gc.childAges||[]).filter(a=>a!==''&&a!=null);
  let h='';
  if(cap&&party>cap) h+=`<div class="alertbar diet">⚠ <b>Over capacity:</b> party of ${party} exceeds the villa's ${cap} beds <span class="ab-sub">— confirm sleeping arrangements before arrival.</span></div>`;
  if(occ) h+=`<div class="alertbar occ">🎉 <b>Occasion:</b> ${esc(occ)} <span class="ab-sub">— a welcome touch (cake, décor, champagne) goes a long way.</span></div>`;
  if(diet.length) h+=`<div class="alertbar diet">⚠ <b>Dietary &amp; allergies:</b> ${diet.map(esc).join(' · ')} <span class="ab-sub">— brief the chef &amp; check provisioning.</span></div>`;
  if(children>0) h+=`<div class="alertbar info">👶 <b>Children in the party:</b> ${children}${ages.length?' (ages '+ages.map(esc).join(', ')+')':''} <span class="ab-sub">— offer cribs / high chairs and note pool safety.</span></div>`;
  if(gc.transportMode==='self'){ const dt=[gc.transportCompany,gc.transportArrival?('arr '+gc.transportArrival):''].filter(Boolean).map(esc).join(' · '); h+=`<div class="alertbar info">🚗 <b>Guest arranging own transport</b>${dt?': '+dt:''} <span class="ab-sub">— send resort gate-access instructions so they can enter Casa de Campo.</span></div>`; }
  return h;
}

window.invDates=function(i,which,v){ if(!_invDraft||!_invDraft.items[i])return; const it=_invDraft.items[i]; it[which]=v;
  const combo=(it.svcOpt||'')+' '+(it.label||''); const hasRate=!!(String(it.rate||'').trim()); const isDay=/day/i.test(combo);
  const perDay=hasRate&&isDay; const rt=/round\s*-?\s*trip/i.test(combo);
  if(perDay){
    // Rental (golf cart / car rental): Pick-up → Return. Start fills the end (same day) so it is never blank. Days = NIGHTS between them (min 1).
    if(which==='dateFrom'){ if(!it.dateTo||it.dateTo<it.dateFrom) it.dateTo=it.dateFrom; }
    if(which==='dateTo'){ if(!it.dateFrom) it.dateFrom=it.dateTo; if(it.dateTo&&it.dateFrom&&it.dateTo<it.dateFrom) it.dateFrom=it.dateTo; }
    if(it.dateFrom){ const d=invDaysSpan(it.dateFrom,it.dateTo); it.days=String(d); const rate=parseFloat(String(it.rate).replace(/[^0-9.]/g,'')); if(isFinite(rate)&&String(it.rate).trim()!==''){ it.amount=String(Math.round(rate*d*100)/100); } }
  } else if(hasRate){
    // Per-unit service (e.g. per-hour): a single service date; quantity & amount stay manual.
    it.dateTo='';
  } else {
    // Flat service (e.g. airport transfer): the date(s) only record WHEN. One-way = single date.
    if(!rt) it.dateTo=''; it.days='';
  }
  renderInvItems();
};

  if(val==='custom'){ it.label=''; it.rate=''; it.days=''; it.amount=''; renderInvItems(); const box=document.getElementById('invItems'); const inp=box?box.querySelectorAll('input[placeholder^="Description"]')[i]:null; if(inp)inp.focus(); return; }

function groBreakdown(iv){ const n=v=>Number(String(v==null?0:v).replace(/[^0-9.]/g,''))||0;
  const totalUSD=n(iv.totalUSD), deposit=n(iv.depositUSD); const finalUSD=Math.round((totalUSD-deposit)*100)/100;
  return { totalRD:n(iv.totalRD), subUSD:n(iv.subUSD), svc:n(iv.serviceFeeUSD), pickup:n(iv.pickupUSD), totalUSD, deposit, finalUSD,
    dueUSD:Math.max(0,finalUSD),        // still collectable (a credit never offsets other invoices)
    refundUSD:Math.max(0,-finalUSD) };  // we owe the guest this back
}
// Grocery invoice auto-calc: service fee = 15% of sub-total; total = sub + service fee + pick-up.
// Deposit (funds already received) is manual and is subtracted → FINAL TOTAL. All fields stay editable.
window.groAutoCalc=function(src){
  const val=id=>parseFloat(String((document.getElementById(id)||{}).value||'').replace(/[^0-9.-]/g,''))||0;
  const set=(id,v)=>{ const el=document.getElementById(id); if(el)el.value=v; };
  const sub=val('groSubUSD'); const pickup=val('groPickup'); let svc=val('groSvc');
  if(src==='sub'){ svc=Math.round(sub*15)/100; set('groSvc', sub? String(svc):''); }
  const total=Math.round((sub+svc+pickup)*100)/100;
  if(src!=='deposit') set('groTotalUSD', (sub||svc||pickup)? String(total):'');
  groFinalSync();
};
/* FINAL TOTAL = Total invoice − deposit. Negative = refund owed to the guest. */
function groFinalSync(){
  const val=id=>parseFloat(String((document.getElementById(id)||{}).value||'').replace(/[^0-9.-]/g,''))||0;
  const tot=val('groTotalUSD'), dep=val('groDeposit'); const fin=Math.round((tot-dep)*100)/100;
  const el=document.getElementById('groFinal'); if(el) el.value=(tot||dep)?('US$ '+fin.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})):'';
  const hint=document.getElementById('groFinalHint');
  if(hint) hint.innerHTML = !dep ? '' : (fin<0
    ? `<b style="color:#9E5B43">Credit — US$ ${Math.abs(fin).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})} to refund to the guest.</b> Nothing to collect.`
    : `Guest still owes <b>US$ ${fin.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</b> after the deposit.`);
}

function nights(a,b){ const d1=new Date(a),d2=new Date(b); if(isNaN(d1)||isNaN(d2))return null; return Math.max(0,Math.round((d2-d1)/864e5)); }
function daysUntil(a){ const d=new Date(a+'T00:00:00'); if(isNaN(d))return null; return Math.max(0,Math.ceil((d-new Date(new Date().toDateString()))/864e5)); }
function fmtReqDate(ts){ try{ const d=new Date(ts); if(isNaN(d))return ''; return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDay(iso){ const d=new Date(iso+'T00:00:00'); if(isNaN(d))return iso; return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function guestPulse(ts){
  if(!ts) return '<span class="pulse off">· not opened yet</span>';
  const m=Math.floor((Date.now()-ts)/60000);
  const t=m<1?'just now':m<60?(m+'m ago'):m<1440?(Math.floor(m/60)+'h ago'):(Math.floor(m/1440)+'d ago');
  return '<span class="pulse '+(m<30?'on':'off')+'">· opened '+t+'</span>';
}
/* The right column = the concierge "do-now" action rail. Only time-sensitive items that

function renderPreview(){
  const host=document.getElementById('preview'); if(!host) return;
  if(!cur){ host.innerHTML='<div class="empty">No stay selected.</div>'; return; }
  const st=cur.status; const statusLine=st==='published'?['Published · link active','#5B9E6F']:st==='needs info'?['Needs info · not sent','#9E5B43']:['Draft · not yet visible','#9A7B36'];
  // todayStr() = LOCAL date. toISOString() is UTC — at UTC-4 it rolls over to tomorrow at 8pm local,
  // so a stay would read "departed" a day early every evening.
  const todayISO=todayStr();
  const d=daysUntil(cur.checkin);
  const departed=!!(cur.checkout&&cur.checkout<todayISO);
  const reqs=(cur.requests||[]);
  const pending=reqs.filter(r=>r.status!=='done'&&r.status!=='cancelled');
  const reqMeta=r=>[r.cartType?esc(r.cartType):'',r.serviceLevel?esc(r.serviceLevel):'',r.date?esc(r.date)+(r.endDate?' → '+esc(r.endDate):''):'',r.time?esc(r.time):'',r.guests?esc(r.guests)+' g':''].filter(Boolean).join(' · ')||'No date/time given';

  // Money to collect — invoices sent to the guest but not yet paid.

  const unpaid=invs.filter(iv=>iv.status==='sent'); const unpaidTot=unpaid.reduce((a,iv)=>a+invTot(iv),0);

  // Your move — decisions the concierge owes (outside the request queue).
  const yp=cur.yachtProposal; const yChosen=(yp&&yp.status==='chosen')?(yp.options||[]).find(o=>o.id===yp.chosenId):null;
  const yachtToInvoice=yChosen&&!invs.some(iv=>iv.yachtId===yp.id);
  const fuList=(Array.isArray(cur.followUps)&&cur.followUps.length)?cur.followUps:(cur.followUpDate?[{date:cur.followUpDate,note:cur.followUpNote||''}]:[]);

  // Awaiting guest — informational, ball in the guest's court.

  const yachtWaiting=yp&&yp.status!=='chosen';

  // Arrival readiness — only within 14 days of an upcoming stay; each missing item jumps to its section.
  const rdy=[
    ['Pre check-in', !!cur.guestCheckin, 'csec-guest-party'],
    ['Transfer arranged', !!cur.transferArranged, 'csec-guest-pending-requests'],
    ['Guest registration', !!(cur.guestList&&cur.guestList.length), 'csec-guest-registration-list'],
    ['Registration #', !!(cur.registrationNumber&&String(cur.registrationNumber).trim()), 'csec-payment-balance'],
    ['Groceries', !!(cur.grocery&&((cur.grocery.items&&cur.grocery.items.length)||cur.grocery.note)), 'csec-grocery-pre-stocking'],

  const needsBody=pending.length?pending.map(r=>`<div class="act-card warn">

      ${r.note?`<div class="act-meta">“${esc(r.note)}”</div>`:''}
      ${r.status==='confirmed'
        ? `<div class="act-meta" style="color:#3F6B4E;margin-top:5px">Confirmed${r.price?' · '+esc(usdStr(r.price)):''} — arrange &amp; mark done</div><div class="act-row"><button class="b-fill" onclick="markDoneReq('${r.id}')">Mark done</button></div>`
        : `<div class="act-row"><input id="pa_${r.id}" value="${esc(reqSuggestedPrice(r))}" placeholder="Final price, e.g. US$ 150"><button class="b-fill" onclick="confirmReq('${r.id}','pa')">Confirm</button></div>`}
    </div>`).join(''):`<div class="act-empty">No requests waiting — all caught up.</div>`;

  const moneyBody=unpaid.length?`<div class="act-card" style="border-color:#E3C4B6;background:#FBF1EC">
      <div class="act-title" style="color:#9A2B2B">US$ ${unpaidTot.toLocaleString('en-US')} outstanding</div>

    </div>`);
  const moveBody=moveCards.join('');

  // Notice board — every follow-up reminder for this stay, pinned like sticky notes (overdue / today highlighted).
  const fuSorted=fuList.slice().filter(f=>f&&(f.date||f.note)).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  const noticeBody=fuSorted.length

  const notesTxt=String(cur.internalNotes||'').trim();
  const notesBody=notesTxt

    : `<div class="act-empty">No internal notes.<div class="act-row" style="margin-top:7px"><button class="b-out" onclick="jumpSec('csec-internal-notes')">Add a note</button></div></div>`;

  const awaitBits=[];
  if(svcAwait.length) awaitBits.push(svcAwait.length+' service'+(svcAwait.length===1?'':'s')+' awaiting reply');
  if(yachtWaiting) awaitBits.push('yacht proposal — waiting for guest');
  const awaitBody=awaitBits.length?`<div class="act-meta" style="padding:2px 2px 0">${awaitBits.map(esc).join(' · ')}</div>`:'';

  const readyBody=missing.length
    ? `<div style="display:flex;flex-wrap:wrap;gap:6px">${missing.map(x=>`<button class="secnav-chip" style="border-color:#E4C58C;color:#8A6D2E" onclick="jumpSec('${x[2]}')">○ ${esc(x[0])}</button>`).join('')}</div>`

  const qa=[];
  qa.push(`<button class="b-out" onclick="openInvoice('')">New invoice</button>`);
  if(cur.status==='published') qa.push(`<button class="b-out" onclick="sendLoginLink()">WhatsApp Guest</button>`);
  const qaBody=`<div class="act-row" style="flex-wrap:wrap">${qa.join('')}</div>`;

  host.innerHTML=`

    <div class="pvstatus" style="color:${statusLine[1]}"><span class="dot" style="background:${statusLine[1]}"></span>${statusLine[0]}</div>
    ${sec('Notice board', fuSorted.length, noticeBody)}
    ${sec('Internal notes', 0, notesBody)}
    ${sec('Needs action', pending.length, needsBody)}
    ${moneyBody?sec('Money to collect', unpaid.length, moneyBody):''}
    ${moveBody?sec('Your move', moveCards.length, moveBody):''}
    ${showReady?sec('Arrival readiness', missing.length, readyBody):''}
    ${awaitBody?sec('Awaiting guest', 0, awaitBody):''}
    ${sec('Quick actions', 0, qaBody)}

  chatPopupRefresh();
