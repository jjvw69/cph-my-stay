<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Concierge Console · Caribbean Paradise Homes</title>
<meta name="theme-color" content="#16241E">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CPH Console">
<link rel="apple-touch-icon" href="https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/11/cropped-CPH-Logo-Only-FB-270x270.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F5EFE5;--panel:#FBF8F1;--card:#FFF;--ink:#1F2A24;--accent:#33493B;--accent2:#5B6E5F;--soft:#8B8475;--line:#E6DDCC;--gold:#A98C5A;--login:#16241E;
    --okbg:#E2EAE0;--oktx:#33493B;--drbg:#F0E7D2;--drtx:#9A7B36;--nibg:#F2E3DC;--nitx:#9E5B43;
    --display:'Cormorant Garamond',Georgia,serif;--ui:'Jost',-apple-system,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{overflow-x:hidden;max-width:100%}
  body{font-family:var(--ui);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:var(--ui);cursor:pointer;border:0;background:none}
  input,select,textarea{font-family:var(--ui);font-size:16px;color:var(--ink)}
  .label{font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft)}
  /* Gate */
  #gate{position:fixed;inset:0;background:linear-gradient(160deg,#1B2B23,#16241E);display:flex;align-items:center;justify-content:center;z-index:50}
  .gatecard{width:382px;max-width:92vw;background:var(--bg);border-radius:22px;padding:34px 30px;text-align:center;box-shadow:0 30px 70px -30px rgba(0,0,0,.6)}
  .gatecard img{width:48px;margin:0 auto 10px;display:block}
  .gatecard .wm{font-size:11.5px;letter-spacing:.24em;color:var(--soft)}
  .gatecard h1{font-family:var(--display);font-weight:600;font-size:26px;margin:8px 0 2px}
  .gatecard .sub{font-size:13px;color:var(--soft);margin-bottom:20px}
  .gatecard label{display:block;text-align:left;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);margin:12px 0 5px}
  .gatecard input{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:#fff}
  .btn{width:100%;background:var(--accent);color:#fff;border-radius:12px;padding:13px;font-size:16px;font-weight:500;margin-top:18px}
  .btn.alt{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .gerr{display:none;background:var(--nibg);color:var(--nitx);font-size:14px;padding:8px 12px;border-radius:9px;margin-top:12px}
  .gatecard .foot{font-size:12.5px;color:var(--soft);margin-top:16px}
  .gatecard .ssoNote{font-size:12.5px;color:var(--soft);margin-top:10px}
  /* Console */
  #app{display:none;height:100dvh;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;background:#fff;border-bottom:1px solid var(--line)}
  .topbar .brand{display:flex;align-items:center;gap:9px}
  .topbar .brand img{width:26px}
  .topbar .brand b{font-family:var(--display);font-weight:600;font-size:16px;line-height:1.1}
  .topbar .right{display:flex;align-items:center;gap:16px;font-size:14px;color:var(--soft)}
  .sync{display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:#5B9E6F;display:inline-block}
  .who{color:var(--ink)}
  .cols{flex:1;display:grid;grid-template-columns:296px 1fr 372px;overflow:hidden}
  .col{overflow-y:auto;height:100%}
  .left{border-right:1px solid var(--line);background:var(--panel);padding:16px 14px}
  .left .hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .left .hd .label{font-size:12.5px}
  .newbtn{font-size:14px;color:var(--accent);font-weight:500}
  .search{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 12px;background:#fff;margin-bottom:12px}
  .staycard{background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:9px;cursor:pointer}
  .staycard.unread{border-color:#E4B9B0;box-shadow:inset 3px 0 0 #C0392B}
  .staycard .g{display:flex;align-items:center}
  .unread-dot{width:9px;height:9px;border-radius:50%;background:#C0392B;display:inline-block;margin-left:8px;flex:0 0 auto}
  .staycard.sel{border-color:var(--accent);background:#F1F4EF}
  .staycard .g{font-weight:500;font-size:16px}
  .staycard .meta{font-size:13.5px;color:var(--soft);margin-top:3px}
  .pill{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;margin-top:7px}
  .pill.published{background:var(--okbg);color:var(--oktx)}
  .pill.draft{background:var(--drbg);color:var(--drtx)}
  .pill.needsinfo{background:var(--nibg);color:var(--nitx)}
  .reqbadge{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;margin:7px 0 0 6px;background:#9E5B43;color:#fff}
  .srcpill{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px}
  .srcpill.direct{background:#E8EEF5;color:#3E5675;border:1px solid #D4DEEC}
  .srcpill.partner{background:#F1E9F2;color:#6E4A72;border:1px solid #E1D0E4}
  .pillrow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px}
  .pillrow .pill,.pillrow .srcpill,.pillrow .reqbadge,.pillrow .fupill{margin:0;vertical-align:middle}
  .fupill{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;margin:7px 0 0 6px;background:#E7EBE6;color:#5B6B5F}
  .fupill.due{background:#F4E4C7;color:#8A5A1E}
  .fupill.over{background:#F2D7CF;color:#9E3B2A}
  .fustrip{background:#FBF1E8;border:1px solid #ECD9C5;border-radius:13px;padding:11px 12px;margin-bottom:12px}
  .fuhd{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#9E5B43;font-weight:600;margin-bottom:2px}
  .fuitem{display:flex;align-items:flex-start;gap:9px;width:100%;text-align:left;background:#fff;border:1px solid #ECD9C5;border-radius:10px;padding:9px 11px;margin-top:7px;cursor:pointer}
  .fudot{width:8px;height:8px;border-radius:50%;background:#C8852F;flex:0 0 auto;margin-top:5px}
  .fudot.over{background:#9E3B2A}
  .futx{display:flex;flex-direction:column;min-width:0}
  .futx b{font-size:13.5px}
  .futx span{font-size:12px;color:var(--soft)}
  .todaybtn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;background:#33493B;color:#fff;border-radius:11px;padding:10px 12px;font-size:13.5px;font-weight:500;margin-bottom:12px;cursor:pointer}
  .todaybtn.alert{background:#9E5B43}
  .homebtns{display:flex;gap:8px;margin-bottom:12px}
  .homebtns .todaybtn{margin-bottom:0;flex:1}
  .todaybtn.inbox{background:#5B6E5F}
  .todaybtn.on{box-shadow:inset 0 0 0 2px rgba(255,255,255,.55)}
  .hb-badge{background:rgba(255,255,255,.28);border-radius:20px;padding:1px 8px;font-size:12px;margin-left:4px}
  .ibx-prev{flex-basis:100%;font-size:12.5px;color:var(--soft);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .tr-tag.grey{background:#EFEBE0;color:#8B8475}
  /* ---- Today overview (center) ---- */
  .today-head{font-family:var(--display);font-weight:600;font-size:26px;color:var(--ink)}
  .today-date{font-size:13px;color:var(--soft);margin:2px 0 16px}
  .today-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:11px;margin-bottom:8px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 14px}
  .stat.clk{cursor:pointer;transition:border-color .12s,transform .08s}
  .stat.clk:hover{border-color:var(--accent)}
  .stat.clk:active{transform:scale(.985)}
  .stat.hot{border-color:#E4C58C;background:#FCF7EC}
  .stat .num{font-family:var(--display);font-size:30px;line-height:1;color:var(--accent)}
  .stat.hot .num{color:#9E5B43}
  .stat .lbl{font-size:12px;color:var(--soft);margin-top:5px}
  .today-sec{margin-top:22px}
  .today-sec h3{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);font-weight:600;margin-bottom:9px}
  .today-row{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;cursor:pointer;text-align:left;width:100%}
  .today-row:hover{border-color:var(--accent)}
  .tr-main{flex:1;min-width:0;display:flex;align-items:baseline;flex-wrap:wrap}
  .today-row .tr-g{font-size:14.5px;font-weight:600;color:var(--ink)}
  .today-row .tr-m{font-size:12.5px;color:var(--soft)}
  .tr-sep{color:var(--soft);margin:0 7px;font-size:12px}
  .awin-row{display:flex;gap:6px;margin:7px 0 13px}
  .awin{flex:1;border:1px solid var(--line);background:#fff;border-radius:11px;padding:8px 4px;font-size:11.5px;color:var(--soft);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.1}
  .awin.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .awin-n{font-family:var(--display);font-size:18px;font-weight:600}
  .today-row .tr-tag{margin-left:auto;flex:0 0 auto;font-size:11.5px;font-weight:600;border-radius:20px;padding:3px 11px;white-space:nowrap}
  .tr-tag.amber{background:#FBF1D8;color:#9A7B36}
  .tr-tag.red{background:#F3DADA;color:#9A2B2B}
  .tr-tag.green{background:#E2EFE0;color:#3F6B4E}
  .today-clear{background:#fff;border:1px dashed var(--line);border-radius:14px;padding:26px 14px;text-align:center;color:var(--soft);font-size:14.5px;margin-top:8px}
  /* ---- #6 quick wins ---- */
  .lfilter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px}
  .lchip{font-size:12px;border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 11px;color:var(--soft);cursor:pointer}
  .lchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .topPending{display:none;background:#9E5B43;color:#fff;border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .topPending.show{display:inline-block}
  .tmpl{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
  .tmpl button{font-size:12.5px;border:1px solid var(--line);background:#FBF8F1;border-radius:18px;padding:6px 12px;color:var(--accent);cursor:pointer}
  /* ---- #5 activity timeline ---- */
  .tl{position:relative;margin-top:10px;padding-left:6px}
  .tl-row{position:relative;padding:0 0 13px 20px;border-left:2px solid var(--line)}
  .tl-row:last-child{border-left-color:transparent}
  .tl-dot{position:absolute;left:-7px;top:2px;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}
  .tl-dot.g{background:#9E5B43}.tl-dot.ok{background:#3F6B4E}.tl-dot.no{background:#9A2B2B}.tl-dot.s{background:#33493B}
  .tl-when{font-size:11.5px;color:var(--soft)}
  .tl-what{font-size:13.5px;color:var(--ink);margin-top:1px}
  .tl-what b{font-weight:600}
  details.sec summary{list-style:none}
  details.sec summary::-webkit-details-marker{display:none}
  .tl-hint{float:right;color:var(--soft);font-size:12.5px}
  .tl-hint-open{display:none}
  details.sec[open] .tl-hint-closed{display:none}
  details.sec[open] .tl-hint-open{display:inline}
  .msave{display:none}
  .reqcount{display:inline-block;font-size:12px;background:#9E5B43;color:#fff;border-radius:20px;padding:1px 9px;margin-left:8px;vertical-align:middle}
  .reqlist{display:flex;flex-direction:column;gap:9px}
  .reqitem{border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:#FBFAF6}
  .reqtop{display:flex;align-items:center;gap:9px}
  .reqtop b{font-size:14.5px;flex:1}
  .reqtype{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:6px;background:#EEF3EE;color:#33493B}
  .reqtype.addon{background:#F3ECDD;color:#7A5A2E}
  .reqx{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 11px;font-size:12.5px;color:#33493B;cursor:pointer}
  .reqmeta{font-size:13px;color:var(--soft);margin-top:6px}
  .reqnote{font-size:13px;color:var(--ink,#33493B);margin-top:5px;font-style:italic}
  .reqok{display:inline-block;font-size:11px;background:var(--okbg);color:var(--oktx);border:1px solid #cfe0c8;border-radius:20px;padding:2px 9px;font-weight:600;white-space:nowrap}
  .reqconfirm{display:flex;gap:8px;margin-top:10px}
  .reqconfirm input{flex:1;min-width:0;border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:13.5px;font-family:var(--ui);background:#fff}
  .reqconfirm button{white-space:nowrap;padding:8px 14px;font-size:13px;border-radius:9px}
  .center{padding:22px 26px}
  .center .ehd{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px}
  .center h2{font-family:var(--display);font-weight:600;font-size:28px}
  .center .ref{font-size:13.5px;color:var(--soft);margin-bottom:16px}
  .ebtns{display:flex;gap:8px;flex:0 0 auto}
  .ebtns button{font-size:14px;padding:9px 14px;border-radius:10px}
  .b-out{border:1px solid var(--line);background:#fff;color:var(--ink)}
  .b-fill{background:var(--accent);color:#fff}
  .emode{display:inline-flex;border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:14px;background:#fff}
  .emode button{border:0;background:#fff;color:var(--soft);padding:8px 18px;font-size:13.5px;font-family:var(--ui);cursor:pointer}
  .emode button.on{background:var(--accent);color:#fff;font-weight:600}
  @media(min-width:1024px){ .emode{display:none} }
  .right .chatscroll{max-height:46vh}
  .right .chatwrap{margin-top:2px}
  .chatwrap{display:flex;flex-direction:column}
  .chatscroll{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;max-height:62vh;overflow-y:auto;display:flex;flex-direction:column;gap:9px}
  .chatcompose{display:flex;gap:8px;margin-top:11px}
  .chatcompose input{flex:1;min-width:0;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14.5px;font-family:var(--ui)}
  .alertbar{border-radius:12px;padding:11px 14px;margin-bottom:12px;font-size:13.5px;line-height:1.5}
  .alertbar b{font-weight:600}
  .alertbar .ab-sub{color:inherit;opacity:.8}
  .alertbar.occ{background:#FBF4E4;border:1px solid #E6CF92;color:#7A5A1E}
  .alertbar.diet{background:#FCEDE6;border:1px solid #E3B49C;color:#8A3D22}
  .vitals{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:14px}
  .vrow{display:flex;flex-wrap:wrap;gap:10px 22px;padding:7px 0;border-bottom:1px solid #EFF1EC}
  .vrow:first-child{padding-top:0}
  .vstat{display:flex;flex-direction:column;min-width:0}
  .vk{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
  .vv{font-size:14.5px;font-weight:600;color:var(--ink);margin-top:1px}
  .v-green{color:#3F6B4E}
  .v-amber{color:#9E5B43}
  .v-soft{color:var(--soft);font-weight:500}
  .vpill{font-size:11.5px;border-radius:20px;padding:2px 10px;font-weight:600}
  .vpill.amber{background:#FCF3EC;color:#9E5B43;border:1px solid #E4C58C}
  .vpill.calm{background:#F1F4EF;color:#3F6B4E}
  .vready{display:flex;flex-wrap:wrap;gap:7px;padding-top:9px}
  .vchip{font-size:11.5px;border-radius:20px;padding:3px 10px;background:#F4F2EC;color:#9AA49B;border:1px solid var(--line)}
  .vchip.on{background:#EAF1EA;color:#3F6B4E;border-color:#cfe0c8}
  .sec{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
  .sec h3{font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .f label{display:block;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:5px}
  .f input,.f select,.f textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:#fff}
  .f input[type=date],.f input[type=time]{-webkit-appearance:none;appearance:none;min-width:0}
  .f input[type=date]::-webkit-date-and-time-value,.f input[type=time]::-webkit-date-and-time-value{text-align:left}
  .f input[type=date]::-webkit-calendar-picker-indicator,.f input[type=time]::-webkit-calendar-picker-indicator{margin-left:auto}
  .f.full{grid-column:1/3}
  .step{display:flex;align-items:center;gap:12px}
  .step button{width:28px;height:28px;border-radius:50%;border:1px solid var(--line);color:var(--accent);font-size:16px;background:#fff}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 13px;border-radius:20px;font-size:14px}
  .seg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .toggle{display:flex;align-items:center;gap:10px;font-size:13.5px}
  .sw{width:42px;height:24px;border-radius:20px;background:var(--line);position:relative;transition:.2s;flex:0 0 auto}
  .sw.on{background:var(--accent)}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
  .sw.on::after{left:20px}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 13px;border-radius:22px;font-size:14px}
  .chip.on{background:var(--okbg);color:var(--oktx);border-color:#cfe0c8}
  .counter{font-size:13.5px;color:var(--soft);margin-top:9px}
  /* Right preview */
  .right{border-left:1px solid var(--line);background:var(--panel);padding:18px 16px}
  .right .label{margin-bottom:3px}
  .pvstatus{font-size:13.5px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
  .phone{background:#16241E;border-radius:26px;padding:10px;box-shadow:0 18px 40px -20px rgba(0,0,0,.5)}
  .screen{background:var(--bg);border-radius:18px;overflow:hidden;min-height:430px}
  .pv-hero{height:120px;background:linear-gradient(135deg,#33493B,#1E2B25) center/cover}
  .pv-body{padding:14px}
  .pv-eyebrow{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft)}
  .pv-villa{font-family:var(--display);font-weight:600;font-size:22px;margin:2px 0}
  .pv-loc{font-size:13.5px;color:var(--soft);margin-bottom:10px}
  .pv-count{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px;display:flex;justify-content:space-between;align-items:center}
  .pv-count .big{font-family:var(--display);font-size:30px;color:var(--accent);line-height:1}
  .pv-count .s{font-size:12.5px;color:var(--soft)}
  .pv-greet{font-size:14px;color:var(--soft);margin-top:10px}
  .pv-greet b{color:var(--ink)}
  .pv-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 11px;margin-top:8px;font-size:14px}
  /* ---- live Guest Activity panel ---- */
  .apv-head{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:14px}
  .apv-villa{font-family:var(--display);font-weight:600;font-size:19px;color:var(--ink);line-height:1.15}
  .apv-rev{font-size:12.5px;color:#3F6B4E;font-weight:600;margin-top:6px}
  .ups-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:18px}
  .ups-h{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);font-weight:600;margin-bottom:10px}
  .ups-row{display:flex;gap:18px;flex-wrap:wrap}
  .ups-stat .ups-num{font-family:var(--display);font-size:24px;color:var(--accent);line-height:1}
  .ups-stat .ups-lbl{font-size:11.5px;color:var(--soft);margin-top:3px}
  .ups-svc{margin-top:13px;border-top:1px solid var(--line);padding-top:10px}
  .ups-svc-h{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin-bottom:6px}
  .ups-svc-row{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:3px 0}
  .ups-svc-name{color:var(--ink)}
  .ups-svc-meta{color:var(--soft);white-space:nowrap}
  .apv-sub{font-size:12.5px;color:var(--soft);margin-top:3px}
  .pulse{font-weight:600}
  .pulse.on{color:#3F6B4E}
  .pulse.off{color:#9A7B36}
  .act-sec{margin-bottom:16px}
  .act-h{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);font-weight:600;margin-bottom:8px}
  .act-n{background:#33493B;color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;letter-spacing:0}
  .act-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px}
  .act-card.warn{border-color:#E4C58C;background:#FCF7EC}
  .act-title{font-size:14px;font-weight:600;color:var(--ink)}
  .act-meta{font-size:12.5px;color:var(--soft);margin-top:3px}
  .act-msg{font-size:13.5px;color:var(--ink);line-height:1.45}
  .act-row{display:flex;gap:7px;margin-top:9px}
  .act-row input{flex:1;min-width:0;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;font-family:var(--ui);background:#fff}
  .act-row .b-fill{padding:8px 13px;white-space:nowrap}
  .act-jump{margin-top:9px;padding:8px 13px;font-size:13px}
  .act-empty{font-size:13px;color:var(--soft);background:#fff;border:1px dashed var(--line);border-radius:12px;padding:12px;text-align:center}
  .rd-row{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink);padding:5px 0}
  .rd-ic{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex:0 0 auto}
  .rd-ic.ok{background:#E2EFE0;color:#3F6B4E}
  .rd-ic.no{background:#F0EBDF;color:#B6A98C}
  .dirtytag{display:none;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:#9A7B36;background:#FBF1D8;border:1px solid #ECD9A6;border-radius:9px;padding:5px 10px}
  .b-fill.hot{box-shadow:0 0 0 3px rgba(169,140,90,.25)}
  .glink{margin-top:14px}
  .glink .box{display:flex;gap:8px;margin-top:5px}
  .glink input{flex:1;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:11.5px;background:#fff}
  .glink button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:0 12px;font-size:13.5px;color:var(--accent)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;padding:11px 20px;border-radius:24px;font-size:13.5px;opacity:0;transition:.25s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty{color:var(--soft);font-size:16px;padding:40px 10px;text-align:center}
  /* Landscape iPad: keep all three columns (incl. the guest preview) but slim the sides to fit. */
  @media(min-width:1024px) and (max-width:1180px){ .cols{grid-template-columns:244px 1fr 300px} .center{padding:18px 18px} .right{padding:16px 12px} }
  /* Portrait iPad & narrower: two columns, hide the preview. */
  @media(max-width:1023px){ .cols{grid-template-columns:280px 1fr} .right{display:none} }
  .backlist{display:none}
  .botnav{display:none}
  @media(max-width:760px){
    #app,.topbar,.cols,.col,.center,.ehd,.ebtns,.sec,.grid{min-width:0;max-width:100%}
    .cols{display:block;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:66px}
    .botnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:300;background:#fff;border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
    .botnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;border:0;background:none;color:var(--soft);font-size:10.5px;font-family:var(--ui);cursor:pointer;padding:4px 0}
    .botnav button .ic{font-size:19px;line-height:1.05}
    .botnav button.on{color:var(--accent);font-weight:600}
    #app.editing .botnav{display:none}
    .col{height:auto;overflow:visible;border:0}
    .col.left{display:block}
    .col.center,.col.right{display:none}
    #app.view-detail .col.left{display:none}
    #app.view-detail .col.center{display:block}
    #app.view-detail .col.right{display:block;border-top:1px solid var(--line);margin-top:10px}
    .backlist{display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 13px;font-size:14px;color:var(--accent)}
    .topbar{flex-direction:column;align-items:flex-start;gap:9px;padding:calc(12px + env(safe-area-inset-top)) 16px 12px}
    .topbar .right{width:100%;flex-wrap:wrap;gap:8px 14px;font-size:13px}
    .topbar .who{overflow-wrap:anywhere;min-width:0}
    .center{padding:16px 14px}
    .center .ehd{flex-direction:column;align-items:stretch;gap:10px}
    .center h2{font-size:24px}
    .ebtns{flex-wrap:wrap}
    .ebtns button{flex:1 1 auto}
    .grid{grid-template-columns:1fr}
    .f.full{grid-column:auto}
    .left{padding:14px 12px}
    /* sticky save bar on the mobile stay detail */
    #app.view-detail .msave{display:flex;position:fixed;left:0;right:0;bottom:0;gap:9px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96);border-top:1px solid var(--line);z-index:40;backdrop-filter:blur(6px)}
    #app.view-detail .msave button{flex:1;min-height:46px;border-radius:11px;font-size:15px}
    #app.view-detail .col.center{padding-bottom:78px}
  }
  /* Touch devices (iPad): larger tap targets and comfortable spacing. */
  @media(pointer:coarse){
    .seg button,.chip{padding:10px 15px;font-size:15px}
    .step button{width:36px;height:36px;font-size:18px}
    .ebtns button{padding:12px 16px;min-height:44px}
    .b-out,.b-fill{min-height:44px}
    .reqx{padding:9px 14px;font-size:13.5px}
    .reqconfirm button{padding:11px 16px}
    .reqconfirm input{padding:10px 12px}
    .f input,.f select,.f textarea,.search{padding:11px 12px}
    .staycard{padding:14px}
    .newbtn{font-size:15px}
    .fuitem{padding:11px 12px}
    #signout{padding:9px 14px}
  }
</style>
</head>
<body>
<div id="gate">
  <div class="gatecard">
    <img id="seal" alt=""><div class="wm">CARIBBEAN PARADISE HOMES</div>
    <h1>Concierge Console</h1><div class="sub">Staff sign-in</div>
    <div style="text-align:left">
      <label>Work email</label><input id="gEmail" type="email" autocomplete="username" placeholder="you@caribbeanparadisehomes.com">
      <label>Password</label><input id="gPass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn" id="gBtn">Sign in</button>
    <div class="gerr" id="gErr"></div>
    <div class="foot">Authorized staff only · every change is logged.</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="brand"><img id="seal2" alt=""><b>Caribbean Paradise Homes<br><span style="font-weight:400;color:var(--soft);font-size:12.5px">Concierge Console</span></b></div>
    <div class="right">
      <button class="topPending" id="topPending" onclick="showToday()" title="Open Today’s overview"></button>
      <span class="sync" id="syncTag" title="Auto-syncs with the guest app"><span class="dot" id="syncDot"></span> <span id="syncTxt">Console live</span></span>
      <span class="who" id="who"></span>
      <button class="b-out" style="padding:6px 12px;border:1px solid var(--line);border-radius:9px;font-size:13.5px" id="signout">Sign out</button>
    </div>
  </div>
  <div class="cols">
    <div class="col left">
      <div class="hd"><span class="label">Concierge desk</span><span style="display:flex;gap:13px"><button class="newbtn" onclick="doExport()" title="Download a backup of every stay as a file">⬇ Backup</button><button class="newbtn" id="newStay">＋ New</button></span></div>
      <div class="homebtns"><button class="todaybtn" id="todayBtn" onclick="showToday()">▦ Today</button><button class="todaybtn inbox" id="inboxBtn" onclick="showInbox()">✉ Inbox</button></div>
      <input class="search" id="search" placeholder="Search guest or villa…">
      <div class="lfilter">
        <button class="lchip on" data-f="all" onclick="setFilter('all')">All</button>
        <button class="lchip" data-f="published" onclick="setFilter('published')">Published</button>
        <button class="lchip" data-f="draft" onclick="setFilter('draft')">Draft</button>
        <button class="lchip" data-f="needs info" onclick="setFilter('needs info')">Needs info</button>
      </div>
      <div id="stayList"></div>
    </div>
    <div class="col center" id="editor"><div class="empty">Select a stay on the left, or create a new one.</div></div>
    <div class="col right" id="preview"><div class="empty">No stay selected.</div></div>
  </div>
  <nav class="botnav">
    <button onclick="showToday()"><span class="ic">▦</span>Today</button>
    <button onclick="showInbox()"><span class="ic">✉</span>Inbox</button>
    <button onclick="backToList()"><span class="ic">≣</span>Stays</button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
const SEAL="https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/11/CPH-Seal-Clear.png";
document.getElementById('seal').src=SEAL; document.getElementById('seal2').src=SEAL;
if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('/sw.js',{scope:'/console'}).catch(function(){}); }catch(e){} }
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let BOOT={villas:[],addons:[],concierges:[]}, LIST=[], cur=null; // cur = working copy

/* ---- per-stay "seen" tracking (unread dots), persisted in localStorage ---- */
function getSeen(){ try{ return JSON.parse(localStorage.getItem('cph_console_seen')||'{}')||{}; }catch(e){ return {}; } }
function setSeen(m){ try{ localStorage.setItem('cph_console_seen',JSON.stringify(m)); }catch(e){} }
function markViewed(stay){ if(!stay||!stay.id)return; const m=getSeen(); m[stay.id]=Object.assign(m[stay.id]||{},{req:(stay.requests||[]).length,msg:(stay.messages||[]).filter(x=>x.from==='guest').length}); setSeen(m); }
function isUnread(s){ const seen=getSeen()[s.id]; return (s.requests||0)>(seen?seen.req:0) || (s.guestMsgs||0)>(seen?seen.msg:0); }
function unreadMsgs(s){ const seen=getSeen()[s.id]; return Math.max(0,(s.guestMsgs||0)-(seen?seen.msg:0)); }
function tlMarkViewed(d){ if(!d||!d.open||!cur)return; const m=getSeen(); m[cur.id]=Object.assign(m[cur.id]||{},{tl:tlEventCount(cur)}); setSeen(m); const b=d.querySelector('.reqcount'); if(b)b.style.display='none'; }
function tlEventCount(s){ let n=0; (s.requests||[]).forEach(r=>{ if(r.createdAt)n++; if(r.status==='confirmed')n++; if(r.status==='done')n++; if(r.status==='cancelled')n++; }); n+=(s.messages||[]).length; return n; }
async function api(path,opts={}){ const r=await fetch(path,Object.assign({headers:{'Content-Type':'application/json'},credentials:'same-origin'},opts)); let j={}; try{j=await r.json();}catch(e){} return {status:r.status,ok:r.ok&&j.ok!==false,body:j}; }
function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2400); }

/* ---- auth ---- */
async function boot(){ const me=await api('/api/staff/me'); if(me.body&&me.body.ok&&me.body.staff){ enter(me.body.staff); } }
document.getElementById('gBtn').onclick=signin;
document.getElementById('gPass').addEventListener('keydown',e=>{if(e.key==='Enter')signin();});
async function signin(){
  const email=document.getElementById('gEmail').value.trim(), password=document.getElementById('gPass').value;
  const err=document.getElementById('gErr'); err.style.display='none';
  const r=await api('/api/staff/login',{method:'POST',body:JSON.stringify({email,password})});
  if(r.ok){ enter(r.body.staff); } else { err.textContent=r.body.error||'Sign-in failed.'; err.style.display='block'; }
}
async function enter(staff){
  document.getElementById('gate').style.display='none'; document.getElementById('app').style.display='flex';
  document.getElementById('who').textContent=staff.name||staff.email;
  const b=await api('/api/staff/bootstrap'); if(b.ok) BOOT=b.body;
  await refreshMetrics();
  await loadList();
  startPolling();
  try{ if('Notification' in window && Notification.permission==='default') Notification.requestPermission(); }catch(e){}
  const ps=new URLSearchParams(location.search).get('stay'); if(ps) selectStay(ps);
}
document.getElementById('signout').onclick=async()=>{ await api('/api/staff/logout',{method:'POST'}); location.reload(); };

/* ---- list ---- */
let METRICS=null;
async function refreshMetrics(){ try{ const r=await api('/api/staff/metrics'); if(r.ok) METRICS=r.body.metrics; }catch(e){} }
async function loadList(sel){ const r=await api('/api/staff/stays'); LIST=(r.body&&r.body.stays)||[]; renderList(); refreshTodayBtn(); if(sel) selectStay(sel); else if(!cur) renderHome(); }

/* ============ live sync ============ */
let POLL=null, lastSyncAt=0;
function startPolling(){ if(POLL)clearInterval(POLL); POLL=setInterval(syncNow,18000); setInterval(updateSyncAge,10000); checkVersion(); startSSE(); }
/* Instant updates via Server-Sent Events — the moment a guest sends a request/message (or
   another staff edits), the server pushes an event and we refresh right away instead of
   waiting up to 18s. The 18s poll stays as a fallback. EventSource auto-reconnects. */
let _ES=null;
function startSSE(){
  if(typeof EventSource==='undefined') return;
  try{ if(_ES){ _ES.close(); } _ES=new EventSource('/api/staff/events');
    _ES.onmessage=(ev)=>{ let d={}; try{ d=JSON.parse(ev.data); }catch(_){ } if(!d||d.type==='hello') return; syncNow(); if(document.hidden) notifyDesktop(d); else chime(); };
    _ES.onerror=()=>{};
  }catch(e){}
}
function notifyDesktop(d){
  try{ if(!('Notification' in window)||Notification.permission!=='granted') return;
    const t=d.type==='message'?'New guest message':d.type==='request'?'New guest request':'Guest update';
    const n=new Notification('My Stay · '+t,{body:'Open the Concierge Console to view.',tag:'cph-mystay'});
    n.onclick=()=>{ window.focus(); try{ n.close(); }catch(e){} };
  }catch(e){}
}
/* The live sync refreshes DATA but not the app's CODE — an open console tab keeps running the
   JS it loaded with. So we watch the deployed build hash and offer a Reload when a new version
   ships, so staff aren't left on stale code (e.g. missing a new rate auto-fill). */
let _APPVER=null;
async function checkVersion(){
  try{ const r=await api('/api/version'); const v=r&&r.body&&r.body.ver; if(!v) return;
    if(_APPVER===null){ _APPVER=v; return; }
    if(v!==_APPVER) showReloadBar();
  }catch(e){}
}
function showReloadBar(){
  if(document.getElementById('verbar')) return;
  const b=document.createElement('div'); b.id='verbar';
  b.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#16241E;color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:center;gap:14px;font-size:14px;box-shadow:0 -2px 14px rgba(0,0,0,.3)';
  b.innerHTML='✦ A new version of the console is available. <button onclick="location.reload()" style="background:#fff;color:#16241E;border:0;border-radius:8px;padding:7px 16px;font-size:13.5px;font-weight:600;cursor:pointer">Reload now</button>';
  document.body.appendChild(b);
}
async function syncNow(){
  if(document.hidden) return;
  let ok=true;
  try{ const r=await api('/api/staff/stays'); if(r.ok){ LIST=(r.body&&r.body.stays)||[]; renderList(); refreshTodayBtn(); await refreshMetrics(); if(!cur){ const e=document.getElementById('editor'); const sc=e?e.scrollTop:0; renderHome(); if(e)e.scrollTop=sc; } } else ok=false; }catch(e){ ok=false; }
  if(cur){ const c=await refreshCurrent(); if(c===false) ok=false; }
  markSynced(ok); checkVersion();
}
async function refreshCurrent(){
  if(!cur) return;
  let r; try{ r=await api('/api/staff/stays/'+cur.id); }catch(e){ return false; }
  if(!r.ok||!r.body.stay) return false;
  const fresh=r.body.stay;
  const guestMsgCount=m=>(m||[]).filter(x=>x.from==='guest').length;
  const newReqs=(fresh.requests||[]).length-((cur.requests||[]).length);
  const newMsgs=guestMsgCount(fresh.messages)-guestMsgCount(cur.messages);
  // Merge: never clobber the editable form while the staffer has unsaved edits.
  if(dirty){ ['requests','messages','guestCheckin','guestList','grocery','mealPlan','guestLastSeen'].forEach(k=>{ cur[k]=fresh[k]; }); }
  else { const id=cur.id; cur=fresh; if(cur.id!==id) return; }
  // Re-render, preserving any in-progress typing/scroll.
  if(!dirty){ const eS=snapshotInputs('editor'); renderEditor(); restoreInputs('editor',eS); }
  const pS=snapshotInputs('preview'); renderPreview(); restoreInputs('preview',pS);
  markViewed(cur); renderList();
  if(newReqs>0){ toast('New request from '+(cur.leadName||'guest')); chime(); }
  else if(newMsgs>0){ toast('New message from '+(cur.leadName||'guest')); chime(); }
}
function snapshotInputs(rootId){
  const root=document.getElementById(rootId); if(!root) return null;
  const vals={}; root.querySelectorAll('input,textarea').forEach(el=>{ if(el.id) vals[el.id]=el.value; });
  const open={}; root.querySelectorAll('details[id]').forEach(d=>{ open[d.id]=d.open; });
  const a=document.activeElement; const focus=(a&&root.contains(a)&&a.id)?{id:a.id,s:a.selectionStart,e:a.selectionEnd}:null;
  return {vals,open,focus,scroll:root.scrollTop};
}
function restoreInputs(rootId,snap){
  if(!snap) return; const root=document.getElementById(rootId); if(!root) return;
  Object.keys(snap.vals).forEach(id=>{ const el=document.getElementById(id); if(el&&'value' in el) el.value=snap.vals[id]; });
  if(snap.open) Object.keys(snap.open).forEach(id=>{ const d=document.getElementById(id); if(d) d.open=snap.open[id]; });
  if(snap.scroll!=null) root.scrollTop=snap.scroll;
  if(snap.focus){ const el=document.getElementById(snap.focus.id); if(el){ try{ el.focus(); if(snap.focus.s!=null&&el.setSelectionRange) el.setSelectionRange(snap.focus.s,snap.focus.e); }catch(e){} } }
}
function markSynced(ok){ if(ok) lastSyncAt=Date.now(); updateSyncAge(); }
function updateSyncAge(){
  const dot=document.getElementById('syncDot'), txt=document.getElementById('syncTxt'); if(!dot||!txt) return;
  if(!lastSyncAt){ txt.textContent='Console live'; return; }
  const s=Math.floor((Date.now()-lastSyncAt)/1000); const stale=s>50;
  dot.style.background=stale?'#C8852F':'#5B9E6F';
  txt.textContent=s<5?'Synced just now':('Synced '+(s<60?s+'s':Math.floor(s/60)+'m')+' ago');
}
let _AC=null;
function chime(){ try{ _AC=_AC||new (window.AudioContext||window.webkitAudioContext)(); const o=_AC.createOscillator(),g=_AC.createGain(); o.type='sine'; o.frequency.value=880; o.connect(g); g.connect(_AC.destination); g.gain.value=0.05; o.start(); o.frequency.setValueAtTime(1175,_AC.currentTime+0.09); setTimeout(()=>{try{o.stop();}catch(e){}},180); }catch(e){} }
window.addEventListener('focus',()=>{ syncNow(); });
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) syncNow(); });
document.getElementById('search').addEventListener('input',renderList);
document.getElementById('newStay').onclick=async()=>{ const r=await api('/api/staff/stays',{method:'POST'}); if(r.ok){ await loadList(r.body.stay.id); } };
let listFilter='all';
window.setFilter=function(f){ listFilter=f; document.querySelectorAll('.lchip').forEach(c=>c.classList.toggle('on',c.dataset.f===f)); renderList(); };
function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  const items=LIST.filter(s=>!q||(s.guest+' '+s.villa).toLowerCase().includes(q)).filter(s=>listFilter==='all'||(s.status||'draft')===listFilter);
  const el=document.getElementById('stayList');
  const today=todayStr();
  // Follow-ups that are due today or overdue, across all stays (not filtered by search).
  const due=LIST.filter(s=>s.followUpDate && s.followUpDate<=today).sort((a,b)=>(a.followUpDate||'').localeCompare(b.followUpDate||''));
  const strip=due.length?`<div class="fustrip"><div class="fuhd">Follow-ups due (${due.length})</div>${due.map(s=>{const over=s.followUpDate<today;return `<button class="fuitem" onclick="selectStay('${s.id}')"><span class="fudot ${over?'over':''}"></span><span class="futx"><b>${esc(s.guest)}</b><span>${esc(s.followUpNote||'Follow up')} · ${fmtDay(s.followUpDate)}${over?' · overdue':' · today'}</span></span></button>`;}).join('')}</div>`:'';
  if(!items.length){ el.innerHTML=strip+'<div class="empty" style="padding:20px 4px">No stays yet. Tap ＋ New.</div>'; return; }
  el.innerHTML=strip+items.map(s=>{
    const dates=(s.checkin||'?')+' – '+(s.checkout||'?');
    const pill=(s.status||'draft').replace(/\s/g,'').toLowerCase();
    const reqB=s.requests?`<span class="reqbadge">${s.requests} request${s.requests==1?'':'s'}</span>`:'';
    const isDirect=/direct/i.test(s.source||'');
    const srcB=s.source?`<span class="srcpill ${isDirect?'direct':'partner'}">${isDirect?'Direct':esc(s.source)}</span>`:'';
    const fuCls=s.followUpDate?(s.followUpDate<today?'over':s.followUpDate===today?'due':''):'';

/* Top-of-editor alerts: VIP occasion + a consolidated dietary/allergy flag (gathered from

function stayAlerts(s){

/* Mark done = keep the request as a record (status 'done'), logged in the timeline. */
window.markDoneReq=async function(rid){ if(!cur)return; const id=cur.id; const r=await api('/api/staff/stays/'+id+'/requests/'+rid+'/done',{method:'POST'}); if(r.ok){ const rq=(cur.requests||[]).find(x=>x.id===rid); if(rq){ rq.status='done'; rq.doneAt=(r.body.request&&r.body.request.doneAt)||Date.now(); } if(!dirty)renderEditor(); renderPreview(); const it=LIST.find(s=>s.id===id); if(it)it.pending=Math.max(0,(it.pending||0)-1); renderList(); refreshTodayBtn&&refreshTodayBtn(); toast('Marked done — kept in the log'); } else toast('Could not update'); };

/* Reopen = bring a done/cancelled request back into the active queue so it can be re-arranged/edited. */
window.reopenReq=async function(rid){ if(!cur)return; const id=cur.id; const r=await api('/api/staff/stays/'+id+'/requests/'+rid+'/reopen',{method:'POST'}); if(r.ok){ const rq=(cur.requests||[]).find(x=>x.id===rid); if(rq){ rq.status=''; rq.doneAt=''; rq.cancelledAt=''; } if(!dirty)renderEditor(); renderPreview(); const it=LIST.find(s=>s.id===id); if(it)it.pending=(it.pending||0)+1; renderList(); refreshTodayBtn&&refreshTodayBtn(); toast('Reopened — back in the active queue'); } else toast('Could not reopen'); };
/* Clear log = permanently remove a done/cancelled record from the list. */
window.clearLog=async function(rid){ if(!cur)return; const id=cur.id; const r=await api('/api/staff/stays/'+id+'/requests/'+rid,{method:'DELETE'}); if(r.ok){ cur.requests=(cur.requests||[]).filter(x=>x.id!==rid); if(!dirty)renderEditor(); renderPreview(); const it=LIST.find(s=>s.id===id); if(it)it.requests=Math.max(0,(it.requests||0)-1); renderList(); toast('Cleared from log'); } else toast('Could not update'); };
window.deleteReq=async function(rid){ if(!cur)return; const rq=(cur.requests||[]).find(x=>x.id===rid); const nm=(rq&&rq.title)?('"'+rq.title+'"'):'this request'; if(!confirm('Delete '+nm+' permanently? This removes it for you and the guest and cannot be undone.'))return; const id=cur.id; const r=await api('/api/staff/stays/'+id+'/requests/'+rid,{method:'DELETE'}); if(r.ok){ cur.requests=(cur.requests||[]).filter(x=>x.id!==rid); if(!dirty)renderEditor(); renderPreview(); const it=LIST.find(s=>s.id===id); if(it)it.requests=Math.max(0,(it.requests||0)-1); renderList(); if(typeof refreshMetrics==='function')refreshMetrics(); toast('Request deleted'); } else toast('Could not delete'); };
window.confirmReq=async function(rid){ if(!cur)return; const el=document.getElementById('pa_'+rid)||document.getElementById('px_'+rid); const price=(el&&el.value||'').trim(); const r=await api('/api/staff/stays/'+cur.id+'/requests/'+rid+'/confirm',{method:'POST',body:JSON.stringify({price})}); if(r.ok&&r.body.request){ const rq=(cur.requests||[]).find(x=>x.id===rid); if(rq){ rq.status='confirmed'; rq.price=r.body.request.price; rq.confirmedAt=r.body.request.confirmedAt||Date.now(); } if(!dirty)renderEditor(); renderPreview(); refreshMetrics(); toast('Confirmed — guest sees the price'); } else toast('Could not confirm'); };
window.sendStaffMsg=async function(){ if(!cur)return; const el=document.getElementById('staffMsg'); const t=(el&&el.value||'').trim(); if(!t)return; el.value=''; const r=await api('/api/staff/stays/'+cur.id+'/messages',{method:'POST',body:JSON.stringify({text:t})}); if(r.ok&&r.body.message){ cur.messages=cur.messages||[]; cur.messages.push(r.body.message); if(window.innerWidth>=1024){ renderPreview(); const el2=document.getElementById('staffMsg'); if(el2)el2.focus(); } else renderEditor(); } else toast('Could not send'); };
window.adj=function(k,d){ cur[k]=Math.max(0,(Number(cur[k])||0)+d); renderEditor(); renderPreview(); markDirty(); };
window.toggleAddon=function(id){ const a=cur.offeredAddOnIds||(cur.offeredAddOnIds=[]); const i=a.indexOf(id); if(i<0)a.push(id); else a.splice(i,1); renderEditor(); renderPreview(); markDirty(); };

/* ---- preview ---- */
function nights(a,b){ const d1=new Date(a),d2=new Date(b); if(isNaN(d1)||isNaN(d2))return null; return Math.max(0,Math.round((d2-d1)/864e5)); }
function daysUntil(a){ const d=new Date(a+'T00:00:00'); if(isNaN(d))return null; return Math.max(0,Math.ceil((d-new Date(new Date().toDateString()))/864e5)); }
function fmtReqDate(ts){ try{ const d=new Date(ts); if(isNaN(d))return ''; return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDay(iso){ const d=new Date(iso+'T00:00:00'); if(isNaN(d))return iso; return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function guestPulse(ts){
  if(!ts) return '<span class="pulse off">· not opened yet</span>';
  const m=Math.floor((Date.now()-ts)/60000);
  const t=m<1?'just now':m<60?(m+'m ago'):m<1440?(Math.floor(m/60)+'h ago'):(Math.floor(m/1440)+'d ago');
  return '<span class="pulse '+(m<30?'on':'off')+'">· opened '+t+'</span>';
}
/* The right column = live Guest Activity panel (needs-action, messages, readiness, pulse). */
function renderPreview(){
  const host=document.getElementById('preview'); if(!host) return;
  if(!cur){ host.innerHTML='<div class="empty">No stay selected.</div>'; return; }
  const c=BOOT.concierges.find(x=>x.id===cur.conciergeId)||{}, v=BOOT.villas.find(x=>x.id===cur.villaId)||{};
  const vName=cur.villaName||v.name||'—';
  const st=cur.status; const statusLine=st==='published'?['Published · link active','#5B9E6F']:st==='needs info'?['Needs info · not sent','#9E5B43']:['Draft · not yet visible','#9A7B36'];
  const d=daysUntil(cur.checkin), n=nights(cur.checkin,cur.checkout);
  const reqs=(cur.requests||[]);
  const pending=reqs.filter(r=>r.status!=='confirmed'&&r.status!=='cancelled');
  const cancelled=reqs.filter(r=>r.status==='cancelled');
  const guestMsgs=(cur.messages||[]).filter(m=>m.from==='guest');
  const gc=cur.guestCheckin;
  const ready=[
    ['Pre check-in submitted', !!gc],
    ['Grocery list', !!(cur.grocery&&cur.grocery.items&&cur.grocery.items.length)],
    ['Arrival meals', !!(cur.mealPlan&&['breakfast','lunch','dinner'].some(k=>cur.mealPlan[k]&&(cur.mealPlan[k].date||cur.mealPlan[k].desc)))],
    ['Guest registration', !!(cur.guestList&&cur.guestList.length)],
    ['Transfer arranged', !!cur.transferArranged],
  ];
  const reqMeta=r=>[r.cartType?esc(r.cartType):'',r.serviceLevel?esc(r.serviceLevel):'',r.date?esc(r.date)+(r.endDate?' → '+esc(r.endDate):''):'',r.time?esc(r.time):'',r.guests?esc(r.guests)+' g':''].filter(Boolean).join(' · ')||'No date/time given';
  // Slimmed to its unique value: the live action queue + a reply shortcut + the guest link.
  // (Status, villa, arrival, money, guest-activity and readiness all live in the vitals bar now.)
  host.innerHTML=`
    <div class="label">Action panel</div>
    <div class="pvstatus" style="color:${statusLine[1]}"><span class="dot" style="background:${statusLine[1]}"></span>${statusLine[0]}</div>

    <div class="act-sec"><div class="act-h">Needs action ${pending.length?`<span class="act-n">${pending.length}</span>`:''}</div>
      ${pending.length?pending.map(r=>`<div class="act-card warn">
        <div class="act-title">${esc(r.title||'Request')}</div>
        <div class="act-meta">${reqMeta(r)}${r.createdAt?' · '+fmtReqDate(r.createdAt):''}</div>
        ${r.note?`<div class="act-meta">“${esc(r.note)}”</div>`:''}
        <div class="act-row"><input id="pa_${r.id}" value="${esc(reqSuggestedPrice(r))}" placeholder="Final price, e.g. $150"><button class="b-fill" onclick="confirmReq('${r.id}')">Confirm</button></div>
      </div>`).join(''):`<div class="act-empty">No requests waiting — all caught up.</div>`}
    </div>

    ${window.innerWidth>=1024
      ? `<div class="act-sec"><div class="act-h">Concierge chat ${guestMsgs.length?`<span class="act-n">${guestMsgs.length}</span>`:''}</div>${chatPanelFull(cur)}</div>`
      : (guestMsgs.length?`<div class="act-sec"><div class="act-h">Latest guest message</div>
      <div class="act-card"><div class="act-meta" style="margin:0 0 6px">From ${esc(cur.leadName||'guest')}:</div>
        <div class="act-msg">“${esc(guestMsgs[guestMsgs.length-1].text)}”</div>
        <button class="b-out act-jump" onclick="jumpChat()">Reply in chat →</button></div></div>`:'')}

    <div class="glink"><div class="label">Guest link</div><div class="box"><input id="glink" readonly value="caribbeanparadisehomes.com/my-stay?b=${esc(cur.reference)}"><button onclick="copyLink()">Copy</button></div></div>`;
  const _sc=document.getElementById('chatScroll'); if(_sc)_sc.scrollTop=_sc.scrollHeight;
}
window.copyLink=function(){ const i=document.getElementById('glink'); i.select(); try{navigator.clipboard.writeText(i.value);}catch(e){document.execCommand('copy');} toast('Guest link copied'); };
window.copyGuestLink=function(){ const i=document.getElementById('glink2'); if(!i)return; i.select(); try{navigator.clipboard.writeText(i.value);}catch(e){document.execCommand('copy');} toast('Guest link copied'); };
window.jumpChat=function(){ setView(true); const el=document.getElementById('staffMsg'); if(el){ try{el.scrollIntoView({behavior:'smooth',block:'center'});}catch(e){} el.focus(); } };
window.doExport=async function(){ try{ const r=await fetch('/api/staff/export',{credentials:'same-origin'}); if(!r.ok){ toast('Export failed'); return; } const blob=await r.blob(); const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download='my-stay-backup-'+new Date().toISOString().slice(0,10)+'.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(u); toast('Backup downloaded'); }catch(e){ toast('Export failed'); } };
window.printStay=function(){
  if(!cur) return; const s=cur;
  const v=BOOT.villas.find(x=>x.id===s.villaId)||{}; const c=BOOT.concierges.find(x=>x.id===s.conciergeId)||{};
  const row=(k,val)=>val?`<tr><th>${esc(k)}</th><td>${esc(val)}</td></tr>`:'';
  const reqs=(s.requests||[]).filter(r=>r.status!=='cancelled').map(r=>`<li><b>${esc(r.title||'')}</b> — ${esc(r.status==='confirmed'?('confirmed'+(r.price?' · '+r.price:'')):'pending')}${r.date?' · '+esc(r.date):''}${r.time?' '+esc(r.time):''}${r.guests?' · '+esc(r.guests)+' guests':''}${r.note?'<br><i>“'+esc(r.note)+'”</i>':''}</li>`).join('')||'<li>None</li>';
  const groc=(s.grocery&&s.grocery.items&&s.grocery.items.length)?('<ul>'+(function(g){const by={};(g.items||[]).forEach(it=>{(by[it.category]=by[it.category]||[]).push(it);});return Object.keys(by).map(cat=>'<li><b>'+esc(cat)+':</b> '+by[cat].map(it=>esc(it.name)+' ×'+it.qty).join(', ')+'</li>').join('');})(s.grocery)+(s.grocery.note?'<li><b>Notes:</b> '+esc(s.grocery.note)+'</li>':'')+'</ul>'):'<p>None submitted.</p>';
  const meals=(s.mealPlan&&['breakfast','lunch','dinner'].some(k=>s.mealPlan[k]&&(s.mealPlan[k].date||s.mealPlan[k].desc)))?('<ul>'+[['breakfast','Breakfast'],['lunch','Lunch'],['dinner','Dinner']].map(([k,l])=>{const m=s.mealPlan[k]||{};if(!(m.date||m.time||m.guests||m.desc))return '';return '<li><b>'+l+':</b> '+[m.date,m.time,m.guests?m.guests+' guests':''].filter(Boolean).map(esc).join(' · ')+(m.desc?' — '+esc(m.desc):'')+'</li>';}).join('')+'</ul>'):'<p>None submitted.</p>';
  const gl=(s.guestList&&s.guestList.length)?('<ol>'+s.guestList.map(g=>'<li>'+esc(g.name||'—')+' — passport '+esc(g.passport||'—')+'</li>').join('')+'</ol>'):'<p>Not submitted.</p>';
  const gc=s.guestCheckin;
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>Stay summary — ${esc(s.leadName||s.reference||'')}</title>
    <style>body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#1F2A24;max-width:760px;margin:24px auto;padding:0 20px;line-height:1.5}
    h1{font-size:24px;margin:0 0 2px}h2{font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:#5B6E5F;border-bottom:1px solid #E6DDCC;padding-bottom:4px;margin:22px 0 8px}
    .ref{color:#8B8475;font-size:13px;margin-bottom:6px}table{border-collapse:collapse;width:100%}th{text-align:left;width:200px;color:#5B6E5F;font-weight:600;vertical-align:top;padding:3px 8px 3px 0;font-size:13.5px}td{padding:3px 0;font-size:13.5px}
    ul,ol{margin:6px 0;padding-left:20px}li{font-size:13.5px;margin:3px 0}@media print{body{margin:0}}</style></head>
    <body>
    <h1>${esc(s.leadName||'Guest')}</h1>
    <div class="ref">Booking ${esc(s.reference||'')} · ${esc((s.status||'').toUpperCase())} · printed ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
    <h2>Guest &amp; party</h2><table>${row('Lead guest',s.leadName)}${row('Email',s.email)}${row('Phone',s.phone)}${row('Party',((Number(s.adults)||0)+' adults'+(s.children?', '+s.children+' children':'')))}${row('Source',s.source)}</table>
    <h2>Villa &amp; stay</h2><table>${row('Villa',s.villaName||v.name)}${row('Internal name',s.villaInternal||v.internalName)}${row('Area',s.villaArea||v.area)}${row('Bedrooms / sleeps',[(s.villaSuites||v.suites),((s.villaSleeps||v.sleeps)?'sleeps '+(s.villaSleeps||v.sleeps):'')].filter(Boolean).join(' · '))}${row('Villa staff',s.staffIncluded)}${row('Check-in',[s.checkin,s.checkinTime].filter(Boolean).join(' · '))}${row('Check-out',[s.checkout,s.checkoutTime].filter(Boolean).join(' · '))}${row('Villa number',s.villaNumber)}${row('Registration #',s.registrationNumber)}${row('Wi-Fi',[s.wifiName,s.wifiPassword].filter(Boolean).join(' / '))}</table>
    <h2>Arrival &amp; transfer</h2><table>${row('Airport',s.airport)}${row('Flight',s.flight)}${row('Private transfer',s.transferArranged?'Arranged':'Not arranged')}${gc?row('Guest submitted',[gc.airport,gc.flight,gc.transferType==='roundtrip'?'round-trip':gc.transferType==='oneway'?'one-way':'',gc.occasion].filter(Boolean).join(' · ')):''}${gc&&gc.dietary?row('Dietary',gc.dietary):''}</table>
    <h2>Requests</h2><ul>${reqs}</ul>
    <h2>Grocery pre-stocking</h2>${groc}
    <h2>Arrival meals</h2>${meals}
    <h2>Guest registration</h2>${gl}
    <h2>Concierge</h2><table>${row('Assigned',c.name)}${row('Welcome message',s.welcomeMessage)}</table>
    </body></html>`;
  const w=window.open('','_blank'); if(!w){ toast('Allow pop-ups to print'); return; } w.document.write(html); w.document.close(); setTimeout(()=>{ try{w.focus();w.print();}catch(e){} },350);
};

/* ---- save / publish ---- */
function payload(){ const k=['leadName','lastName','email','phone','source','adults','children','villaId','villaName','villaArea','villaView','villaSuites','villaSleeps','villaInternal','staffIncluded','heroPhoto','checkin','checkout','checkinTime','checkoutTime','airport','flight','transferArranged','offeredAddOnIds','conciergeId','assigneeId','internalNotes','wifiHandover','welcomeMessage','wifiName','wifiPassword','villaNumber','registrationNumber','followUpDate','followUpNote','paymentStatus','balanceDue','securityDeposit']; const o={}; k.forEach(x=>o[x]=cur[x]); o.villaNumber=o.villaNumber||cur.villaInternal||''; return o; }
window.removeStay=async function(){ if(!cur)return; const label=cur.status==='published'?'reservation':'draft'; if(!confirm('Delete this '+label+' for '+(cur.leadName||cur.reference)+'?\n\nThis permanently removes it and cannot be undone.'))return; const r=await api('/api/staff/stays/'+cur.id,{method:'DELETE'}); if(r.ok){ cur=null; setDirty(false); await loadList(); renderHome(); setView(false); toast('Deleted'); } else { toast('Could not delete'); } };
async function saveDraft(){ if(!cur)return; const r=await api('/api/staff/stays/'+cur.id,{method:'PUT',body:JSON.stringify(Object.assign(payload(),{status:cur.status==='published'?'published':'draft'}))}); if(r.ok){ cur=r.body.stay; setDirty(false); await loadList(cur.id); toast('Saved'); } }
window.saveDraft=saveDraft;
window.publish=async function(){ if(!cur)return; await api('/api/staff/stays/'+cur.id,{method:'PUT',body:JSON.stringify(payload())}); const r=await api('/api/staff/stays/'+cur.id+'/publish',{method:'POST'}); if(r.ok){ cur=r.body.stay; setDirty(false); await loadList(cur.id); toast('Published — guest link is live'); } };

boot();
</script>
