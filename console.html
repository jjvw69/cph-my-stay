<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Concierge Console · Caribbean Paradise Homes</title>
<meta name="theme-color" content="#16241E">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CPH Console">
<link rel="apple-touch-icon" href="https://caribbeanparadisehomes.com/wp-content/uploads/sites/58/2024/11/cropped-CPH-Logo-Only-FB-270x270.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* Wimbledon "Centre Court" palette: dark stand grey · green scoreboard · light seating greys · white court · purple status · soft-yellow live accent. */
  :root{--bg:#E6E9E7;--panel:#EDEFED;--card:#FFF;--ink:#14231A;--accent:#12794D;--accent2:#0C4A2F;--soft:#6B746F;--line:#D5D9D6;--gold:#A37E2C;--login:#0C3226;
    --purple:#5A3A88;--yellow:#DEE86B;--hedge:#0C4A2F;--stand:#333C39;
    --okbg:#DCEBE1;--oktx:#12794D;--drbg:#E7EAE6;--drtx:#5C665E;--nibg:#F2E3DC;--nitx:#9E5B43;
    --display:'Montserrat',-apple-system,'Segoe UI',sans-serif;--ui:'Montserrat',-apple-system,'Segoe UI',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{overflow-x:hidden;max-width:100%}
  body{font-family:var(--ui);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:var(--ui);cursor:pointer;border:0;background:none}
  input,select,textarea{font-family:var(--ui);font-size:16px;color:var(--ink)}
  .label{font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft);font-weight:600}
  /* Gate */
  #gate{position:fixed;inset:0;background:linear-gradient(160deg,#1B2B23,#16241E);display:flex;align-items:center;justify-content:center;z-index:50}
  .gatecard{width:382px;max-width:92vw;background:var(--bg);border-radius:22px;padding:34px 30px;text-align:center;box-shadow:0 30px 70px -30px rgba(0,0,0,.6)}
  .gatecard img{width:48px;margin:0 auto 10px;display:block}
  .gatecard .wm{font-size:11.5px;letter-spacing:.24em;color:var(--soft)}
  .gatecard h1{font-family:var(--display);font-weight:600;font-size:26px;margin:8px 0 2px}
  .gatecard .sub{font-size:13px;color:var(--soft);margin-bottom:20px}
  .gatecard label{display:block;text-align:left;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);margin:12px 0 5px}
  .gatecard input{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:#fff}
  .btn{width:100%;background:var(--accent);color:#fff;border-radius:12px;padding:13px;font-size:16px;font-weight:500;margin-top:18px}
  .btn.alt{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .gerr{display:none;background:var(--nibg);color:var(--nitx);font-size:14px;padding:8px 12px;border-radius:9px;margin-top:12px}
  .gatecard .foot{font-size:12.5px;color:var(--soft);margin-top:16px}
  .gatecard .ssoNote{font-size:12.5px;color:var(--soft);margin-top:10px}
  /* Console */
  #app{display:none;height:100dvh;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;background:var(--stand);border-bottom:1px solid #2A322F}
  .topbar .brand{display:flex;align-items:center;gap:9px}
  .topbar .brand img{width:26px}
  .topbar .brand b{font-family:var(--display);font-weight:700;font-size:16px;line-height:1.1;color:#F3F5F3}
  /* Right cluster is a deliberate light-grey "scorebug" panel on the dark stand; dark-grey text for legibility. */
  .topbar .right{display:flex;align-items:center;gap:14px;font-size:13.5px;color:var(--soft);background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:7px 12px}
  .sync{display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:#5B9E6F;display:inline-block}
  .who{color:var(--ink)}
  .cols{flex:1;display:grid;grid-template-columns:372px 1fr 372px;overflow:hidden}
  .cols.board-mode{grid-template-columns:1fr}
  .cols.board-mode .col.left,.cols.board-mode .col.right{display:none}
  .ab-btns{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
  .ab-btns{gap:8px}
  .ab-btns .ab-today{flex:0 0 auto;width:auto;margin:0;padding:5px 12px;font-size:12px;font-weight:500;border-radius:9px}
  .ab-actbtn{display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;color:var(--accent);border:1px solid var(--accent);border-radius:11px;padding:10px 12px;font-size:13.5px;font-weight:500;cursor:pointer}
  .ab-actbtn:hover{background:#F2F7F3}
  @media print{
    .topbar,.botnav,.ab-btns,.today-date,.backlist{display:none!important}
    .cols,.col.center,.ab-scroll{overflow:visible!important;height:auto!important}
    table.ab{min-width:0!important;font-size:9px}
    .rowcol-sel,.greet-sel{border:0!important;background:transparent!important;-webkit-appearance:none;appearance:none}
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  }
  .col{overflow-y:auto;height:100%}
  .left{border-right:1px solid var(--line);background:var(--panel);padding:16px 14px}
  .left .hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .left .hd .label{font-size:12.5px}
  .newbtn{font-size:14px;color:var(--accent);font-weight:500}
  .search{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 12px;background:#fff;margin-bottom:12px}
  .staycard{background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:9px;cursor:pointer}
  .staycard.unread{border-color:#D8CBE6;box-shadow:inset 3px 0 0 var(--purple)}
  .staycard .g{display:flex;align-items:center}
  .unread-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);display:inline-block;margin-left:8px;flex:0 0 auto}
  .staycard.sel{border-color:var(--accent);background:#F1F4EF}
  .staycard .g{font-weight:500;font-size:16px}
  .staycard .meta{font-size:13.5px;color:var(--soft);margin-top:3px}
  .pill{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;margin-top:7px}
  .pill.published{background:var(--okbg);color:var(--oktx)}
  .pill.draft{background:var(--drbg);color:var(--drtx)}
  .pill.needsinfo{background:var(--nibg);color:var(--nitx)}
  .reqbadge{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;margin:7px 0 0 6px;background:var(--purple);color:#fff}
  .srcpill{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px}
  .srcpill.direct{background:#E8EEF5;color:#3E5675;border:1px solid #D4DEEC}
  .srcpill.partner{background:#F1E9F2;color:#6E4A72;border:1px solid #E1D0E4}
  .pillrow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px}
  .pillrow .pill,.pillrow .srcpill,.pillrow .reqbadge,.pillrow .fupill{margin:0;vertical-align:middle}
  .fupill{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;margin:7px 0 0 6px;background:#E7EBE6;color:#5B6B5F}
  .fupill.due{background:#F4E4C7;color:#8A5A1E}
  .fupill.over{background:#F2D7CF;color:#9E3B2A}
  .fustrip{background:#FBF1E8;border:1px solid #ECD9C5;border-radius:13px;padding:11px 12px;margin-bottom:12px}
  .fuhd{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#9E5B43;font-weight:600;margin-bottom:2px}
  .fuitem{display:flex;align-items:flex-start;gap:9px;width:100%;text-align:left;background:#fff;border:1px solid #ECD9C5;border-radius:10px;padding:9px 11px;margin-top:7px;cursor:pointer}
  .fudot{width:8px;height:8px;border-radius:50%;background:#C8852F;flex:0 0 auto;margin-top:5px}
  .fudot.over{background:#9E3B2A}
  .futx{display:flex;flex-direction:column;min-width:0}
  .futx b{font-size:13.5px}
  .futx span{font-size:12px;color:var(--soft)}
  .todaybtn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;background:var(--accent);color:#fff;border-radius:11px;padding:10px 12px;font-size:13.5px;font-weight:500;margin-bottom:12px;cursor:pointer}
  .todaybtn.alert{background:var(--purple)}
  .homebtns{display:flex;gap:8px;margin-bottom:12px}
  .homebtns .todaybtn{margin-bottom:0;flex:1}
  .todaybtn.inbox{background:#5B6E5F}
  .todaybtn.on{box-shadow:inset 0 0 0 2px rgba(255,255,255,.55)}
  .hb-badge{background:rgba(255,255,255,.28);border-radius:20px;padding:1px 8px;font-size:12px;margin-left:4px}
  .ibx-prev{flex-basis:100%;font-size:12.5px;color:var(--soft);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .tr-tag.grey{background:#EFEBE0;color:#8B8475}
  /* ---- Today overview (center) ---- */
  .today-head{font-family:var(--display);font-weight:700;font-size:26px;color:var(--ink)}
  .today-date{font-size:13px;color:var(--soft);margin:2px 0 16px}
  .today-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:11px;margin-bottom:8px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 14px}
  .stat.clk{cursor:pointer;transition:border-color .12s,transform .08s}
  .stat.clk:hover{border-color:var(--accent)}
  .stat.clk:active{transform:scale(.985)}
  .stat.hot{border-color:#E4C58C;background:#FCF7EC}
  .stat .num{font-family:var(--display);font-size:30px;line-height:1;color:var(--accent)}
  .stat.hot .num{color:#9E5B43}
  .stat .lbl{font-size:12px;color:var(--soft);margin-top:5px}
  .today-sec{margin-top:22px}
  .today-sec h3{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);font-weight:700;margin-bottom:9px}
  .today-row{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;cursor:pointer;text-align:left;width:100%}
  .today-row:hover{border-color:var(--accent)}
  .tr-main{flex:1;min-width:0;display:flex;align-items:baseline;flex-wrap:wrap}
  .today-row .tr-g{font-size:14.5px;font-weight:600;color:var(--ink)}
  .today-row .tr-m{font-size:12.5px;color:var(--soft)}
  .tr-sep{color:var(--soft);margin:0 7px;font-size:12px}
  .awin-row{display:flex;gap:4px;margin:7px 0 13px}
  .awin{flex:1;min-width:0;border:1px solid var(--line);background:#fff;border-radius:11px;padding:8px 2px;font-size:10px;color:var(--soft);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.1;white-space:nowrap}
  .awin.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .awin-n{font-family:var(--display);font-size:18px;font-weight:600}
  .awin-u{font-size:8.5px;opacity:.65;letter-spacing:.03em;text-transform:uppercase}
  .today-row .tr-tag{margin-left:auto;flex:0 0 auto;font-size:11.5px;font-weight:600;border-radius:20px;padding:3px 11px;white-space:nowrap}
  .tr-tag.amber{background:#FBF1D8;color:#9A7B36}
  .tr-tag.red{background:#F3DADA;color:#9A2B2B}
  .tr-tag.green{background:#E2EFE0;color:#3F6B4E}
  .nrx{margin-bottom:8px}
  .nrx .nrx-head{margin-bottom:0}
  .nrx-chev{flex:0 0 auto;margin-left:9px;color:var(--soft);font-size:11px;transition:transform .15s}
  .nrx.open .nrx-chev{transform:rotate(90deg)}
  .nrx.open .nrx-head{border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom-color:transparent}
  .nrx-body{border:1px solid var(--line);border-top:0;border-radius:0 0 12px 12px;background:#fff;padding:6px 14px 11px}
  .nrx-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink);padding:5px 0}
  .nrx-ic{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:0 0 auto}
  .nrx-ic.ok{background:#E2EFE0;color:#3F6B4E}
  .nrx-ic.no{background:#F3DADA;color:#9A2B2B}
  .nrx-pend{color:#9A2B2B;font-size:11.5px;font-weight:600}
  .nrx-open{margin-top:8px;background:none;border:0;color:var(--accent);font-size:12.5px;font-weight:600;cursor:pointer;padding:2px 0;font-family:var(--ui)}
  .nrx-open:hover{text-decoration:underline}
  .arr-row{flex-direction:column;align-items:stretch;gap:8px}
  .arr-main{display:flex;align-items:center;width:100%;background:none;border:0;padding:0;cursor:pointer;font-family:inherit;text-align:left}
  .arr-main .tr-tag{margin-left:auto}
  .arr-main .tr-main{flex-direction:column;align-items:flex-start;flex-wrap:nowrap;gap:2px}
  .arr-main .tr-d{font-size:11.5px;color:var(--soft)}
  .arr-main .tr-line{display:flex;align-items:baseline;min-width:0;max-width:100%;overflow:hidden;white-space:nowrap}
  .arr-main .tr-line .tr-m{overflow:hidden;text-overflow:ellipsis}
  .arr-greet{display:flex;align-items:center;gap:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .arr-greet-lbl{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--soft);font-weight:700}
  .greet-sel{margin-left:auto;font-size:11.5px;border:1px solid var(--line);border-radius:8px;padding:4px 7px;background:#fff;color:var(--ink);cursor:pointer;font-family:var(--ui)}
  .greet-sel:hover{border-color:var(--accent)}
  .greet-sel.set{border-color:var(--accent);color:var(--accent);font-weight:600;background:#F4F8F2}
  .greet-sel.g-maria{background:#12794D;color:#fff;border-color:#12794D}
  .greet-sel.g-ivonna{background:#5A3A88;color:#fff;border-color:#5A3A88}
  .greet-sel.g-jan{background:#D7E600;color:#14231A;border-color:#C4D400;font-weight:700}
  .nrx-item .inx-amt{margin-left:auto;font-weight:600;color:#9A2B2B;white-space:nowrap;padding-left:10px}
  .inx-no{color:var(--soft);font-size:11.5px}
  .ab-wrap{padding:2px 2px 20px}
  .ab-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:#fff;margin-top:12px}
  table.ab{border-collapse:collapse;width:100%;font-size:12px;min-width:1120px}
  table.ab th{position:sticky;top:0;z-index:1;background:#F0EFE7;color:var(--soft);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;text-align:left;padding:9px 7px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.ab td{padding:5px 6px;border-bottom:1px solid var(--line);vertical-align:top}
  table.ab tbody tr:hover td{background:#FBFAF6}
  .ab-dt{white-space:nowrap;color:var(--soft);font-size:11px}
  .ab-guest{white-space:nowrap}
  .ab-guest button{background:none;border:0;font-weight:600;color:var(--ink);cursor:pointer;padding:0;font-family:inherit;font-size:12.5px;text-align:left}
  .ab-guest button:hover{color:var(--accent);text-decoration:underline}
  .ab-draft{font-size:9.5px;font-weight:700;text-transform:uppercase;color:#9A7B36;background:#FBF1D8;border-radius:10px;padding:1px 6px;margin-left:4px}
  .ab-villa{white-space:normal;overflow-wrap:anywhere;min-width:96px;max-width:150px;color:var(--ink)}
  .ab-ppl{text-align:center;color:var(--soft)}
  .ab-in{width:100%;min-width:78px;box-sizing:border-box;border:1px solid transparent;border-radius:6px;padding:4px 6px;font-size:11.5px;background:#F7F6F1;color:var(--ink);font-family:var(--ui)}
  .ab-in:hover{border-color:var(--line)}
  .ab-in:focus{border-color:var(--accent);background:#fff;outline:none}
  .ab-prov{white-space:nowrap;color:var(--ink);font-weight:600;font-size:11.5px}
  .ab-cart{white-space:pre-line;overflow-wrap:anywhere;min-width:110px;max-width:170px;color:var(--ink);font-size:11.5px}
  .ab-super{white-space:normal;overflow-wrap:anywhere;min-width:110px;max-width:190px;color:var(--ink);font-size:11.5px}
  .ab-staff{color:var(--ink);font-size:11.5px}
  /* Auto-fit + wrap: columns size to their content, but long text wraps (capped by max-width) instead of forcing horizontal scroll. min-width:0 keeps short cells compact; cart keeps its per-line breaks via pre-line. */
  .ab-dt,.ab-guest,.ab-ppl,.ab-prov,.ab-villa,.ab-cart,.ab-super,.ab-staff{min-width:0;white-space:normal;overflow-wrap:break-word}
  .ab-villa{max-width:150px}
  .ab-cart{max-width:170px;white-space:pre-line}
  .ab-super,.ab-staff{max-width:190px}
  .ab-color{width:1%;padding-right:2px}
  .rowcol-sel{border:1px solid var(--line);border-radius:6px;padding:3px 3px;font-size:12px;cursor:pointer;font-family:var(--ui);color:var(--ink);min-width:42px;text-align:center}
  .rowcol-sel.set{border-color:#B9C3B7;font-weight:600}
  .ab-greet{min-width:0;width:78px}
  table.ab .greet-sel{margin-left:0;width:auto;min-width:0;max-width:74px;font-size:11px;padding:3px 5px}
  table.ab tr.ab-year td{background:var(--hedge);color:#fff;font-weight:700;font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;padding:5px 10px;text-align:left;border-top:2px solid var(--yellow)}
  .ab-legend{display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 13px;margin:0 0 10px}
  .ab-legend-h{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);margin-right:2px}
  .ab-leg-item{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink)}
  .ab-leg-sw{width:16px;height:16px;border-radius:5px;border:1px solid rgba(0,0,0,.14);flex:0 0 auto}
  .today-clear{background:#fff;border:1px dashed var(--line);border-radius:14px;padding:26px 14px;text-align:center;color:var(--soft);font-size:14.5px;margin-top:8px}
  /* ---- #6 quick wins ---- */
  .lfilter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px}
  .lchip{font-size:12px;border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 11px;color:var(--soft);cursor:pointer}
  .lchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .topPending{display:none;background:var(--purple);color:#fff;border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .topPending.show{display:inline-block}
  .tmpl{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
  .tmpl button{font-size:12.5px;border:1px solid var(--line);background:#FBF8F1;border-radius:18px;padding:6px 12px;color:var(--accent);cursor:pointer}
  /* ---- #5 activity timeline ---- */
  .tl{position:relative;margin-top:10px;padding-left:6px}
  .tl-row{position:relative;padding:0 0 13px 20px;border-left:2px solid var(--line)}
  .tl-row:last-child{border-left-color:transparent}
  .tl-dot{position:absolute;left:-7px;top:2px;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}
  .tl-dot.g{background:#9E5B43}.tl-dot.ok{background:#3F6B4E}.tl-dot.no{background:#9A2B2B}.tl-dot.s{background:var(--accent)}
  .tl-when{font-size:11.5px;color:var(--soft)}
  .tl-what{font-size:13.5px;color:var(--ink);margin-top:1px}
  .tl-what b{font-weight:600}
  details.sec summary{list-style:none;margin-bottom:14px}
  details.sec summary::-webkit-details-marker{display:none}
  .tl-hint{float:right;color:var(--soft);font-size:12.5px}
  .tl-hint-open{display:none}
  details.sec[open] .tl-hint-closed{display:none}
  details.sec[open] .tl-hint-open{display:inline}
  .msave{display:none}
  .reqcount{display:inline-block;font-size:12px;background:var(--gold);color:#fff;border-radius:20px;padding:1px 9px;margin-left:8px;vertical-align:middle;font-weight:700}
  .reqlist{display:flex;flex-direction:column;gap:9px}
  .reglist-cols{display:grid;grid-template-columns:repeat(3,minmax(0,1fr))}
  .reqlist-2col{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}
  @media(max-width:640px){ .reglist-cols,.reqlist-2col,.sndform{grid-template-columns:1fr !important} }

/* Top-of-editor alerts: VIP occasion + a consolidated dietary/allergy flag (gathered from

function stayAlerts(s){
  const gc=s.guestCheckin||{};
  const occ=String(gc.occasion||'').trim();
  // Gather dietary/allergy notes from all three places, then de-duplicate (guests often repeat
  // the same note across pre check-in, grocery and meals — show it once).
  const dietRaw=[gc.dietary,(s.grocery&&s.grocery.note),(s.mealPlan&&s.mealPlan.note)].map(x=>String(x||'').trim()).filter(Boolean);
  const _seen=new Set(); const diet=dietRaw.filter(x=>{ const k=x.toLowerCase().replace(/\s+/g,' '); if(_seen.has(k))return false; _seen.add(k); return true; });
  const adults=Number(s.adults)||0, children=Number(s.children)||0, party=adults+children;
  const cap=Number(s.villaSleeps||((BOOT.villas.find(v=>v.id===s.villaId)||{}).sleeps))||null;
  const ages=(gc.childAges||[]).filter(a=>a!==''&&a!=null);
  let h='';
  if(cap&&party>cap) h+=`<div class="alertbar diet">⚠ <b>Over capacity:</b> party of ${party} exceeds the villa's ${cap} beds <span class="ab-sub">— confirm sleeping arrangements before arrival.</span></div>`;
  if(occ) h+=`<div class="alertbar occ">🎉 <b>Occasion:</b> ${esc(occ)} <span class="ab-sub">— a welcome touch (cake, décor, champagne) goes a long way.</span></div>`;
  if(diet.length) h+=`<div class="alertbar diet">⚠ <b>Dietary &amp; allergies:</b> ${diet.map(esc).join(' · ')} <span class="ab-sub">— brief the chef &amp; check provisioning.</span></div>`;
  if(children>0) h+=`<div class="alertbar info">👶 <b>Children in the party:</b> ${children}${ages.length?' (ages '+ages.map(esc).join(', ')+')':''} <span class="ab-sub">— offer cribs / high chairs and note pool safety.</span></div>`;
  if(gc.transportMode==='self'){ const dt=[gc.transportCompany,gc.transportArrival?('arr '+gc.transportArrival):''].filter(Boolean).map(esc).join(' · '); h+=`<div class="alertbar info">🚗 <b>Guest arranging own transport</b>${dt?': '+dt:''} <span class="ab-sub">— send resort gate-access instructions so they can enter Casa de Campo.</span></div>`; }
  return h;
}

window.invDates=function(i,which,v){ if(!_invDraft||!_invDraft.items[i])return; const it=_invDraft.items[i]; it[which]=v;

/* ---------- Grocery / pre-stocking invoice (every value entered manually) ---------- */
function groBreakdown(iv){ const n=v=>Number(String(v==null?0:v).replace(/[^0-9.]/g,''))||0;
  const totalUSD=n(iv.totalUSD), deposit=n(iv.depositUSD); const finalUSD=Math.round((totalUSD-deposit)*100)/100;
  return { totalRD:n(iv.totalRD), subUSD:n(iv.subUSD), svc:n(iv.serviceFeeUSD), pickup:n(iv.pickupUSD), totalUSD, deposit, finalUSD,
    dueUSD:Math.max(0,finalUSD),        // still collectable (a credit never offsets other invoices)
    refundUSD:Math.max(0,-finalUSD) };  // we owe the guest this back
}
// Grocery invoice auto-calc: service fee = 15% of sub-total; total = sub + service fee + pick-up.
// Deposit (funds already received) is manual and is subtracted → FINAL TOTAL. All fields stay editable.
window.groAutoCalc=function(src){
  const val=id=>parseFloat(String((document.getElementById(id)||{}).value||'').replace(/[^0-9.-]/g,''))||0;
  const set=(id,v)=>{ const el=document.getElementById(id); if(el)el.value=v; };
  const sub=val('groSubUSD'); const pickup=val('groPickup'); let svc=val('groSvc');
  if(src==='sub'){ svc=Math.round(sub*15)/100; set('groSvc', sub? String(svc):''); }
  const total=Math.round((sub+svc+pickup)*100)/100;
  if(src!=='deposit') set('groTotalUSD', (sub||svc||pickup)? String(total):'');
  groFinalSync();
};
/* FINAL TOTAL = Total invoice − deposit. Negative = refund owed to the guest. */
function groFinalSync(){
  const val=id=>parseFloat(String((document.getElementById(id)||{}).value||'').replace(/[^0-9.-]/g,''))||0;
  const tot=val('groTotalUSD'), dep=val('groDeposit'); const fin=Math.round((tot-dep)*100)/100;
  const el=document.getElementById('groFinal'); if(el) el.value=(tot||dep)?('US$'+fin.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})):'';
  const hint=document.getElementById('groFinalHint');
  if(hint) hint.innerHTML = !dep ? '' : (fin<0
    ? `<b style="color:#9E5B43">Credit — US$${Math.abs(fin).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})} to refund to the guest.</b> Nothing to collect.`
    : `Guest still owes <b>US$${fin.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</b> after the deposit.`);
}

function nights(a,b){ const d1=new Date(a),d2=new Date(b); if(isNaN(d1)||isNaN(d2))return null; return Math.max(0,Math.round((d2-d1)/864e5)); }
function daysUntil(a){ const d=new Date(a+'T00:00:00'); if(isNaN(d))return null; return Math.max(0,Math.ceil((d-new Date(new Date().toDateString()))/864e5)); }
function fmtReqDate(ts){ try{ const d=new Date(ts); if(isNaN(d))return ''; return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDay(iso){ const d=new Date(iso+'T00:00:00'); if(isNaN(d))return iso; return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function guestPulse(ts){
  if(!ts) return '<span class="pulse off">· not opened yet</span>';
  const m=Math.floor((Date.now()-ts)/60000);
  const t=m<1?'just now':m<60?(m+'m ago'):m<1440?(Math.floor(m/60)+'h ago'):(Math.floor(m/1440)+'d ago');
  return '<span class="pulse '+(m<30?'on':'off')+'">· opened '+t+'</span>';
}
/* The right column = the concierge "do-now" action rail. Only time-sensitive items that
   carry an action/button belong here; static info (villa, dates, party, money totals) lives
   in the Dashboard vitals bar. Blocks: status · Needs action · Money to collect · Your move ·
   Arrival readiness · Awaiting guest · Quick actions. */
function renderPreview(){
  const host=document.getElementById('preview'); if(!host) return;
  if(!cur){ host.innerHTML='<div class="empty">No stay selected.</div>'; return; }
  const st=cur.status; const statusLine=st==='published'?['Published · link active','#5B9E6F']:st==='needs info'?['Needs info · not sent','#9E5B43']:['Draft · not yet visible','#9A7B36'];
  const todayISO=new Date().toISOString().slice(0,10);
  const d=daysUntil(cur.checkin);
  const departed=!!(cur.checkout&&cur.checkout<todayISO);
  const reqs=(cur.requests||[]);
  const pending=reqs.filter(r=>r.status!=='done'&&r.status!=='cancelled');
  const reqMeta=r=>[r.cartType?esc(r.cartType):'',r.serviceLevel?esc(r.serviceLevel):'',r.date?esc(r.date)+(r.endDate?' → '+esc(r.endDate):''):'',r.time?esc(r.time):'',r.guests?esc(r.guests)+' g':''].filter(Boolean).join(' · ')||'No date/time given';

  // Money to collect — invoices sent to the guest but not yet paid.
  const invs=cur.invoices||[]; const invTot=iv=>iv.kind==='grocery'?(groBreakdown(iv).dueUSD||0):(invBreakdown(iv).total||0);
  const unpaid=invs.filter(iv=>iv.status==='sent'); const unpaidTot=unpaid.reduce((a,iv)=>a+invTot(iv),0);

  // Your move — decisions the concierge owes (outside the request queue).
  const yp=cur.yachtProposal; const yChosen=(yp&&yp.status==='chosen')?(yp.options||[]).find(o=>o.id===yp.chosenId):null;
  const yachtToInvoice=yChosen&&!invs.some(iv=>iv.yachtId===yp.id);
  const fuList=(Array.isArray(cur.followUps)&&cur.followUps.length)?cur.followUps:(cur.followUpDate?[{date:cur.followUpDate,note:cur.followUpNote||''}]:[]);
  const fuDue=fuList.filter(f=>f.date&&f.date<=todayISO);

  // Awaiting guest — informational, ball in the guest's court.
  const svcAwait=(cur.sentServices||[]).filter(x=>x.status!=='confirmed'&&x.status!=='declined'&&x.status!=='cancelled');
  const yachtWaiting=yp&&yp.status!=='chosen';

  // Arrival readiness — only within 14 days of an upcoming stay; each missing item jumps to its section.
  const rdy=[
    ['Pre check-in', !!cur.guestCheckin, 'csec-guest-party'],
    ['Transfer arranged', !!cur.transferArranged, 'csec-guest-pending-requests'],
    ['Guest registration', !!(cur.guestList&&cur.guestList.length), 'csec-guest-registration-list'],
    ['Registration #', !!(cur.registrationNumber&&String(cur.registrationNumber).trim()), 'csec-payment-balance'],
    ['Groceries', !!(cur.grocery&&((cur.grocery.items&&cur.grocery.items.length)||cur.grocery.note)), 'csec-grocery-pre-stocking'],
  ];

  const needsBody=pending.length?pending.map(r=>`<div class="act-card warn">
      <div class="act-title">${esc(r.title||'Request')}</div>
      <div class="act-meta">${reqMeta(r)}${r.createdAt?' · '+fmtReqDate(r.createdAt):''}</div>
      ${r.note?`<div class="act-meta">“${esc(r.note)}”</div>`:''}
      ${r.status==='confirmed'
        ? `<div class="act-meta" style="color:#3F6B4E;margin-top:5px">Confirmed${r.price?' · '+esc(usdStr(r.price)):''} — arrange &amp; mark done</div><div class="act-row"><button class="b-fill" onclick="markDoneReq('${r.id}')">Mark done</button></div>`
        : `<div class="act-row"><input id="pa_${r.id}" value="${esc(reqSuggestedPrice(r))}" placeholder="Final price, e.g. US$150"><button class="b-fill" onclick="confirmReq('${r.id}','pa')">Confirm</button></div>`}
    </div>`).join(''):`<div class="act-empty">No requests waiting — all caught up.</div>`;

  const moneyBody=unpaid.length?`<div class="act-card" style="border-color:#E3C4B6;background:#FBF1EC">
      <div class="act-title" style="color:#9A2B2B">US$${unpaidTot.toLocaleString('en-US')} outstanding</div>
      ${unpaid.map(iv=>`<div class="act-meta">#${iv.no} · ${esc(iv.title||'Invoice')} · US$${invTot(iv).toLocaleString('en-US')}${iv.sentAt?' · sent '+fmtAgo(iv.sentAt):''}</div>`).join('')}
      <div class="act-row"><button class="b-fill" onclick="remindBalanceWA()">Send reminder</button><button class="b-out" onclick="jumpSec('csec-invoices')">Open invoices</button></div>
    </div>`:'';

  const moveCards=[];
  if(yachtToInvoice) moveCards.push(`<div class="act-card warn">
      <div class="act-title">Guest chose ${esc(yChosen.name||'a yacht')}</div>
      <div class="act-meta">Turn the choice into an invoice to lock it in.</div>
      <div class="act-row"><button class="b-fill" onclick="openInvoiceForYacht('${escJs(yChosen.name)}','${escJs(yChosen.rate||'')}')">Create invoice</button></div>
    </div>`);
  const moveBody=moveCards.join('');

  // Notice board — every follow-up reminder for this stay, pinned like sticky notes (overdue / today highlighted).
  const fuSorted=fuList.slice().filter(f=>f&&(f.date||f.note)).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  const noticeBody=fuSorted.length
    ? `<div style="display:flex;flex-direction:column;gap:7px">${fuSorted.map(f=>{const over=f.date&&f.date<todayISO;const due=f.date&&f.date===todayISO;const tone=over?'#9A2B2B':due?'#8A6D2E':'#5B6E5F';return `<div class="act-card" style="background:#FFF9E6;border-color:#EBD98A"><div class="act-title" style="font-weight:600">📌 ${esc(f.note||'Reminder')}</div><div class="act-meta" style="color:${tone};font-weight:${(over||due)?'600':'400'}">${f.date?((over?'Overdue · ':due?'Today · ':'')+fmtDay(f.date)):'No date set'}</div></div>`;}).join('')}</div>`

    ? `<div class="act-card" style="background:#F1F4EF;border-color:#cfe0c8"><div class="act-meta" style="white-space:pre-wrap;color:var(--ink);font-size:12.5px;line-height:1.5">${esc(notesTxt)}</div></div>`

  const awaitBits=[];
  if(svcAwait.length) awaitBits.push(svcAwait.length+' service'+(svcAwait.length===1?'':'s')+' awaiting reply');
  if(yachtWaiting) awaitBits.push('yacht proposal — waiting for guest');
  const awaitBody=awaitBits.length?`<div class="act-meta" style="padding:2px 2px 0">${awaitBits.map(esc).join(' · ')}</div>`:'';

  const readyBody=missing.length
    ? `<div style="display:flex;flex-wrap:wrap;gap:6px">${missing.map(x=>`<button class="secnav-chip" style="border-color:#E4C58C;color:#8A6D2E" onclick="jumpSec('${x[2]}')">○ ${esc(x[0])}</button>`).join('')}</div>`
    : `<div class="act-empty" style="border-style:solid;color:#3F6B4E">Ready for arrival ✓</div>`;

  const qa=[];
  qa.push(`<button class="b-out" onclick="openInvoice('')">New invoice</button>`);
  if(cur.status==='published') qa.push(`<button class="b-out" onclick="sendLoginLink()">WhatsApp Guest</button>`);
  const qaBody=`<div class="act-row" style="flex-wrap:wrap">${qa.join('')}</div>`;

  host.innerHTML=`
    <div class="label">Action panel</div>
    <div class="pvstatus" style="color:${statusLine[1]}"><span class="dot" style="background:${statusLine[1]}"></span>${statusLine[0]}</div>
    ${sec('Notice board', fuSorted.length, noticeBody)}
    ${sec('Internal notes', 0, notesBody)}
    ${sec('Needs action', pending.length, needsBody)}
    ${moneyBody?sec('Money to collect', unpaid.length, moneyBody):''}
    ${moveBody?sec('Your move', moveCards.length, moveBody):''}
    ${showReady?sec('Arrival readiness', missing.length, readyBody):''}
    ${awaitBody?sec('Awaiting guest', 0, awaitBody):''}
    ${sec('Quick actions', 0, qaBody)}
  `;
  chatPopupRefresh();
}
/* Concierge chat popup — full chat panel in an overlay; opened from the Action panel card.
   Content is re-rendered by chatPopupRefresh() (called from renderPreview, which runs on
   send + live-sync), preserving the draft reply and focus. */
window.openChatPopup=function(noFocus){ if(!cur)return; let ov=document.getElementById('chatOv'); if(!ov){ ov=document.createElement('div'); ov.id='chatOv'; ov.style.cssText='position:fixed;inset:0;background:rgba(20,33,28,.45);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px'; ov.onclick=e=>{ if(e.target===ov)closeChatPopup(); }; document.body.appendChild(ov); }
  const guestMsgs=(cur.messages||[]).filter(m=>m.from==='guest');
  ov.innerHTML=`<div style="background:#fff;border-radius:16px;max-width:600px;width:100%;height:min(88vh,760px);padding:16px 18px 14px;display:flex;flex-direction:column;overflow:hidden;box-sizing:border-box">
    <div style="flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px"><b style="font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Concierge chat — ${esc(cur.leadName||'Guest')} ${guestMsgs.length?`<span class="act-n">${guestMsgs.length}</span>`:''}</b><button onclick="closeChatPopup()" style="flex:0 0 auto;border:0;background:none;font-size:20px;cursor:pointer;color:var(--soft);padding:2px 6px">✕</button></div>
    ${chatPanelFull(cur)}</div>`;
  const sc=ov.querySelector('#chatScroll'); if(sc)sc.scrollTop=sc.scrollHeight;
  if(!noFocus){ const el=ov.querySelector('#staffMsg'); if(el)el.focus(); }
};
window.closeChatPopup=function(){ const ov=document.getElementById('chatOv'); if(ov)ov.remove(); };
function chatPopupRefresh(){ const ov=document.getElementById('chatOv'); if(!ov||!cur)return; const inp=ov.querySelector('#staffMsg'); const val=inp?inp.value:''; const foc=inp&&document.activeElement===inp; const selS=inp?inp.selectionStart:null, selE=inp?inp.selectionEnd:null;
  const sc0=ov.querySelector('#chatScroll'); const atBottom=!sc0||(sc0.scrollHeight-sc0.scrollTop-sc0.clientHeight<40); const scPos=sc0?sc0.scrollTop:0;
  openChatPopup(true);
  const ov2=document.getElementById('chatOv'); const el=ov2.querySelector('#staffMsg'); if(el){ el.value=val; if(foc){ el.focus(); try{ if(selS!=null&&el.setSelectionRange)el.setSelectionRange(selS,selE); }catch(e){} } }
  const sc=ov2.querySelector('#chatScroll'); if(sc&&!atBottom)sc.scrollTop=scPos; /* stay where the concierge scrolled; only pin to bottom if they were at the bottom */ }
window.copyLink=function(){ const i=document.getElementById('glink'); i.select(); try{navigator.clipboard.writeText(i.value);}catch(e){document.execCommand('copy');} toast('Guest link copied'); };
window.copyGuestLink=function(){ const i=document.getElementById('glink2'); if(!i)return; i.select(); try{navigator.clipboard.writeText(i.value);}catch(e){document.execCommand('copy');} toast('Guest link copied'); };
window.jumpChat=function(){ setView(true); const el=document.getElementById('staffMsg'); if(el){ try{el.scrollIntoView({behavior:'smooth',block:'center'});}catch(e){} el.focus(); } };
window.doExport=async function(){ try{ const r=await fetch('/api/staff/export',{credentials:'same-origin'}); if(!r.ok){ toast('Export failed'); return; } const blob=await r.blob(); const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download='my-stay-backup-'+new Date().toISOString().slice(0,10)+'.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(u); toast('Backup downloaded'); }catch(e){ toast('Export failed'); } };
window.printStay=function(){
  if(!cur) return; const s=cur;
  const v=BOOT.villas.find(x=>x.id===s.villaId)||{}; const c=BOOT.concierges.find(x=>x.id===s.conciergeId)||{};
  const row=(k,val)=>val?`<tr><th>${esc(k)}</th><td>${esc(val)}</td></tr>`:'';
  const reqs=(s.requests||[]).filter(r=>r.status!=='cancelled').map(r=>`<li><b>${esc(r.title||'')}</b> — ${esc(r.status==='confirmed'?('confirmed'+(r.price?' · '+usdStr(r.price):'')):'pending')}${r.date?' · '+esc(r.date):''}${r.time?' '+esc(r.time):''}${r.guests?' · '+esc(r.guests)+' guests':''}${r.note?'<br><i>“'+esc(r.note)+'”</i>':''}</li>`).join('')||'<li>None</li>';
  const groc=(s.grocery&&s.grocery.items&&s.grocery.items.length)?('<ul>'+(function(g){const by={};(g.items||[]).forEach(it=>{(by[it.category]=by[it.category]||[]).push(it);});return Object.keys(by).map(cat=>'<li><b>'+esc(cat)+':</b> '+by[cat].map(it=>esc(it.name)+' ×'+it.qty).join(', ')+'</li>').join('');})(s.grocery)+(s.grocery.note?'<li><b>Notes:</b> '+esc(s.grocery.note)+'</li>':'')+'</ul>'):'<p>None submitted.</p>';
  const meals=(s.mealPlan&&['breakfast','lunch','dinner'].some(k=>s.mealPlan[k]&&(s.mealPlan[k].date||s.mealPlan[k].desc)))?('<ul>'+[['breakfast','Breakfast'],['lunch','Lunch'],['dinner','Dinner']].map(([k,l])=>{const m=s.mealPlan[k]||{};if(!(m.date||m.time||m.guests||m.desc))return '';return '<li><b>'+l+':</b> '+[m.date,m.time,m.guests?m.guests+' guests':''].filter(Boolean).map(esc).join(' · ')+(m.desc?' — '+esc(m.desc):'')+'</li>';}).join('')+'</ul>'):'<p>None submitted.</p>';
  const gl=(s.guestList&&s.guestList.length)?('<ol>'+s.guestList.map(g=>'<li>'+esc(g.name||'—')+' — passport '+esc(g.passport||'—')+'</li>').join('')+'</ol>'):'<p>Not submitted.</p>';
  const gc=s.guestCheckin;
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>Stay summary — ${esc(s.leadName||s.reference||'')}</title>
    <style>body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#1F2A24;max-width:760px;margin:24px auto;padding:0 20px;line-height:1.5}
    h1{font-size:24px;margin:0 0 2px}h2{font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:#5B6E5F;border-bottom:1px solid #E6DDCC;padding-bottom:4px;margin:22px 0 8px}
    .ref{color:#8B8475;font-size:13px;margin-bottom:6px}table{border-collapse:collapse;width:100%}th{text-align:left;width:200px;color:#5B6E5F;font-weight:600;vertical-align:top;padding:3px 8px 3px 0;font-size:13.5px}td{padding:3px 0;font-size:13.5px}
    ul,ol{margin:6px 0;padding-left:20px}li{font-size:13.5px;margin:3px 0}@media print{body{margin:0}}</style></head>
    <body>
    <h1>${esc(s.leadName||'Guest')}</h1>
    <div class="ref">Booking ${esc(s.reference||'')} · ${esc((s.status||'').toUpperCase())} · printed ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
    <h2>Guest &amp; party</h2><table>${row('Lead guest',s.leadName)}${row('Email',s.email)}${row('Phone',s.phone)}${row('Party',((Number(s.adults)||0)+' adults'+(s.children?', '+s.children+' children':'')))}${row('Source',s.source)}</table>
    <h2>Villa &amp; stay</h2><table>${row('Villa',s.villaName||v.name)}${row('Internal name',s.villaInternal||v.internalName)}${row('Area',s.villaArea||v.area)}${row('Bedrooms / sleeps',[(s.villaSuites||v.suites),((s.villaSleeps||v.sleeps)?'sleeps '+(s.villaSleeps||v.sleeps):'')].filter(Boolean).join(' · '))}${row('Villa staff',s.staffIncluded)}${row('Staff hours',s.staffHours)}${row('Check-in',[s.checkin,s.checkinTime].filter(Boolean).join(' · '))}${row('Check-out',[s.checkout,s.checkoutTime].filter(Boolean).join(' · '))}${row('Villa number',s.villaNumber)}${row('Registration #',s.registrationNumber)}${row('Wi-Fi',[s.wifiName,s.wifiPassword].filter(Boolean).join(' / '))}</table>
    <h2>Arrival &amp; transfer</h2><table>${row('Airport',s.airport)}${row('Flight',s.flight)}${row('Private transfer',s.transferArranged?'Arranged':'Not arranged')}${gc&&gc.transportMode?row('Guest transport',gc.transportMode==='self'?('Self-arranged'+(gc.transportCompany?' · '+gc.transportCompany:'')+(gc.transportArrival?' · arr '+gc.transportArrival:'')+(gc.transportDeparture?' · dep '+gc.transportDeparture:'')):'We organize it'):''}${gc?row('Guest submitted',[gc.airport,gc.flight,gc.transferType==='roundtrip'?'round-trip':gc.transferType==='oneway'?'one-way':'',gc.occasion].filter(Boolean).join(' · ')):''}${gc&&gc.dietary?row('Dietary',gc.dietary):''}</table>
    <h2>Requests</h2><ul>${reqs}</ul>
    <h2>Grocery pre-stocking</h2>${groc}
    <h2>Arrival meals</h2>${meals}
    <h2>Guest registration</h2>${gl}
    <h2>Concierge</h2><table>${row('Assigned',c.name)}${row('Welcome message',(s.welcomeMessage||DEFAULT_WELCOME).replace(/\{\s*villa name\s*\}/gi,s.villaName||v.name||'your villa').replace(/\{\s*concierge name\s*\}/gi,c.name||'your concierge'))}</table>
    </body></html>`;
  const w=window.open('','_blank'); if(!w){ toast('Allow pop-ups to print'); return; } w.document.write(html); w.document.close(); setTimeout(()=>{ try{w.focus();w.print();}catch(e){} },350);
};
/* Print a single section (grocery list / meal plan) on its own sheet for the chef or shopper. */

  const villa=s.villaName||v.name||''; const villaNo=s.villaNumber||s.villaInternal||'';
  const dates=[s.checkin,s.checkout].filter(Boolean).join(' → ');
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>${esc(title)} — ${esc(villa||s.reference||'')}</title>
    <style>body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#1F2A24;max-width:720px;margin:24px auto;padding:0 20px;line-height:1.5}
    h1{font-size:22px;margin:0 0 2px}h2{font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:#5B6E5F;border-bottom:1px solid #E6DDCC;padding-bottom:4px;margin:20px 0 8px}
    .ref{color:#8B8475;font-size:13px;margin-bottom:6px}ul,ol{margin:6px 0;padding-left:20px}li{font-size:14px;margin:4px 0}p{font-size:14px}@media print{body{margin:0}}</style></head>
    <body>
    <h1>${esc(title)}</h1>
    <div class="ref">${esc(villa)}${villaNo?' · Villa '+esc(villaNo):''}${dates?' · '+esc(dates):''}${s.leadName?' · '+esc(s.leadName):''} · printed ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
    ${bodyHtml}
    </body></html>`;
  const w=window.open('','_blank'); if(!w){ toast('Allow pop-ups to print'); return; } w.document.write(html); w.document.close(); setTimeout(()=>{ try{w.focus();w.print();}catch(e){} },350);
}
window.printGrocery=function(){ if(!cur)return; const s=cur;
  const groc=(s.grocery&&s.grocery.items&&s.grocery.items.length)?('<ul>'+(function(g){const by={};(g.items||[]).forEach(it=>{(by[it.category]=by[it.category]||[]).push(it);});return Object.keys(by).map(cat=>'<li><b>'+esc(cat)+':</b> '+by[cat].map(it=>esc(it.name)+' ×'+it.qty).join(', ')+'</li>').join('');})(s.grocery)+'</ul>'):'<p>None submitted.</p>';

window.printMeals=function(){ if(!cur)return; const s=cur;
  const meals=(s.mealPlan&&mealsSortedC(s.mealPlan).length)?('<ul>'+mealsSortedC(s.mealPlan).map(({lbl,m})=>'<li><b>'+esc(lbl)+':</b> '+[m.date,m.time,m.guests?m.guests+' guests':''].filter(Boolean).map(esc).join(' · ')+(m.desc?' — '+esc(m.desc):'')+'</li>').join('')+'</ul>'):'<p>None submitted.</p>';

/* ---- save / publish ---- */
function payload(){ const k=['leadName','lastName','email','phone','source','adults','children','villaId','villaName','villaArea','villaView','villaSuites','villaSleeps','villaInternal','staffIncluded','staffHours','heroPhoto','checkin','checkout','checkinTime','checkoutTime','airport','flight','transferArranged','offeredAddOnIds','conciergeId','assigneeId','internalNotes','wifiHandover','welcomeMessage','wifiName','wifiPassword','villaNumber','registrationNumber','followUpDate','followUpNote','followUps','depositReminderAdded','paymentStatus','balanceDue','securityDeposit','totalCharge','amountPaid','balanceDueBy','bookingAgent','grocerySuper','groceryDeposit','groceryDepositPaid','staffCount','transferNote','extras','grocery','mealPlan','guestList']; const o={}; k.forEach(x=>o[x]=cur[x]); o.villaNumber=o.villaNumber||cur.villaInternal||''; return o; }
window.removeStay=async function(){ if(!cur)return; const label=cur.status==='published'?'reservation':'draft'; if(!confirm('Delete this '+label+' for '+(cur.leadName||cur.reference)+'?\n\nThis permanently removes it and cannot be undone.'))return; const r=await api('/api/staff/stays/'+cur.id,{method:'DELETE'}); if(r.ok){ cur=null; setDirty(false); await loadList(); renderHome(); setView(false); toast('Deleted'); } else { toast('Could not delete'); } };
async function saveDraft(){ if(!cur)return; const r=await api('/api/staff/stays/'+cur.id,{method:'PUT',body:JSON.stringify(Object.assign(payload(),{status:cur.status==='published'?'published':'draft'}))}); if(r.ok){ cur=r.body.stay; setDirty(false); await loadList(cur.id); toast('Saved'); } }
window.saveDraft=saveDraft;
window.publish=async function(){ if(!cur)return; await api('/api/staff/stays/'+cur.id,{method:'PUT',body:JSON.stringify(payload())}); const r=await api('/api/staff/stays/'+cur.id+'/publish',{method:'POST'}); if(r.ok){ cur=r.body.stay; setDirty(false); await loadList(cur.id); toast('Published — guest link is live'); } };

boot();
